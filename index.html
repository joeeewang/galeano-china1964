<p>clásico; y cuando uno pregunta su opinión al pueblo, a los trabajadores del campo y de la ciudad, recibe respuestas así: Stalin era bueno; Stalin era un gran revolucionario y un marxista-leninista ejemplar; un maestro de la revolución proletaria; un gran revolucionario, que ayudó siempre a la revolución china; maestro del movimiento comunista internacional. Algunos, los menos, admiten que cometió algunos errores, pero advierten que no tienen la menor importancia en comparación con sus méritos. Y todos parecen muy convencidos de que la revolución china encontró siempre, en él, firme apoyo y sabios consejos. En el extremo opuesto, símbolo vivo del Mal, traidor del marxismo-leninismo y los principios revolucionarios, enemigo de China y de los pueblos, aparece, en boca de los chinos, Jruschov.</p>
<h3 class="section-heading">LA OTRA CARA DE LA HISTORIA</h3>
<p>Los dirigentes chinos sostienen que las divergencias con la Unión Soviética se iniciaron con el Vigésimo Congreso del Partido Comunista de la URSS, en 1956; ese habría sido el primer paso en el camino del revisionismo, a partir del cual las diferencias se fueron acentuando hasta su posterior estallido público. De esta manera, a despecho de algunas declaraciones formuladas entre setiembre y diciembre de 1956, los chinos enarbolan, hoy, la bandera que los soviéticos arriaron el día en que Jruschov leyó su célebre informe secreto; encienden cirios a Stalin, el camarada caído, y reivindican su memoria contra "las infamias del revisionismo contemporáneo".</p>
<p>Sin embargo, bien se podría decir que si razones no faltaron a Jruschov en el alegato, menos faltarían a los chinos para guardar a Stalin desconfianza eterna. Su política de panegíricos es una de las grandes paradojas de la historia de nuestro tiempo. Los chinos pagaron un caudaloso precio de sangre por los "errores" que Stalin cometió, y cuando ahora acusan violentamente a Thorez, secretario general del Partido Comunista Francés, por su obsecuencia hacia Moscú, y afirman que obedece al bastón de mando con la habilidad del papagayo¹, ¿cómo pueden olvidar que la gran carta de triunfo de Mao fue su independencia ante la voluntad omnipotente de Stalin? ¿Cómo pueden olvidar que Stalin guió a la catástrofe al Partido Comunista Chino, en 1927? ¿Acaso el "bastón de mando" fue inventado por Jruschov?</p>
<p>Cuando estuve en Shanghai, pregunté si era verdad que los comunistas habían entregado las armas de los sindicatos a Chiang Kai-shek, en abril de 1927, poniendo de esta manera la cabeza bajo el hacha del verdugo. Se me contestó que Chen Tu-hsiu, por entonces en la dirección del Partido, lo había ordenado, porque él era un oportunista de derecha. Pregunté entonces si Stalin no había dado, a su vez, las órdenes a Chen Tu-hsiu. Mi acompañante, Huang Chin-chia, un intelectual joven y lúcido, me dijo: No conozco la posición de Stalin en aquel período. Sé que cometió errores en conexión con la revolución china, el documento último lo dice; cuáles no sé. En efecto, en la segunda parte del "Comentario sobre la carta abierta del Comité Central del PCUS", se lee, tras los encendidos elogios al aporte imborrable del gran revolucionario: Al defender a Stalin, no defendemos sus errores. Hace mucho que los comunistas chinos experimentaron en carne propia las consecuencias de algunos errores de Stalin. De los errores de las líneas oportunistas de "izquierda" y de derecha cometidos en una u otra ocasión en la historia del PCCh, en cuanto a sus causas internacionales, algunos se produjeron bajo la influencia de ciertos errores de Stalin. A fines de los años veinte, durante los años treinta, y luego, a principios y mediados de los años cuarenta, los marxistas-leninistas chinos, representados por los camaradas Mao Tse-tung y Liu Shao-chi, opusieron resistencia a la influencia de estos errores de Stalin, eliminaron gradualmente las erróneas líneas oportunistas de "izquierda" y de derecha, y finalmente condujeron la Revolución China a la victoria. Sin embargo, en vista de que las ideas erróneas planteadas por Stalin fueron aceptadas y puestas en práctica por ciertos camaradas chinos y que los mismos chinos debimos asumir la responsabilidad por ello, nuestro Partido, en la lucha contra el oportunismo de "izquierda" y de derecha, siempre se limitó a criticar a nuestros camaradas que habían cometido errores y nunca echó la culpa a Stalin².</p>
<p>Desde el punto de vista de los chinos, los errores de Stalin son secundarios en relación a sus méritos, y las críticas formuladas de ninguna manera les impiden afirmar, como lo hacen en el mismo documento, que la lucha anti-stalinista, llevada a cabo por Jruschov, es una "infame intriga política". Pero desde otro punto de vista, al margen de las conveniencias tácticas circunstanciales que puedan llevar a los chinos a apoyarse en el omnipotente georgiano para combatir a su heredero, el párrafo citado cobra, sí, una gran importancia. Aunque sus términos sean un tanto ambiguos, implica el reconocimiento oficial, hecho público por primera vez, de que la estrategia de Mao, por fin victoriosa, se impuso contra la voluntad de Stalin, y no a su influjo.</p>
<p>Stalin estuvo siempre convencido de que conocía "el problema chino" mejor que los propios chinos, y elaboró sin descanso recetas y contra-recetas revolucionarias, para que fueran aplicadas en ese, su campo de experimentación preferido. Directamente desde su gabinete, o bien por medio de los delegados de la Internacional Comunista, disponía de los "asuntos chinos": ordenaba movilizar, organizar, retroceder, avanzar; castigaba o absolvía; decía hoy sí y mañana no. Defendiéndose de las acusaciones de la oposición, él mismo tuvo oportunidad de hacer profesión de fe de su autoridad: en el largo discurso pronunciado ante el pleno del Comité Central el 1º de agosto de 1927³, por ejemplo, los verbos exigir y ordenar son pronunciados repetidamente, aunque el discurso no se refiere a la Unión Soviética, sino al "problema de China". Pero como ese poder no le había sido conferido por derecho divino, no traía implícito el don de la infalibilidad. Podía equivocarse, y se equivocaba, puesto a teledirigir revoluciones ajenas. Así lo reconoce el propio Stalin, en el discurso citado, cuando dice: Kámenev y Zinóviev se han remitido aquí a solo y único telegrama enviado a Shanghai en octubre de 1926 y en el que se dice que, por el momento, antes de la toma de Shanghai, no se debe agudizar el movimiento agrario. Estoy lejos de reconocer que este telegrama constituya un acierto. Yo nunca he considerado ni considero que nuestro Comité Central fuese infalible. A veces se cometen equivocaciones, y este telegrama es, indudablemente, una de ellas. En la misma oportunidad, apenas cuatro meses después de la masacre de Shanghai, Stalin encontró motivos suficientes para congratularse de las grandes conquistas del Partido Comunista chino atribuyéndolas a la sabia orientación de la Internacional Comunista, es decir, de él mismo.</p>
<p>Partiendo de la base de que la revolución china no podía saltearse etapas, y que el orden cronológico del proceso tal como él lo concebía debía ser rigurosamente respetado, Stalin impuso al PC chino, en la época en que Chen Tu-hsiu era su cabeza visible, una línea de subordinación al Kuomintang, que desembocó en las represiones de Shanghai y Nankín. Ya anteriormente, desde 1926, los síntomas de la inminente traición habían aparecido. Un oficial de un navio de guerra había sido arrestado, acusado de "comunista", por orden de Chiang Kai-shek, y diversos hombres del Partido habían sido expulsados de puestos importantes en el Kuomintang. La madrugada del 3 de abril de 1927, finalmente, los comandos de gangsters organizados por Chiang y el cónsul francés, realizaron una "faena de limpieza" en las calles de Shanghai, bien munidos de metralletas y granadas. Acorralaron y acribillaron, casa por casa, a los comunistas, quienes, aliados de sus verdugos hasta la víspera, no tenían armas para defenderse. Los principales líderes locales del Partido, fueron arrestados y ejecutados en condiciones atroces; muchos de ellos, arrojados vivos a las calderas de las locomotoras.</p>
<p>La traición de Chiang Kai-shek había puesto en evidencia la fragilidad de las conclusiones de Stalin, quien, razonando mecánicamente con esquemas más fuertes que la realidad y la vida, había llegado a la convicción de que la burguesía debía ser una enemiga natural del imperialismo, en los países coloniales y semi-coloniales. El fracaso, sin embargo, no lo desanimó, y persistió todavía en esta línea política. Pasemos ahora a la segunda etapa, dijo. ¿Cuál es la misión de los comunistas? Convertir el Kuomintang de Wuhan en el centro de la lucha con la contrarrevolución y en el núcleo de la futura dictadura democrático-revolucionaria del proletariado y los campesinos⁴. El centro del movimiento revolucionario, decía Stalin, se ha desplazado manifiestamente de Cantón a Wuhan. Y más aún: Me parece que la oposición, que ahora habla de la independencia del Partido Comunista chino, y al mismo tiempo, pide o insinúa que se retire del Kuomintang y del gobierno de Wuhan, se desliza al camino de la "independencia" menchevique del período de 1905⁵. Resultará, creo, elocuente, comprobar que no sólo la oposición interna podía ser comparada con los mencheviques; muy lejos del Kremlin, tampoco Mao aprobaba la política de Stalin: Aunque Chiang Kai-shek había tomado ya el camino de la contrarrevolución y comenzado sus ataques contra el Partido Comunista en Shanghai y Nankín, Chen Tu-hsiu estaba todavía por la moderación y por hacer concesiones al Kuomintang de Wuhan. Pasando por encima de toda oposición, siguió una política pequeño burguesa y oportunista de derecha. Me encontraba entonces muy descontento de la política del Partido, sobre todo en el aspecto campesino⁶.</p>
<p>Stalin se opuso a la formación de los soviets, aún después de que naufragara la coalición de Wuhan, cuando la "izquierda" del Kuomintang anuló su acuerdo con los comunistas en Wuhan y los "expulsó" del Kuomintang y de un gobierno que dejaba de existir rápidamente⁷. En agosto de 1927, Mao fue enviado a Changsha, a organizar el movimiento que sería más tarde conocido como "levantamiento de la cosecha de otoño". Su programa implicaba la realización de cinco puntos, entre los cuales figuraban la toma del poder por el PC de Hunan, independiente del Kuomintang, y la instauración de un régimen soviético. En esa época, la Internacional se opuso a este punto de mi programa y no fue sino después que lo lanzó como consigna⁸. Poco tiempo antes, Stalin había condenado expresamente la formación de soviets, y había dicho que ese era el acostumbrado error ultraizquierdista de la oposición, que toma su propia conciencia y comprensión, por la conciencia y la comprensión de las masas de millones de obreros y campesinos⁹. Había previsto la formación de soviets, para "otra etapa", cuando la revolución china pasara, de la fase agraria, a la proletaria.</p>
<p>En diciembre de 1927, un brusco viraje de la política de la Internacional, culmina con el levantamiento de Cantón: los comunistas ocupan el poder durante tres días, hasta que son derribados y masacrados por las tropas de Chiang. Se producirá en seguida una nueva evolución en sentido opuesto, nuevos sueños de alianza estables con la burguesía anidarán en la cabeza de Stalin, y luego nuevos virajes hacia el "oportunismo de izquierda": una política de zigzags. Mao seguirá su propio camino, haciendo caso omiso de las desautorizaciones del Comité Central, y peleando alternativamente contra las desviaciones de derecha y de izquierda. Lo cual no ha impedido que un miembro del Comité Central y prominente figura del régimen, escriba años después: Los puntos de vista del camarada Mao Tse-tung sobre la naturaleza y las tácticas de la revolución china, se basan en las enseñanzas de Stalin, y son idénticos a los puntos de vista de Stalin. Más aún, él ha desarrollado, en la práctica concreta de la revolución china, las enseñanzas de Stalin con respecto a la revolución china¹⁰. Y el propio Mao, en Yenán, en el mitin de celebración de los sesenta años de Stalin, dijo: Es un gran acontecimiento que la humanidad haya sido bendecida con Stalin... esto es realmente una bendición. Ahora existen en el mundo una Unión Soviética, un Partido Comunista y también un Stalin. Así, los asuntos del mundo pueden ir bien¹¹. Corría el año 39. Tres años antes, Edgar Snow había entrevistado largamente a Mao y otros jefes comunistas, en Pao An, y había advertido que el culto a la URSS y a Stalin, estaba muy arraigado entre ellos, aunque no existían consejeros rusos en las fuerzas del ejército de liberación. Snow lo ha explicado por la necesidad que tenían los chinos de creer que no estaban solos en el combate.</p>
<p>Sea por lo que fuere, el culto persiste. Y persiste en el pueblo. Wang Ming-chi, un campesino del sur, hombre para "toda clase de tareas", me dijo que admiraba a Stalin, y que Stalin siempre ayudó a China; nos brindó un gran respaldo, siempre. En la fábrica Tu Ching-sheng, de Hangchow, un obrero que andaba por los sesenta años, Chi Kan-cheng, me sorprendió con su cálculo preciso: Stalin ha hecho muchas contribuciones durante la segunda guerra mundial. Organizó al pueblo soviético para derrotar al fascismo. Durante treinta o cuarenta años, hizo muchos méritos para la construcción socialista en la URSS: los méritos ocupan un 70% de su obra; los defectos, un 30%. En una palabra: los méritos son mayores que sus defectos, y sus defectos, muy pocos. Le pregunté si creía que la revolución china había seguido su propio rumbo, o si había sido orientada por Stalin. Me respondió: Bajo la dirección acertada del Partido, la revolución ha recorrido siempre nuestro camino. Pero también hemos aprendido de las experiencias ajenas: sólo las experiencias acertadas, aplicables a las condiciones de nuestro país. Mientras continuábamos la visita de la fábrica, el director me dijo que Chi no era miembro del Partido, pero había sido correcta su distribución de méritos y defectos de Stalin. Y agregó: El principal defecto de Stalin, fue que no terminó con los revisionistas y los dejó crecer a su lado. En la sala de telares, conversé con Pang Chao-ying, un operario joven, quien dijo que Stalin había hecho muchas contribuciones, tanto en la defensa de su país, como en la construcción del socialismo, y muchas contribuciones al movimiento comunista de todo el mundo. Pocos defectos, en relación a los muchos méritos. ¿Cuáles defectos? Yo leí el documento sobre la experiencia histórica de la dictadura del proletariado; sé que Stalin cometió algunos errores en las campañas para acabar con los contrarrevolucionarios. ¿Ayudó Stalin a la revolución china? Stalin ayudó a nuestro país en la construcción del socialismo. ¿Y antes del 49? También.</p>
<p>En la fábrica de maquinaria pesada de Wuhan, Tang She-chang, un obrero de los almacenes, confirmó que los errores de Stalin no eran tantos como sus méritos. Le pregunté si algunos de esos errores habían tenido algo que ver con la revolución china. Me contestó: No los he descubierto. Y en el combinado sidero-metalúrgico de la misma ciudad, Wu Chieng, otro obrero, me dijo que si Stalin no hubiera ayudado siempre a la revolución china, no colgaríamos su retrato en las paredes.</p>
<p>Sung Wen-bing, que trabaja en el montaje de maquinarias en la fábrica de grúas de Pekín, repitió que Stalin ayudó a la revolución china antes y después de la liberación, y cuando le pregunté si Stalin no había manejado, a su turno, el bastón de mando que hoy, según los chinos, empuña Jruschov, ante los demás partidos comunistas, me respondió: Aún no entiendo este problema.</p>
<p>Durante todo el viaje, no escuché una sola referencia a los errores que Stalin cometió en conexión con el proceso revolucionario chino, excepto la nebulosa frase de mi compañero Huang Chin-chia, en Shanghai. Y no escuché, tampoco, ninguna crítica a la hegemonía del Partido Comunista de la URSS sobre el movimiento comunista internacional, que se remontara a los tiempos anteriores al ascenso de Nikita Jruschov al poder.</p>
<h3 class="section-heading">EL BASTÓN DE MANDO TIENE SUS AÑOS</h3>
<p>Los chinos reprochan a Jruschov, permanentemente, una actitud patriarcal, arbitraria y tiránica, y lo acusan de mandar a otros partidos hermanos. Cuando Jruschov atribuye a los chinos el propósito de apoderarse de la dirección del movimiento comunista y revolucionario mundial, ellos contestan: ¿No equivale esto a declarar insolentemente que existe en el movimiento comunista internacional una supuesta "dirección" y que ustedes la tienen en la mano? Es un pésimo hábito de ustedes ése de dárselas de partido padre¹². Todavía en 1959, Liu Shao-chi escribía que la Unión Soviética está a la cabeza del campo socialista, y lejos de lamentarlo, lo celebraba. Pero la polémica, desarrollada a un ritmo de furia en estos últimos años, expresa un desafío a esa autoridad, que se ejerce no sólo sobre los países del campo socialista, sino también sobre los diversos partidos comunistas del mundo. Así, refiriéndose al Partido Comunista francés y, por extensión, a muchos otros partidos, los chinos señalan que su actitud coincidió, durante la crisis del Caribe en el 62, hasta el 25 de octubre: el PC francés llamaba a protestar contra los actos belicistas del imperialismo norteamericano, cuando cierta persona cometió primero el error de aventurerismo y después el de capitulacionismo, exigiendo al pueblo cubano aceptar humillantes condiciones que significaban el sacrificio de la soberanía de su patria¹³; entonces, los franceses, obedeciendo al bastón de mando, cambiaron de repente de posición y pasaron a hablar profusamente de la necesidad de hacer "concesiones razonables" y "compromisos sensatos" ante los actos agresivos de los EE. UU., porque para ellos es indiferente el que sea correcto o no dirigirse al Este o al Oeste, avanzar o retroceder. Repiten palabra por palabra lo que otro dice. Si otro da un paso, siguen el mismo paso¹⁴.</p>
<p>La polémica entre Pekín y Moscú ha brindado, en sus proyecciones internacionales, abundantes ejemplos de obsecuencia: los mismos secretarios generales de diversos partidos, que antes habían redactado informes defendiendo la tesis de la inevitabilidad de la guerra contra el capitalismo, y despreciando el "reformismo burgués", hoy son autores de informes no menos profusos en apoyo de la coexistencia, la emulación y el tránsito pacífico hacia el socialismo. Quienes fueron, en su hora, apologistas incondicionales de Stalin, y supieron pronunciar inflamados discursos —ojos húmedos, mano al pecho— sobre su incomparable gloria, abominan hoy, con indignación, de la memoria del ídolo caído. Los mismos que antes negaban la posibilidad de un acuerdo parcial de prohibición de las explosiones nucleares, y desenmascaraban los proyectos occidentales exhibiéndolos como trampas, hoy defienden el Tratado de Moscú y a viva voz afirman que es un contundente triunfo de las fuerzas de la paz.</p>
<p>Pero, ¿acaso se trata de un fenómeno nuevo? ¿Acaso en épocas de Stalin los partidos comunistas no seguían las orientaciones de la Unión Soviética como la sombra sigue al cuerpo? ¿No estaban tanto o más dispuestos que ahora a virar 180 grados en aras del internacionalismo proletario, a menudo confundido con el interés nacional de la URSS? Abundan los ejemplos: la segunda guerra mundial fue un conflicto inter-imperialista por el reparto de mercados y zonas de influencia, sólo hasta las vísperas de la ruptura del acuerdo germano-soviético; a partir de entonces, se convirtió en el sagrado combate de las naciones libres contra la agresión nazi-fascista, y la palabra "imperialismo" fue pundonorosamente enterrada hasta que el peligro pasó. Para los partidos comunistas latinoamericanos, la alternativa patria o anti-patria, sometimiento o liberación, fue desplazada por la pugna entre democracia y fascismo. Así, se perdió de vista la significación positiva de algunos caudillos nacionales como el argentino Perón o el boliviano Villarroel, descalificados por "fascistas", a la par que se concertaban alianzas con fuerzas conservadoras y entreguistas, y muchas huelgas justas eran condenadas como sabotajes organizados, a control remoto, desde Berlín, Roma o Tokio, contra las naciones del campo aliado. Civilización o barbarie: la neutralidad no cabía, y cualquier referencia a la explotación imperialista de nuestros países, era repudiada: un arma más para los enemigos de la democracia. Se llegó al colmo de glorificar al capital extranjero desde tiendas comunistas. ¿Y qué decir del chovinismo de gran nación que los chinos atribuyen a la Unión Soviética de nuestros días? ¿No hunde sus raíces bastante lejos en la historia? ¿Cuál fue la conducta de Stalin en el manejo de la guerra española? ¿Y cuál fue la conducta de Stalin frente a China? Intransigentes cuando se trata de juzgar los actos del gobierno de Jruschov, los chinos suelen dejar a un lado las llagas de su propia experiencia con Stalin. Recriminan ácidamente a Jruschov que no haya formalizado el reconocimiento del Gobierno Provisional de la República Argelina, hasta que su victoria era ya cosa hecha, y que haya postergado tal reconocimiento en función de las relaciones entre la Unión Soviética y Francia. Parecen olvidar, entonces, que Stalin no reconoció al gobierno de la República Popular China hasta trece días después de su proclamación, y que hasta último momento mantuvo relaciones diplomáticas formales con el gobierno de Chiang Kai-shek. Tanto es así, que poco antes de la derrota final de Chiang, cuando sus tropas abandonaron Nankín y se retiraron a Cantón, el embajador soviético, cumpliendo instrucciones, las siguió, a diferencia de la mayor parte de los embajadores, que se quedaron a esperar al ejército comunista.</p>
<p>Del mismo modo que cortó las piernas a la revolución griega, para evitar complicaciones internacionales a la URSS, Stalin hizo uso de toda su influencia para neutralizar el impulso revolucionario chino, al término de la guerra con los japoneses. Ya en la Conferencia de Yalta Stalin expresó su falta de confianza en China como poder mundial, y dijo que no alcanzaba a entender por qué el gobierno del Kuomintang y los comunistas no podían mantener un frente unido contra los japoneses. Él creía que Chiang Kai-shek debía asumir el liderato con tal propósito, pero consideraba necesario que nuevos líderes rodearan al Generalísimo¹⁵. Casi cuatro meses después, Harry Hopkins, alter ego de Roosevelt hasta su muerte, fue enviado a Moscú por el Presidente Truman, y sostuvo diversas entrevistas con Stalin. El quinto punto de su informe sobre la tercera reunión, dice: Él (Stalin) hizo la declaración categórica de que haría todo cuanto estuviera a su alcance para promover la unificación de China bajo el liderato de Chiang Kai-shek. Yendo más allá, declaró que ese liderato debía continuar después de la guerra, porque ningún otro era lo suficientemente fuerte. Específicamente, declaró que ningún líder comunista era lo suficientemente fuerte como para unificar a China. A despecho de las reservas que expresó acerca de él, propuso respaldar al Generalísimo¹⁶. En febrero de 1948, durante una reunión con los dirigentes yugoslavos, Stalin confesó que ciertamente, nosotros también podemos equivocarnos. Al finalizar la guerra con el Japón, invitamos a los camaradas chinos a firmar un acuerdo con Chiang Kai-shek para que llegaran a un "modus vivendi" con él. Estuvieron de acuerdo de labios para afuera, pero en cuanto volvieron a su país hicieron lo que les dio la gana: reagruparon sus fuerzas y pegaron fuerte. No cabe duda de que ellos tenían razón y que nosotros nos habíamos equivocado¹⁷.</p>
<p>Mientras discutía el destino de la revolución china sobre la mesa de negociaciones, Stalin había perdido de vista los motivos de las fisuras del frente del Kuomintang y los comunistas contra la invasión japonesa. El idilio con las grandes potencias aliadas, le había hecho reconciliar con su transitada política de los frentes democráticos: no alcanzaba a entender, según decía, por qué los chinos persistían en pelearse entre sí. Pero Mao, en cambio, no podía llamarse a engaño. El enemigo no había olvidado sus objetivos de largo alcance: Para el gobierno de Chiang Kai-shek, derrotar al Japón era ciertamente una meta, pero secundaria... Chiang prefería ver los territorios chinos caer en manos japonesas, antes que verlos conservados o reconquistados por los comunistas¹⁸. En el transcurso de la guerra, Chiang Kai-shek, el mismo Chiang Kai-shek a quien Stalin postularía en Yalta como líder capaz de realizar la unidad nacional de China, había llevado a cabo varias sangrientas campañas contra los comunistas, atacándolos, en más de una ocasión, en combinación con los imperialistas japoneses. A partir de 1943, el Kuomintang inauguró la política maquiavélica "de los caballos de Troya": más de cuarenta generales del ejército nacionalista, pasaron con armas, hombres y pertrechos, a las órdenes de Wang Ching-wei, aliado de los japoneses. Estas fuerzas eran el 60% de las tropas chinas puestas al servicio de los invasores, y fueron utilizadas, casi siempre, contra las regiones liberadas. Una vez derrotados los japoneses, constituyeron un refuerzo formidable para el Kuomintang en la guerra civil.</p>
<p>¿Es posible hablar de errores? ¿O se trata, más bien, de los frutos inevitables de la estructura misma del movimiento comunista internacional, tan vertical y autoritaria como la estructura de cada uno de los partidos? En todo caso, la situación ciertamente no ha empeorado. Las opiniones de Stalin sobre cualquier tema, se transformaban mecánicamente en verdades universales que los comunistas aceptaban a ciegas, como mandamientos. Desde entonces, el agua ha corrido bajo los puentes: durante la primavera de 1963, Jruschov lanzó su violenta diatriba contra el arte abstracto, y las obras no figurativas fueron suprimidas de los museos y las salas de exposiciones en la Unión Soviética, pero, fronteras afuera, Palmiro Togliatti pudo decir en voz alta que discrepaba con la explosión de Nikita, y Gomulka declaró: No sé nada de arte abstracto; en consecuencia, no puedo opinar. Los checos, por su parte, afirman que el discurso no les sirve; ellos tienen su propia tradición de arte moderno, y en la actualidad, la gran mayoría de los pintores trabaja lejos, muy lejos, del naturalismo. Visité muchas galerías y salas de exposiciones en Praga; del académico "realismo socialista" no queda más que algún que otro residuo, pieza exótica, sospecho, de aquí a unos pocos años.</p>
<p>Burlándose de quienes repiten como propia la voz del ventrílocuo, los chinos dicen: Para estas personas, la declaración de que todos los países, tanto grandes como pequeños, son independientes e iguales, no es más que una frase hueca, y los cientos y tantos países del mundo deben dejarse mandar por las dos grandes potencias. En opinión de estas personas, la declaración de que las masas populares son las que hacen la historia, no es sino otra frase hueca, y todos los problemas de la tierra podrán ser solucionados cuando estos dos "grandes personajes" se sienten a conversar. ¿No es esto chovinismo de gran nación?¹⁹ El "chovinismo de gran nación" y el "chovinismo de gran partido" o de "partido padre", era practicado, como se ha visto, mucho más rígidamente por Stalin que por Jruschov, quien vive una situación histórica favorable a la distensión, que no era, por cierto, la situación que a Stalin le tocó vivir. En su documento "Sobre el problema de Stalin", los chinos, significativamente, olvidan mencionar, entre los errores cometidos por el "maestro de la revolución internacional", su actitud frente a Yugoslavia. Siete años atrás, en cambio, cuando la "camarilla titoísta" no era todavía calificada de "bárbara dictadura fascista", decía el Renmin Ribao que Stalin había dado algunos consejos erróneos en el movimiento comunista internacional y, en particular, tomó una decisión errónea en la cuestión de Yugoslavia²⁰. Como cuentan con una experiencia propia tan rica, los chinos no pueden ignorar que los países de Europa oriental eran mantenidos, en épocas de Stalin, en régimen de ocupación, y que sus riquezas se transferían a manos rusas a través de las sociedades mixtas y los acuerdos comerciales desventajosos; tampoco pueden ignorar que la tendencia a dirigir desde algún escritorio del Kremlin los asuntos de los países satélites, persistió aún después de la muerte de Stalin, y que la insurrección húngara de 1956 fue, esencialmente, el fruto explosivo de las contradicciones engendradas por esa situación. Sin embargo, los chinos se atribuyen el papel de instigadores de la represión que ensangrentó las calles de Budapest, a la par que condenan, como "error de chovinismo de gran potencia", el traslado de tropas soviéticas para someter por la fuerza a los polacos.</p>
<h3 class="section-heading">LA SOMBRA DE IVÁN EL TERRIBLE</h3>
<p>Si para los chinos el monocentrismo del movimiento comunista internacional parece ser un fenómeno nuevo, para los soviéticos no parece ser en absoluto, ni viejo ni nuevo. Resultaría impensable, claro está, que Jruschov pudiera dar la razón a quienes impugnan su manejo del bastón de mando, pero no conozco tampoco críticas formuladas, en profundidad, retrospectivamente: los ataques al culto a la personalidad lanzados a partir del Vigésimo Congreso, no han penetrado en lo hondo de los vicios de estructura que el stalinismo introdujo en el sistema de las relaciones entre los diversos partidos comunistas del mundo, y entre los países del bloque socialista. El inventor de la guillotina murió guillotinado: habría de ser con métodos típicamente stalinistas que la condena de Stalin, proclamada por el PC de la URSS, sería repetida a coro por casi todos los demás partidos.</p>
<p>Durante mi viaje por la Unión Soviética, no faltó la oportunidad de comentar los errores cometidos por Stalin en relación con la revolución china. Mis acompañantes, se cuidaron muy bien de admitirlos, y, por el contrario, me dijeron: ¿Sabía usted que los chinos nos traicionaron durante la segunda guerra mundial? Y me reprodujeron informaciones proporcionadas por un alto miembro del Partido, en una conferencia reciente: a estar a su testimonio, Mao se habría negado a llevar adelante una ofensiva contra los japoneses en el nordeste, en momentos en que Stalin se lo había aconsejado con el fin de hacer posible la desmovilización de algunas divisiones soviéticas que eran necesarias en el frente occidental contra Hitler. De esta manera, los chinos, traicionando los principios del internacionalismo proletario, habrían actuado de manera egoísta, con los ojos puestos en sus propios intereses, reservando fuerzas para la guerra civil que se presentía.</p>
<p>La destalinización en la URSS apunta en otra dirección: se orienta, fronteras adentro, hacia la superación de los métodos arbitrarios del temible georgiano, simultáneamente con el aflojamiento de las presiones económicas internas; el desarrollo ha hecho posible que la dura etapa de las "marchas forzadas" quedara atrás. Ya se sabe que Nikita Jruschov significa, precisamente, el fin de los largos años de sacrificio y espera y el fin, también, del encerramiento. Las ventanas que dan al mundo occidental se han abierto: la distensión interna, el proceso del deshielo, permite a la vez el descubrimiento de algunas atractivas luces del modo de vida del lado de acá de la llamada "cortina de hierro". Esta nueva situación hace nacer, como consecuencia, nuevos apetitos, sobre todo en las recientes generaciones. Los consumidores golpean, ahora, impacientes, sobre las mesas: ha llegado su turno, y aunque el nivel de vida del pueblo soviético se ha elevado considerablemente en los últimos años, los jóvenes no tienen por qué tener en cuenta pasadas penurias que no padecieron en carne propia. Este inmenso país que se ha convertido, después de casi medio siglo de revolución, en la segunda potencia industrial del mundo, enfrenta hoy el desafío de una población ansiosa de disfrutar la vida en tiempo presente, después del largo tiempo en que sus demandas hubieron de ser frenadas para permitir el desarrollo de los recursos de capital. Jruschov ha prometido "vida desahogada para todos" de aquí a muy poco tiempo, y algunos observadores juzgan imposible cumplir, al unísono, con las presiones del consumo y con los miríficos objetivos del crecimiento formulados en 1960, cuando el hombre número uno del Kremlin dijo: "Dentro de veinte años, la industria de la URSS producirá casi el doble de lo que produce hoy todo el mundo no socialista." Una tremenda responsabilidad ha recaído en los hombros del heredero de Stalin, sobre todo teniendo en cuenta que los problemas del campo están muy lejos de haber sido resueltos, y las fórmulas por él ensayadas para dar impulso a la agricultura, han desembocado en un estrepitoso fracaso.</p>
<p>A estar a las cifras oficiales, desde 1957 a 1961 se facilitaron nuevas viviendas a cerca de cincuenta millones de personas. Pero el problema de la vivienda era tan agudo, que aún subsiste: son largas, todavía, las listas de ciudadanos que esperan turno para que el gobierno les proporcione techo adecuado a sus necesidades. En el rubro vestimenta, queda mucho por hacer, ciertamente; la ropa es bastante ordinaria, y cara, pero ahora uno descubre, por vez primera, la elegancia en las calles de las ciudades: damas haciendo precario equilibrio, con sus zapatos de taco alfiler, sobre la nieve, y caballeros que han sustituido los tradicionales gorros de astrakán, por vistosos sombreros tiroleses, con plumita y todo.</p>
<p>La penetración de abundantes films, discos, libros, clencos artísticos y exposiciones ambulantes provenientes de Occidente, implica la penetración de las modas, para bien o para mal; así como el anquilosado estilo romántico de la coreografía rusa sufrió el impacto de la visita del ballet moderno de los EE. UU., y los pintores no escaparon a la influencia del arte abstracto occidental, los muchachos que simplemente quieren divertirse aprenden a bailar, con dificultad y entusiasmo, la bossa nova y el twist. El fox-trot ya no se baila con ritmo de polka, y los valses han dejado paso a la música prohibida. Escuché jazz moderno en plena Siberia y canciones estrepitosas por las radios de Moscú.</p>
<p>También escuché, y esto es mucho más importante, críticas pronunciadas en voz alta contra las deficiencias del régimen. Los rusos aplauden enloquecidamente los números de sátira de la burocracia, en los teatros de variedades: ahora cualquier humorista puede estar seguro que basta la pantomima de un diputado que va en coche, olvidado de sus electores, para arrancar truenos de risa de aprobación al público; nada mejor que imitar a un funcionario con mucho poder en las manos y aserrín en la cabeza, para que una ovación sacuda la sala. Los lectores devoran, cada mañana, las dos páginas de críticas y denuncia que "Izvestia" publica. Una nueva experiencia de liberalización ha sido puesta a prueba, al influjo de condiciones internas y externas favorables, y no me parece imposible que vastos sectores de la población identifiquen a Stalin, hoy día, con una superada pesadilla de cinturones apretados y bocas amordazadas. A ello contribuye, sin duda, la política del gobierno, orientada a la destrucción del mito. Estábamos hartos, me dijo un día Georgi, mi acompañante: Lo veíamos a toda hora, desde que nos despertábamos por la mañana, hasta que nos acostábamos por la noche. Ahora eso se acabó.</p>
<p>Stalin había decretado, en su hora, la inexistencia de casi toda la vanguardia del 17; hoy, él mismo se suma a la galería de los borrados de la historia. El gobierno ha suprimido su imagen de todos los museos de la revolución, al mismo tiempo que algunos de los malditos de ayer vuelven a ocupar un sitio de honor, llevados de la mano por la gloria de la rehabilitación. El rostro resplandeciente del Mariscal Tujachewski, por ejemplo, se encuentra entre los retratos de otros héroes soviéticos; siguen ausentes, en cambio, Trotski, Zinoviev, Bujarin, y otros. Cuando pregunté acerca de ellos en Moscú, recibí la misma respuesta que en Kiev, Leningrado o Tbilisi: Sí, bueno, existieron, hicieron lo suyo en un período de la revolución, pero también es cierto que nos hicieron mucho daño. ¿Para qué recordarles? No queremos verles las caras. Y sobre Stalin: Por su culpa, hemos sufrido mucho. Stalingrado es ahora el nombre de una de las estaciones del subte de París, pero ha dejado de ser una ciudad soviética, y Stalin en persona sigue siendo héroe y maestro sólo para los chinos y los albaneses. No sé si resultará significativo que en esos museos soviéticos de donde Stalin está ausente, como si durante cinco lustros la URSS no hubiera sido dirigida por nadie, se encuentra uno, en cambio, con una vieja foto de los albores de los años veinte, donde aparece Nikita Jruschov, un joven comisario político del ejército rojo, en la época de la guerra civil.</p>
<p>Con el cadáver de Stalin, los dirigentes soviéticos han retirado del Mausoleo, todo un período de su historia, por el cual sienten vergüenza, repugnancia y miedo; quizás, también remordimientos. Los chinos saben dónde golpean, cuando recuerdan a Jruschov el tiempo en que él mismo aplicaba, "con particular celo", la política del dictador aborrecido.</p>
<h3 class="section-heading">LA EDAD DEL SACRIFICIO</h3>
<p>Más allá de la conciencia de culpa que pueda o no pesar sobre los dirigentes soviéticos actuales, la lucha contra los excesos del dogmatismo, es un hecho. El régimen necesita sacudirse la inercia de la alienación stalinista, que constituye todavía un freno a los procesos de cambio que se están operando: este país que resurgió de las cenizas de una guerra donde perdió más de veinte millones de hombres, quiere y necesita abocarse de lleno a la construcción de un sistema de abundancia y libertad para disfrutarlo ya; palpable, real, no la Utopía que aguarda tras un futuro sublime pero inalcanzable para las generaciones actuales. En la era del equilibrio atómico, la paz es, por lo tanto, su objetivo fundamental, y el aflojamiento de la tensión interna, una condición insoslayable para la apertura de las esperanzas clausuradas por los largos años de sacrificio y terror. ¿Será de extrañar, entonces, que esa política obligue a negar a Stalin y al estado policial que creó? ¿Podrá resultar inexplicable que Jruschov salude como "campeones de la paz" a ciertos jefes imperialistas, aunque al mismo tiempo asegure que la guerra es inseparable del imperialismo? ¿Y sus invocaciones a la legalidad, a la posibilidad del tránsito pacífico, sus elogios del parlamentarismo? El "espíritu de Camp David" en la política exterior, que subordina todo a la necesidad de evitar la guerra, encaja simétricamente con el aflojamiento de la arbitrariedad en la política interior; esta parece ser, con todos los matices y contradicciones que se quiere, la realidad actual de la Unión Soviética. Distinta, por cierto, de la realidad actual de China Popular, que vive la etapa difícil de la construcción del socialismo: en los primeros peldaños, todavía, de una larga ascensión que los soviéticos han realizado ya.</p>
<p>Aunque China corre con el viento a favor de las grandes transformaciones operadas, en estos treinta y pico de años, en el campo de la ciencia y la técnica, no hay que olvidar que los puntos de partida de ambas revoluciones fueron distintos; en 1928, en vísperas del primer plan quinquenal, lanzado Stalin a la construcción del socialismo en un sólo país, la URSS tenía un ingreso real per capita aproximadamente cuatro veces mayor —según Rostow— al de China en 1952. Sin duda, buena parte de las dificultades del proceso soviético nacieron del hecho de que la revolución tuvo que crecer sola y bloqueada por el enemigo, pero pese a que la relación de fuerzas en el mundo ha cambiado, la situación actual de China, con ser diferente, no es mucho mejor en este sentido. Desde 1960, se puede decir que los comunistas chinos han quedado abandonados a sus propias fuerzas en la gigantesca tarea de industrializar un país donde más del 80% de la población vive todavía en el campo, trabajando por medios rudimentarios y donde la revolución tuvo que saltar desde los albores de la edad del hierro a la época moderna, sin etapas, en los catorce años y medio que lleva en el poder. La marcha veloz de la industrialización, partiendo de los arados de madera para llegar a la producción en serie de jets, impone al pueblo chino una vida de renunciamientos y esfuerzos elevados al máximo de la tensión, que se asume con fervor en nombre del más allá, próximo en el tiempo, que la teología del comunismo augura; sin embargo, la ausencia de maquinarias y capitales sigue haciéndose sentir a pesar de los éxitos obtenidos, y no parece probable que las actuales generaciones puedan recoger beneficios en proporción al sacrificio que están realizando. Mucho se ha hecho, a ritmo aceleradísimo, pero mucho, mucho más, queda por hacer. Antes de la liberación, para poner un ejemplo, sólo había 1.200 tractores en todo el país; hoy, hay más de cien mil, pero apenas un 8 ó 9% de la tierra cultivada se trabaja mediante tractores.</p>
<p>China no puede darse el lujo de desmovilizar el esfuerzo nacional, rígidamente concentrado en la superación del subdesarrollo. "Lo que para un hombre es alimento, es veneno para otro", ha señalado con acierto Paul Baran: el proceso de destalinización, necesario y positivo en el tránsito de la URSS hacia una democracia socialista, es completamente prematuro para China, por otra parte, nunca hubo "stalinismo" en el sentido que los soviéticos dan al término.</p>
<p>No existe en China, o, si existe, yo no la descubrí, la atmósfera irrespirable de terror y represión de las épocas de Stalin en la Unión Soviética. Ahora que han sido corridas las cortinas del silencio cómplice, se ha confirmado que Stalin, convencido de que era Stalin, hizo empalidecer la fama de Iván el Terrible. Gustador de los crímenes gratuitos con furia de poseído, obligaba a sus cortesanos a aplastarse recíprocamente, como condición para sobrevivir. Una vez realizada la faena de la traición y la delación, ninguno de los burócratas que lo rodeaban, podía estar, sin embargo, seguro de lo que habría de ocurrir al día siguiente. Pocos funcionarios, como Nikita Jruschov, tuvieron la fortuna de conservar la cabeza sobre los hombros, saltando entre purga y purga.</p>
<p>Mao Tse-tung no es, como era, sí, Stalin, el eje del movimiento comunista internacional, y no administra su omnipotencia frenando o impulsando revoluciones aquí y allá; en el ámbito interno, no goza, tampoco, de un poder absoluto. Todos le reconocen y veneran como caudillo de la revolución y líder del pueblo chino en la tarea de la construcción del socialismo, pero no siempre sus iniciativas cristalizan en posiciones de gobierno, por la sencilla razón de que el gobierno no es solamente Mao. Quienes discrepan con la línea oficial, no son eliminados: la oposición de Chen Yun a la política del gran salto hacia adelante, sólo le costó un alejamiento temporario del poder; el Ministro de Defensa Peng Teh-huai, a quien se atribuía una tendencia favorable a una mayor colaboración militar con la URSS, perdió su puesto en 1959, pero continúa siendo miembro del Comité Central del Partido. Y Li Li-san es, hoy día, Ministro de Trabajo del régimen, aunque había discrepado con Mao, explosivamente, treinta años atrás²¹.</p>
<p>Por otra parte, para quienes sostienen que Stalin fue nada más que la manifestación del poder de la burocracia que se adueñó de la revolución después de la muerte de Lenin, podrán resultar significativas las vacunas que los chinos aplican en su organismosocial, para evitar el desarrollo y la consolidación de una burocracia capaz de operar, con privilegios propios, como sector diferenciado en la sociedad. La terapéutica por el trabajo manual y las sesiones de crítica y autocrítica, integran fundamentalmente un sistema para la superación de los sentimientos de la inseguridad y la duda en el seno del pueblo, pero son, además, medios de lucha contra los gérmenes de la vocación burocrática. Un mes por año, todos los trabajadores intelectuales que no han alcanzado la vejez, y los estudiantes, están obligados a realizar trabajos manuales, por lo general en las comunas populares o en la construcción de obras capitales, como puentes, represas o caminos. Para evitar la fractura entre dirigentes y dirigidos, y la oposición entre trabajadores "intelectuales" y trabajadores "manuales", en las fábricas, un día por semana, el personal de dirección y los técnicos, trabajan en función de simples obreros.</p>
<p>Ignoro si Stalin puede ser o no considerado un mal necesario, impuesto por las condiciones en que hubo de desarrollarse la revolución rusa, expresión del obligado sacrificio del consumo y la colectivización forzosa; lo cierto es que a determinada altura del proceso, sus abusos perdieron todo punto de contacto con las justificaciones que la historia puede, en perspectiva, proporcionar. Con mano de hierro, la cabeza del aparato burocrático fortaleció a sangre y fuego sus bases de sustentación. ¿Atraviesa China su etapa "stalinista"? La revolución china vive, sin duda, una fase autoritaria, de rígida centralización del poder y de agobiante presión sobre el consumo. Pero parece poco probable el desarrollo de una casta todopoderosa de administradores y políticos agrupados en torno del trono de Mao; no sólo por las diferencias ya anotadas, a vuelo de pájaro, sino también porque el poder burocrático nace cuando las circunstancias materiales hacen posible su aparición. Aunque los ingresos son distribuidos, en China, en proporción al trabajo aportado y no de acuerdo con las necesidades de cada cual, las distancias entre el nivel de los técnicos, los funcionarios oficiales, los trabajadores calificados, los políticos y los intelectuales por una parte y por la otra la mano de obra no especializada, no son, como eran en la URSS, abismales. A través del testimonio de algunos visitantes que estuvieron en la Unión Soviética en 1956, sé que por entonces, todavía los dirigentes de una fábrica, por ejemplo, llegaban a cobrar salarios nueve y diez veces más altos que los obreros al ingresar. Me consta, a estar a lo que se me dijo recientemente durante mi propia visita a la Unión Soviética, que se han puesto en marcha las medidas tendientes a superar ese desequilibrio tan pronunciado. Pero en China, que vive hoy día la etapa que podría ser asimilada al período más duro del proceso soviético, las diferencias entre los ingresos de los dirigentes y de los dirigidos, son mucho menores: el doble, y en algunos casos el triple; no más.</p>
<p>Los uniformes, grises o azules, que desde el punto de vista de algunos expresan la pesadilla de la aniquilación de la personalidad, el hormiguero, todos iguales entre sí, son, en realidad, nada más que un índice de pobreza compartida. A cambio de ocho yuanes, una cantidad insignificante de dinero, cualquiera puede vestirse decentemente. Y si los trabajadores llevan con comodidad esos trajes sencillos, abotonados hasta el cuello, ¿por qué los hombres de gobierno, los administradores o los técnicos, habrían de hacer ostentación de su situación económica un tanto mejor?</p>
<p>La disciplina y el sacrificio que la hora exige, no son maldiciones recaídas sobre la mayoría mientras una minoría, enquistada en la cumbre, disfruta de una posición de privilegio; el compromiso, heroico y doloroso, de la creación de un mundo nuevo, ha sido asumido por la colectividad, y las penas, como las esperanzas, se comparten.</p>
<p>Cabría agregar que si en China los aspectos más lamentables del régimen terrorista de Stalin, han sido evitados, ello obedece más a las propias características del proceso revolucionario nacional, que a la transformación de las condiciones que en aquella época, la época de Stalin, pudieron hacer necesario el ejercicio de un poder despótico. China está, también, sola: desde el verano de 1960, perdió el abrigo protector y solidario de la familia socialista.</p>

<blockquote class="epigraph">¿Por qué se retiraron los técnicos soviéticos de China? ¿Acataron órdenes de su propio gobierno o fueron expulsados? ¿Decidieron irse por su voluntad? El 14 de febrero de 1950, fue firmado el tratado soviético-chino de amistad, unión y ayuda mutua. Ambas partes contratantes se comprometieron a "prestarse toda la ayuda económica posible... en el espíritu de amistad y colaboración". La polémica ideológica ha puesto al descubierto el naufragio de la tal "colaboración": Ayuda desinteresada según Moscú, buen negocio según Pekín. El cronista interroga, transitando un laberinto de contradicciones.</blockquote>
<p>"Ellos se fueron porque su gobierno lo dispuso así. Pero el retiro de la ayuda fue una ayuda: ahora nos apoyamos en los propios esfuerzos y no dependemos para nada del extranjero", me dijo Po I-po, Vice-Primer Ministro de China Popular, a propósito de la evasión de los técnicos soviéticos y la ruptura de los acuerdos y contratos "por parte de la URSS". Yung Lung-kwei, Secretario General del Concejo para la Promoción del Comercio Internacional, sonrió: "¿Ayuda desinteresada?"; con chispas en los ojos, dijo: "Nada más que un negocio, dicho sea con franqueza; en términos diplomáticos, ayuda mutua". Semen Skachkov, presidente del Comité Estatal para las Relaciones Económicas con el Exterior, de la URSS, me hizo escuchar en Moscú la campana soviética: "¿Cómo se puede entender que nuestra ayuda era interesada? El 13 de febrero de 1960, Mao Tse-tung, Liu Shao-chi, Chou En-lai, Chu-Te, hablaron de la ayuda fraternal del pueblo soviético. ¿Puede la ayuda fraternal ser interesada? Y le diré que los técnicos se fueron por iniciativa del gobierno chino. La URSS no hizo más que cumplir con las sugerencias y los deseos del gobierno de la República Popular China".</p>
<h3 class="section-heading">LAS PRIMERAS LLAMARADAS</h3>
<p>Aquel verano de 1960, fue un verano explosivo. En las conversaciones de Bucarest, las divergencias entre Moscú y Pekín cobraron estado público; poco después, se prohibió la publicación y distribución de las revistas consagradas a la exaltación de la amistad chino-soviética, y un miembro de la embajada china fue expulsado de la URSS; hubo disturbios en las fronteras. Entonces, según los chinos, "repentina y unilateralmente, el gobierno soviético decidió retirar de China a todos los especialistas soviéticos, en el lapso de un mes, rompiendo de esta manera centenares de acuerdos y contratos". Porque "por lo visto, la dirección del PC de la URSS creía que, sólo con blandir el bastón de mando, apandillar a unos matones para realizar un ataque envolvente y ejercer una enorme presión política y económica, podía obligar al PC de China a renunciar a su posición marxista-leninista y de internacionalismo proletario y someterle a sus mandatos revisionistas y de chovinismo de gran potencia. Pero el PC de China, y el pueblo chino, probados y templados durante largo tiempo, no pueden ser derrotados ni aplastados. Se han equivocado totalmente en sus cálculos, los que han intentado hacernos hincar la rodilla."¹ En cambio, según los soviéticos "no somos nosotros los culpables de que la R P Ch hayan limitado la colaboración económica con la Unión Soviética y de tal manera hayan privado al pueblo chino de gozar de la ayuda desinteresada de la Unión Soviética"; además, "el gobierno soviético ha explicado ya repetidas veces las causas por las cuales se vio obligado a retirar de China a sus especialistas, a los que las autoridades chinas pusieron en condiciones que excluían la posibilidad de trabajar normalmente y eran lesivas para la dignidad humana"².</p>
<h3 class="section-heading">LAS CARAS Y LAS MÁSCARAS DE LA VERDAD</h3>
<p>En la polémica que sacude al mundo comunista, el problema del retiro de los técnicos y la disminución de la ayuda soviética a China, es uno de los puntos de fricción más calientes. Ninguna de las partes oculta su irritación: los soviéticos acusan a los chinos de ingratitud, los chinos acusan a los soviéticos de egoísmo. Hay, sin duda, un revés de la trama que permanece oculto y que difícilmente podrá ser arrancado de las sombras: las versiones sobre los hechos no coinciden, se oponen entre sí, cada cual reconstruye la historia según su propio punto de vista.</p>
<p>En Moscú, conversé informalmente con algunos de los técnicos que "recibieron las primeras láminas de metal de las plantas siderúrgicas de Anshan, Wuhan, Paotow, construidas con la ayuda de la Unión Soviética, fueron pasajeros de honor del primer automóvil de la fábrica de Changchun, manejaron el primer tractor de la fábrica de Wuhan, y enseñaron con todas sus fuerzas a los obreros chinos a crear una nueva producción manejando los equipos enviados por la URSS"³. Estos técnicos se quejaron de que los chinos no les hacían caso.</p>
<p>En Wuhan, una ciudad industrial del centro de China, los directores del combinado sidero-metalúrgico, me dijeron: "La mayoría de los especialistas trabajaba en muy buenas relaciones con nosotros. En la nota del gobierno soviético, se decía que los técnicos se retiraban porque no los habíamos tratado con el debido respeto. Sin embargo, habíamos aplicado más del 90% de sus sugerencias. Uno de los técnicos, asombrado, nos vino a preguntar por qué debía retirarse; le dijimos que mejor le preguntaba a su gobierno, que había enviado la orden". Los obreros me señalaron, orgullosos, los testimonios de su victoria: Antes, me dijeron, en el 58, el 60% de las máquinas del combinado eran soviéticas; ahora, sólo el 10%. "Esta estructura de alto horno la estamos construyendo nosotros; también la tapa y toda esta montaña de piezas. Esta pala de excavación de minas, la hicimos nosotros; nosotros estamos produciendo los repuestos de las máquinas soviéticas, que ellos nos niegan ahora. Ellos construyeron dos altos hornos; nosotros estamos haciendo el tercero por nuestra cuenta. Según los acuerdos, la URSS debía proporcionarnos instalaciones para seis hornos de carbón de coke: sólo nos dieron dos y algunas partes de dos más. Ahora hay cinco, y el sexto está en construcción. Y aunque el dinero que pagábamos por las máquinas era bueno en todos los casos, no todas las máquinas eran buenas. Mire estos dos tornos: pierden aceite. Eso es como si un hombre perdiera la sangre. Algunos de los vagones para la carga del carbón, se deforman por el peso. El rendimiento de las turbinas de cobre y acero que ellos nos proporcionaron antes de agosto del 60, variaba entre uno y tres meses; las nuestras duran ocho".</p>
<p>En Wuhan me aseguraron que los especialistas rusos eran tratados con consideración y simpatía; ganaban, me dijeron, cuatro veces más que el Presidente Mao. Su gobierno, el gobierno de la URSS, les habría ordenado retirarse sin tener en cuenta que las tareas quedaban a medio hacer y las fábricas a medio construir; una amenaza de parálisis se cernía, a fines del 60, sobre la nueva industria china. Un par de ejemplos, del combinado que visité: "Algunos expertos contratados por un año, sólo trabajaron tres meses. El técnico de la máquina transportadora de bloques de acero incandescente, debía darnos veinte clases; sólo nos dio una".</p>
<h3 class="section-heading">SÍ, NO, SÍ, PERO NO</h3>
<p>No sólo en Wuhan. Dondequiera que uno vaya, en China, escucha hablar de la URSS como de un país enemigo; se dice: "Ellos, 'los reaccionarios', 'los revisionistas'". Se muestra al visitante, como si estuviera recorriendo un campo de batalla, las máquinas soviéticas en las fábricas y se dice: "No nos enseñaron cómo manejarlas; aprendimos por nuestra cuenta y ahora la producimos nosotros", o bien: "Esa, no sirve para nada. Nos vendieron muchas máquinas que no sirven para nada", y también: "Después del retiro de la ayuda, no nos suministran más piezas para los repuestos de esta máquina, ni de ésta, ni de esta otra; los tenemos que producir por nuestros propios medios". Se señala las chimeneas: "Dejaron esa planta a medio construir. Se fueron"... Y se exhibe, como si se tratara de galones o medallas, las máquinas chinas que los obreros armaron a fuerza de ingenio y sacrificio, a veces con trastos viejos remendados como se pudo.</p>
<p>Los soviéticos destacan, por su parte, que "solamente en seis años (de 1954 a 1960) la Unión Soviética suministró a China casi millón y medio de toneladas de laminados siderúrgicos, más de 300.000 toneladas de tubos, 14 millones de toneladas de petróleo y sus derivados, más de 50.000 camiones, 7.200 tractores, y 850 cosechadoras combinadas. La importación de estos artículos y maquinarias desempeñó un papel extraordinariamente grande en la realización de los planes de industrialización de China. Con la ayuda técnica de la Unión Soviética, en la República Popular China se han construido cerca de doscientas empresas industriales importantes y de primerísimo orden, que han formado el armazón de la industria china. Esto supone casi los 2/5 del total de empresas industriales construidas en los países socialistas con la ayuda de la URSS"⁴. Señalan como una clara demostración de internacionalismo proletario, la entrega de 21.000 juegos de documentación científica y técnica, casi gratis. Skachkov me aseguró que "los chinos sólo pagaban el costo del papel y la impresión. Las licencias se entregaban desinteresadamente. Usted sabe que los equipos y las instalaciones industriales son vendidos por los países capitalistas a cambio de divisas, y no sin determinadas condiciones de orden político y militar. Cobran divisas, también, por las licencias; nosotros, a nuestros camaradas chinos, no les cobrábamos".</p>
<p>El testimonio de la "ayuda del hermano mayor soviético" ha quedado, según los portavoces de Moscú, en cada provincia de China, en cualquier empresa industrial importante, en las granjas del Estado del nordeste y en las montañas del sudoeste, ricas en minerales; junto a los altos hornos de Anshan, a lo largo de los puentes que atraviesan los ríos y en los puertos del litoral oriental; en el reactor nuclear experimental de Pekín y en los algodonales de Sintsiang; por todas partes. "Es difícil olvidarlo", dicen.</p>
<p>La URSS prestó asistencia a China, a través de la realización de proyectos para la construcción de plantas eléctricas, fábricas diversas y muchas otras obras; suministró equipos, instalaciones y maquinarias, y envió a los especialistas. "Todo —subraya Skachkov— al nivel de los últimos adelantos de la técnica moderna. Y hay que tener en cuenta que proporcionábamos esta ayuda, cuando estábamos realizando todavía intensos trabajos para cumplir con los planes quinquenales del período de post-guerra, a fin de liquidar las consecuencias de la gran guerra patria. En aquel período, nosotros, para suministrar tanta colaboración a China, dilatábamos el equipamiento de nuestras industrias. La fábrica de automóviles de Changchun, por ejemplo, está equipada con maquinarias más modernas que nuestras propias fábricas. Y nosotros proporcionamos esas maquinarias".</p>
<h3 class="section-heading">LAS OPINIONES DE LOS NÚMEROS</h3>
<p>Skachkov no quiso darme cifras; dijo que sería muy difícil estimar el total de la ayuda en dinero, pues las relaciones de colaboración tenían lugar a través del comercio a base de clearing, es decir, mediante mecanismos de compensación: La URSS enviaba proyectos y equipos y, a cambio, recibía mercaderías chinas. Sin embargo, en un reciente artículo, un portavoz soviético da por bueno el cálculo de la revista de Hongkong, "Far eastern economic review", que estima la ayuda en 7.800 millones de dólares⁵.</p>
<p>China Popular no ha recibido ni una sola donación de parte de la Unión Soviética. Paradójicamente, muchos países subdesarrollados han recibido donaciones provenientes de China.</p>
<p>Por la ayuda proporcionada, la URSS ha exigido, puntualmente, el reembolso. Tibor Mende anota que "después de 1956, en verdad, la totalidad de los reembolsos y de los intereses pagados por China ha superado el monto de los créditos que ha obtenido. Las cifras del presupuesto revelan que, frente a 50 millones de dólares de crédito de que dispuso todavía en 1956, y 10 millones en 1957, el monto de los reembolsos y los intereses se elevó respectivamente, para esos dos años, a 260 y 271 millones de dólares"⁶.</p>
<p>En Moscú, se me aseguró que "no es verdad que haya habido erogaciones de divisas para el pago de la ayuda; oro, tampoco: no integra el clearing. No existían relaciones comerciales por medio de divisas. Quizás los chinos manejen las estimaciones en divisas de las mercaderías que nos enviaban, pero eso no quiere decir que nos hayan enviado divisas". En Pekín, en cambio, Yung Lung-kwei me dijo que China había pagado parte de la deuda en divisas extranjeras y oro. Probablemente, el dirigente chino hacía referencia a la amortización de los créditos, que China recibió por un total de 430 millones de dólares, por parte de la URSS: 300 millones en 1950, durante las negociaciones del Tratado, y 130 millones en 1954, cuando la visita a Pekín de Jruschov y Bulganin. Como se ve, el apoyo financiero a China, no ha tenido un volumen considerable. Bastan un par de comparaciones para poner en evidencia la escasa importancia de los préstamos. En los años 1938 y 1939, diez años antes de que los comunistas alcanzaran el poder, la Unión Soviética proporcionó al gobierno chino, créditos por un total de 250 millones de dólares estadounidenses, según informa Vasiliev en su artículo, "La ayuda del amigo". Y la segunda relación, que extraigo del libro ya citado de Tibor Mende: "La India se ha visto favorecida por préstamos de 700 millones de dólares de crédito, mientras que los 680 millones de chinos que son sus aliados (de la URSS), no han obtenido hasta el presente, más que 430 millones de dólares. Después de 1950, la Indonesia misma que no tiene una población de más de 90 millones de habitantes, ha obtenido 370 millones de dólares de préstamos soviéticos. Si se compara la cifra de la población se ve que la ayuda de Rusia ha sido mucho más generosa para los neutrales de Medio Oriente y Sud-asia, que para con su aliado principal".</p>
<p>Pero no es en el orden financiero donde se puede medir mejor el alcance de la ayuda suministrada por la Unión Soviética a China. Sin duda, los soviéticos no inventan nada cuando afirman que se hace difícil la estimación en dinero de la colaboración prestada, por ejemplo, en el orden de la enseñanza: alrededor de veinte mil chinos —estudiantes, obreros, técnicos, administradores— han recibido instrucción superior en la Unión Soviética. Igualmente difícil sería estimar el aporte cualitativo de los once mil técnicos soviéticos que tan importante papel desempeñaron en el desarrollo de la naciente y pujante industria china.</p>
<p>Sin embargo, el economista Yung Lung-kwei no vaciló en hacer una estimación en dinero del total de la ayuda: según sus categóricas palabras, 5.700 millones de yuanes, es decir, unos 2.400 millones de dólares. Ignoro el origen de la abismal distancia entre este cálculo y el de la revista de Hongkong, que cuenta con el visto bueno de Tandit, colaborador científico del Instituto de Economía del Sistema Socialista Mundial de la Academia de Ciencias de la URSS. Probablemente, las cifras se inflan o se contraen según el valor que cada parte adjudica a los suministros realizados en mercaderías o en colaboración técnica. Si la cifra de fuente china refleja la verdad, resultaría que el ritmo de la ayuda ha sido menor para China que para Cuba. Según René Dumont, Cuba está recibiendo de la Unión Soviética una ayuda estimable en 280 millones de dólares anuales. Y la población de Cuba es la centésima parte de la población de China Popular.</p>
<p>Durante la conversación que mantuvimos, también el Vice-Premier Po I-po quitó importancia a la ayuda soviética: "En realidad, desde el principio, nosotros nos hemos apoyado en los esfuerzos propios para construir el socialismo; la ayuda del exterior sólo tuvo un carácter complementario y nunca superó el 1% de nuestros ingresos anuales. Pero aunque la ayuda fuera reducida, por el simple hecho de que existiera había alguna gente que creía que podíamos descansar en ella. Es en este sentido que le digo que el retiro de la ayuda fue una ayuda".</p>
<h3 class="section-heading">LOS TÉRMINOS DEL INTERCAMBIO</h3>
<p>Aunque los chinos reconocen que los intereses de los empréstitos y los créditos eran bajos —variaban del 1 al 2% anual—, consideran que los precios que la Unión Soviética pagaba por las materias primas de China, eran desfavorables, en tanto que los precios que la URSS cobraba por los equipos y proyectos, resultaban excesivamente altos. "Desvalorizaban nuestros envíos", me aseguró Yung Lung-kwei. Agregó que la mayor parte de los pagos había sido efectuada mediante el suministro de cereales, aceites vegetales, carne de cerdo, huevos, frutas, tejidos de algodón y lana, carbón, tungsteno, estaño, mercurio, sodio, molibdeno y minerales raros "que sirven de materia prima para la fabricación de cohetes. Sus cohetes no hubieran podido volar sin los minerales chinos" —dijo, con la expresión de orgullo de quien sabe que sus antepasados llenaban cohetes de pólvora y los enviaban al espacio, allá por el siglo IX. No puede llamarle la atención que los rusos hayan perfeccionado el invento, más de mil años después.</p>
<p>Yung Lung-kwei puso en tela de juicio, también, otros aspectos de la ayuda: "Con el pretexto de que las fábricas requerían sistemas completos de instalaciones, resultaba que el total valía mucho más que la suma de sus partes: es decir, si hubiéramos podido comprar las máquinas y las piezas por separado, nos hubiera salido mucho más barato". ¿Y no podían comprar las máquinas a otro país? "Las fábricas proyectadas por especialistas soviéticos, requerían maquinarias soviéticas". Dijo además, que hubo modificaciones en los precios, con posterioridad a la firma de los acuerdos, siempre en perjuicio de los intereses chinos. Y al pasar, agregó que, a su juicio, las relaciones entre la URSS y los demás países socialistas, "se parecen al sistema neocolonialista".</p>
<p>En un discurso pronunciado en Pyongyang poco antes de mi llegada a China, también el presidente Liu Shao-chi cuestionó la estructura de las relaciones de los países socialistas entre sí. Dijo, refiriéndose claramente a la URSS: Los que se oponen a nosotros... sólo se envuelven en una atractiva capa para sacar provecho a expensas de otros —una práctica característica de las relaciones entre países capitalistas—, a fin de impedir que los países socialistas económicamente subdesarrollados creen una economía nacional independiente, y hacer que estos países dependan económicamente de ellos y estén bajo su control político. Según ellos, los otros países hermanos sólo tienen el deber de hacer sacrificios para servir sus intereses y no tienen derecho a desarrollar una economía nacional independiente. Esta práctica desatiende hasta el principio de respeto mutuo a la independencia y la soberanía de cada uno, que debe observarse en las relaciones internacionales en general. ¿Cómo pueden hablar de internacionalismo proletario? Su posición es, a la vez, de chovinismo de gran nación y de egoísmo nacional⁷.</p>
<p>En una nota cursada a Mao en el mes de octubre, los soviéticos amenazaban con poner en práctica la respuesta más decisiva de parte del Partido Comunista de la URSS y de todo el pueblo soviético, si el gobierno chino rechazaba las ofertas de reconciliación. Como algunos observadores europeos habían entendido esa "respuesta decisiva" como el posible corte de los suministros de petróleo, formulé la pregunta correspondiente a Yung Lung-kwei, quien se echó a reír y habló como si tuviera la certeza de que los chinos son capaces de hacer andar las máquinas con té: Fanfarronerías, dijo. La industria petrolera china, ha alcanzado tal nivel, que ya podemos autoabastecernos en la mayor parte. Y si no quisieran vendernos más petróleo crudo, no importa; no nos ahorcarán con eso.</p>
<p>También me dijo que más de la mitad de la deuda —casi saldada, ya, en su totalidad— provenía de la ayuda militar proporcionada para armar a los voluntarios chinos durante la guerra de Corea. Terminada la guerra, nos reclamaron el pago, me informó. Los soviéticos lo negaron rotundamente, aunque no me dijeron qué porcentaje del volumen total de la ayuda, correspondía a la venta de armamentos.</p>
<h3 class="section-heading">LO QUE EL VIENTO SE LLEVÓ</h3>
<p>Los testimonios de los visitantes que viajaron a China antes de 1960, coinciden: no había conversación donde no se hiciera alusión a la ayuda desinteresada de los camaradas soviéticos; las novelas soviéticas eran, después de las chinas, las más leídas; se veía films soviéticos en los cines y obras soviéticas en los teatros, instalaciones soviéticas en las usinas y máquinas y herramientas soviéticas en las fábricas. Hablando ruso, uno podía entenderse con los intelectuales chinos sin la menor dificultad. Y dondequiera que uno fuera, se encontraba con chinos dispuestos a destacar la vital importancia de la ayuda fraternal de los especialistas, que habían llegado de la URSS para enseñar a los chinos el ABC de la construcción del socialismo.</p>
<p>Ignoro la cuota de verdad de estas versiones; cuando yo viajé a China, me encontré con el reverso de la medalla. En las conversaciones, inevitablemente se hablaba de los revisionistas, se atacaba al "bastón de mando" de Moscú; los films soviéticos eran tachados de formalismo y pacifismo burgués; muchas máquinas soviéticas son exhibidas, hoy, al visitante, como trastos inútiles, y en cada centro de trabajo se dan a conocer, con orgullo, las nuevas cifras que indican el aumento en la proporción de maquinaria china utilizada. Un bombardeo de quejas y protestas por el retiro de la ayuda y por las condiciones en que la ayuda era suministrada, cae sobre uno no bien traspone los umbrales de una fábrica cualquiera. Y el idioma ruso está, prácticamente, fuera de circulación.</p>
<p>A las declaraciones chinas de 1963, los soviéticos me contestaron con las declaraciones chinas de 1955, 56, 60: Lea, lea, me dijo Skachkov, revolviendo una montaña de papeles sobre la mesa: Estas palabras de Li Fu-chun, dichas en el 55: afirmaba que la ayuda soviética había sido proporcionada según los últimos adelantos técnicos, que nuestros equipos eran de primera clase, que habíamos cumplido lo más rápidamente posible con los encargos chinos. También Chou En-lai estaba entusiasmado en 1956: hablaba de la gran ayuda prestada por la URSS para el cumplimiento de las metas del primer plan quinquenal. Decía que nuestros suministros de equipos eran la última palabra técnica, en su aplastante mayoría; técnicos maravillosos, ayuda inapreciable. Gran contribución a la construcción del socialismo en China, decía Mao. Lea estas declaraciones de Liu Shao-chi, del 7 de diciembre de 1960, cuando ya se habían retirado los técnicos nuestros: "El pueblo chino jamás olvidará la ayuda brindada por la Unión Soviética".</p>
<h3 class="section-heading">LA ARMONÍA PERDIDA</h3>
<p>Actualmente, entre China y la Unión Soviética las relaciones económicas no han cesado, aunque la corriente comercial, como consecuencia de la vertical disminución de la ayuda, se ha reducido, también, considerablemente. Según los soviéticos, sólo se trata de un paréntesis: A raíz de las dificultades internas que se revelaron en China, el gobierno chino solicitó la prórroga de algunos plazos para la construcción de algunas obras. En cuanto a nosotros, estamos en condiciones de cumplir a plazo fijo y muy estrictamente, todos los compromisos —me dijo Skachkov—. Tandit hace notar en su crónica: Ahora también, 88 empresas industriales de la RPCh se construyen con el concurso técnico de la URSS. Los soviéticos niegan que exista ninguna clase de problema para el suministro de maquinarias y repuestos; según ellos, los chinos no compran porque no quieren. Los chinos, por su parte, aseguran que los soviéticos les niegan, no sólo los repuestos, sino incluso toda clase de asesoría: han quedado librados a sus solas fuerzas. Para los chinos, estos actos "intimidantes" de los soviéticos, constituyen una clara presión ejercida por una gran potencia con sentimientos chovinistas, contra los herejes que han osado discrepar en el orden ideológico.</p>
<p>Soy cronista, no profeta. Ignoro si la armonía podrá ser restablecida, en el terreno de la colaboración económica. Pero tengo, eso sí, la impresión, de que será difícil, si no imposible, reiniciar la ayuda en las condiciones anteriores. Por lo que he visto y oído, creo que los chinos sólo se mostrarán dispuestos a admitir los créditos, en el caso de que éstos se pongan a su servicio para ser utilizados según su criterio. La práctica de la financiación de empresas específicas —para cada préstamo un destino determinado de antemano por quien presta— ha cumplido, ya, su ciclo. Y los soviéticos no perderán de vista, sospecho, el riesgo de que China pueda echar mano de su asistencia económica y financiera, para la construcción de los anhelados cohetes termonucleares.</p>
<p>Pero hay algo más. La extensa penetración de los consejeros y técnicos soviéticos en los centros de trabajo y en las oficinas de planificación, y su gran influencia sobre la orientación y los métodos del desarrollo socialista de China, hacían pensar, quiérase o no, en una forma de dependencia. Aunque santificada por las invocaciones a los sagrados deberes del internacionalismo proletario, la autoridad de Moscú se ha de haber hecho sentir, y seguramente ha entrado en choque, mucho más frecuentemente de lo que se supone, con el orgullo nacionalista de los chinos.</p>
<p>Mientras las alegres declaraciones eran dadas a conocer, tiempo antes de que la crisis estallara, y los viajeros ofrecían sus emocionantes testimonios de armonía, el conflicto se incubaba al rojo vivo.</p>
<p>Ya volados los puentes, ¿se podrá retornar a los viejos caminos?</p>
