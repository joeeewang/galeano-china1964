<script>
const SECTIONS = [
  { num: "I", title: "Viaje al centro de la tormenta", html: `<h2 class="chapter-heading"><span class="cap-label">Capítulo I</span><span class="cap-title">Viaje al centro de la tormenta*</span></h2>
<blockquote class="epigraph">¿Qué se propone Mao? ¿Qué hondas razones mueven a China, símbolo agresivo de la rebelión de los pobres, a enfrentar a la Unión Soviética? La posición china en la polémica, ¿refleja una actitud nacional, o es apenas fruto de pasajeros caprichos de los jerarcas? El cronista conversa con toda clase de gente: campesinos inclinados sobre los surcos; mujeres y niños que se asoman, desde los caseríos, cuando el automóvil pasa por la carretera; obreros al pie de sus máquinas, sucias las manos de aceite; estudiantes, soldados, artesanos. En China, la verdad tiene una sola cara.</blockquote>
<p>Son los últimos días de setiembre del 63; el avión, al fin de un largo, largo viaje contra el sol, llega a Pekín. La guerra arde: vayan adonde vayan, los visitantes encontrarán, en cualquier rincón de China, la atmósfera caliente de la polémica con la URSS. Documentos en todos los idiomas, impresos en diversos formatos; folletos, revistas, cartas, declaraciones, ataques y contraataques: "Ni toda el agua del Volga podrá lavar las infamias del revisionismo contemporáneo".</p>
<p>En las ciudades y en el campo, por todas partes, advertirá uno los desafíos a la autoridad de Moscú: tienen la forma de retratos de Stalin, o de carteles que proclaman la necesidad de "defender la pureza del marxismo-leninismo" frente a las acometidas de sus tramposos traidores.</p>
<p>No habrá discurso ni conversación, desde que llega uno a China hasta que se va, donde la palabra revisionismo no figure de alguna manera, y el intérprete que traduzca el discurso o conversación al español, casi seguramente habrá sido intérprete de ruso hasta 1960. Más de un intérprete dirá que ya lo está olvidando; otros, lamentarán que no les sirva, ya, para nada: el idioma de Stalin se ha convertido en el idioma de Jruschov.</p>
<p>En las reuniones, aunque sean informales, alguien se encargará, sin duda, de advertir que "aquí no usamos bastones de mando", para que no haya lugar a confusión con otras reuniones donde sólo se escucha una voz y varios ecos.</p>
<p>Cada noche, los invitados serán llevados a los teatros y verán obras tradicionales representadas por los múltiples elencos de la Opera de Pekín, maravillosamente. Estallará la música y las máscaras se pondrán en movimiento; las caras rojas y las caras blancas, los malos y los buenos. Nueve de cada diez de esas obras, relatarán las heroicas jornadas de lucha de figuras históricas de diversas dinastías, que frente al clamor cortesano por pactar con el enemigo, opusieron valerosa resistencia a las fuerzas invasoras. Los acompañantes considerarán propicia la ocasión, para extraer moralejas políticas de indudable actualidad, sin preocuparse por velar las alusiones a los "capitulacionistas de derecha", que han olvidado como se dice niet.</p>
<h3 class="section-heading">LA FUERZA DE LOS HECHOS</h3>
<p>Nadie puede negar, a esta altura de los acontecimientos, que la polémica existe y se desarrolla; el mundo comunista no piensa, ya, con una sola cabeza. ¿Cómo afirmar, ahora, que "el gran debate", la apertura de dos frentes en el campo socialista, no es más que una "patraña de la burguesía"? Desde la crisis cubana de octubre del 62 —"un nuevo Munich", según los chinos—, las calderas han aumentado, explosivamente, su presión. El viejo mito de la armonía mecánica de los países socialistas entre sí, que sonrientes turistas se han encargado de difundir, ha sido pulverizado por los hechos.</p>
<p>¿Una rencilla incómoda, quizás aguda, pero sin mayores consecuencias? ¿Discusiones puramente doctrinarias? Difícil creerlo. Después del largo viaje por China y la Unión Soviética, puedo dar fe de que la tensa intolerancia que cada una de las partes muestra frente a la otra, no nace de las discrepancias escolásticas. Aunque la lectura superficial de los documentos pueda producir esa impresión, el problema esencial no reside, creo, en saber quién, Mao o Jruschov, entendió mejor a Lenin.</p>
<p>Uno de los factores de irritación más poderosos, reside en el hecho de que la mayor parte de los partidos comunistas, parecen haberse sumado, últimamente, a la cuarentena que el capitalismo occidental impuso a China desde el triunfo de la revolución. El índex que impide la difusión de los documentos chinos, el retiro de la ayuda que antes se proporcionaba, las calumnias que atribuyen a Mao propósitos diabólicos, son todas formas de exclusión. Los chinos, al sentirse malditos incluso dentro de la familia de los países socialistas, exacerban, en función de comprensibles mecanismos psicológicos de auto-afirmación, su agresividad. Simultáneamente, se disponen a negar todo cuanto proviene del otro lado de los muros que han sido levantados a su alrededor.</p>
<p>Hace no más que tres años, por ejemplo, hubiera resultado inconcebible un diálogo como éste, tan divertido como elocuente, que escuché en un hotel de Pekín, y del que fue pasivo protagonista un invitado europeo, miembro de un Partido que los chinos han atacado con furia. El chino preguntó: "¿Qué opina del jazz?", y el invitado se encogió de hombros. Entonces, el chino dijo:</p>
<p>—Yo creo que el jazz es una cosa muy mala.
—Mm.
—Muy mala.
—Mm.
—Creo que un país donde se escucha jazz, es un país corrompido.
—Mm.
—Yo escuché jazz.
—¿Usted?
—Yo.
—¿Dónde?
—En la Unión Soviética —respondió el chino, satisfecho por la perfección de su silogismo.</p>
<p>Para el mismo invitado europeo, resultó imposible convencer a los cineastas chinos, de que Fellini merecía el premio que obtuvo en el Festival de Moscú, por su "Ocho y medio": ¿Acaso Fellini no es un director burgués y decadente? ¿Quién puede atreverse a negar que los soviéticos cedieron a la presión norteamericana?</p>
<h3 class="section-heading">UNA MISMA SANGRE</h3>
<p>Yo quería llegar más lejos y más hondo, escuchar mucho más que los discursos y los rumores, las declaraciones y los diálogos en los salones de recepción y en los comedores de los hoteles. Me interesaba, sobre todo, tratar de penetrar una verdad muy importante: ¿Es el pueblo chino el protagonista real de la polémica que amenaza provocar un cisma, o el gobierno está obrando a sus espaldas? Por supuesto, no me atribuyo, nadie puede atribuirse, el mágico poder de la certeza: ¿Cómo formular ningún juicio categórico a propósito del país de los han, en tantos sentidos inexplicable para un occidental? A los extranjeros, sólo nos está reservado el derecho de dar a conocer nuestras impresiones.</p>
<p>Decidí usar un método de encuesta, y lo puse en práctica dentro de mis posibilidades. Entrevisté a muchas personas, elegidas al azar en rincones de China muy distantes entre sí. Tuve que buscar y encontrar, en cada región, intérpretes de español, inglés o francés, que conocieran los dialectos locales, para que el diálogo directo con los campesinos o con los obreros, fuera posible. Pude, así, comprobar que una misma pregunta genera respuestas idénticas, así se formule en la fábrica de camiones de Shanghai o en la comuna popular Hua Sang, enterrada entre las montañas al sudeste del Río Largo; un soldadito de 17 años que está pasando su domingo libre en un caserío al norte de Cantón, dirá exactamente las mismas palabras sobre Stalin y Jruschov, que una joven obrera de la fábrica de bordados de seda de Hangchow. No pueden haberse complotado todos para engañarme.</p>
<p>Entre las muchas personas que entrevisté de esta manera, sólo encontré un miembro del Partido Comunista, un solo cuadro. Cuando el guía me señalaba un trabajador, yo elegía otro, porque sabía de antemano que los cuadros, los kan-pu, están entregados en cuerpo y alma al Partido y su doctrina: son las correas de transmisión de la voluntad del gobierno de Pekín, a lo largo y a lo ancho de China. Ocupan todos los puestos claves, incluso en el orden técnico. Ninguno de los resortes importantes de la sociedad china actual, está fuera de las manos de estos apóstoles, siempre dispuestos a la obediencia y al sacrificio hasta límites inimaginables. Pero se los encuentra, sobre todo, en las bases: en cada aldea y en cada fábrica, corre por su cuenta la tarea de la persuasión; la voz del Partido se expresa por sus bocas; los ideales del Partido se hacen ideales de la comunidad, a través del ejemplo de sus vidas ascéticas.</p>
<p>De modo que no tenía, para mí, mayor interés, confirmar que los kan-pu, sean o no miembros del Partido, actuaban en comunión con sus directivas. Quedaba, sí, indagar al ciudadano común, al campesino cualquiera que nace y muere arraigado a la tierra, al operario que conoce las mañas de la máquina que maneja; gente sin una formación política especial. Y por lo que pude ver y escuchar, muy pocos parecen estar ajenos a la marca de la revolución. Sólo un chino encontré que me dijera, cuando yo le hice preguntas sobre temas políticos: "No me importan estas cosas. Después de trabajar, me voy a la cama, a dormir". No sabía leer, lo cual es también, en la China de hoy día, excepcional. Se llama Ma Su-chio; lo encontré serruchando un largo tronco, para construir un bote, a orillas de uno de los afluentes del Río de las Perlas.</p>
<p>Sé que están, además, los excluidos, los rebeldes que se han puesto al margen del engranaje, los que no han aceptado, íntimamente, la sumisión que el sistema les exige, y cumplen su papel con obligada mansedumbre pero sin el menor entusiasmo, como presos. Aunque no pude conectarme personalmente con ninguno, no es un secreto que hay intelectuales inconformistas cuyas voces de discrepancia y protesta han sido ahogadas en nombre de la unanimidad ideológica. Algunos prominentes comunistas extranjeros, fieles a la línea Moscú, aseguran, incluso, que en China existen campos de concentración, como en las sombrías épocas de Stalin en la Unión Soviética. Allí, en el desierto, estarían recluidos, condenados a penas de trabajos forzados, quienes no comulgan con la política del gobierno. Ignoro qué cuota de verdad o imaginación hay en estas afirmaciones, frecuentes desde que las divergencias de Pekín con Moscú cobraron estado público.</p>
<p>Pero, en cambio, ¿se podría explicar, en función del miedo, el entusiasmo de todos los chinos que conocí? Un régimen policial, montando un aparato de terror, puede lograr la obediencia, imponer al pueblo el silencio de sus rebeldías. No puede, eso sí, obligar a la euforia. Y los trabajadores chinos arden de fe cuando proclaman, como propios, los puntos de vista del gobierno de Mao. No se trata de cadenas arrastrando a los dirigidos del puño de los dirigentes, sino de un complejo sistema circulatorio que riega, con una misma sangre, el vasto cuerpo de China.</p>
<h3 class="section-heading">QUIEN NO LEE, OYE</h3>
<p>Durante las horas de trabajo, en los cuatro puntos cardinales de China, los altoparlantes, están funcionando. Los obreros de las fábricas y talleres, los campesinos de las comunas populares, los empleados de las oficinas, escuchan de la mañana a la noche, las emisiones de la radio local o de radio Pekín, que tienen un amplio poder de difusión: con intervalos musicales breves, se transmite informaciones, comentarios, se da lectura al diario del día. Eso asegura al gobierno la proyección de sus mensajes en escala nacional. Todos los documentos de la polémica, de uno u otro bando, chinos y soviéticos, fueron irradiados de esta manera en todas direcciones. Quien no leyó los documentos, es seguro que los escuchó.</p>
<p>Cuando estuve de visita en la fábrica de maquinarias eléctricas de Cantón, por ejemplo, se oía por los altoparlantes una voz femenina, monocorde: leía un artículo aparecido esa mañana en la cuarta página del periódico local. Todos los periódicos locales, de toda China, lo publicaron ese mismo día; todas las radios, de toda China, lo transmitieron; todos los trabajadores, obreros y campesinos, intelectuales, funcionarios, soldados y estudiantes, se enteraron de su contenido. El Renmin Ribao, órgano oficial, lo había publicado el día anterior. Era una violenta refutación a los historiadores soviéticos, que habían falseado, según los chinos, la historia de la guerra de Corea. Cuando el largo desmentido terminó, la voz dejó paso a una música estimulante, canciones que exaltaban la voluntad de trabajo y la capacidad de sacrificio del pueblo chino. Después, escuché con familiar alegría, música revolucionaria cubana, y otra vez la voz femenina brotó de los aparatos. Ahora, leía noticias.</p>
<p>Desde las primeras campañas de adoctrinamiento, tiempo antes de la toma del poder, en adelante, los instrumentos puestos en acción para la elevación del nivel ideológico de las masas, se han ido incorporando a la vida cotidiana. Después del trabajo, la gente suele reunirse en pequeños grupos para intercambiar ideas y formular críticas y auto-críticas destinadas a la "rectificación de las ideas erróneas", bajo la orientación de los cuadros. Un firme respaldo popular a la política del gobierno, verdadero bloque sin fisuras aparentes, se ha ido consolidando.</p>
<p>Mediante la práctica del tatsepao, es decir, la inscripción de observaciones críticas en las pizarras públicas, los obreros y los campesinos dan a conocer sus opiniones sobre los más diversos problemas. Sin embargo, durante mis recorridas, sólo encontré críticas anotadas a propósito de detalles de organización del trabajo; nunca, discrepancias sobre la línea política o económica del gobierno. Los signos proponían, en la mayor parte de los casos, soluciones para problemas internos de la fábrica o comuna de que se tratara, iniciativas destinadas al elevamiento de la productividad; cuando los jeroglíficos inscriptos por los trabajadores, referían a temas nacionales o internacionales, lo hacían a modo de eco: slogans a favor de la línea general, las comunas populares y el gran salto hacia adelante, o contra el revisionismo contemporáneo de los enemigos del marxismo-leninismo.</p>
<h3 class="section-heading">LA UNANIMIDAD IDEOLÓGICA</h3>
<p>Pregunté a mis acompañantes chinos si los documentos de la polémica con los soviéticos, habían sido discutidos, al menos en líneas generales, antes de su publicación, o si reflejaban puntos de vista que el pueblo había hecho llegar, de abajo a arriba, a través de los diversos órganos de discusión y expresión, al gobierno. Mi pregunta, deliberadamente ingenua, los sorprendió.</p>
<p>Me dijeron que los documentos habían sido tema de discusión popular después de su publicación, y que el gobierno siempre estaba atento a la repercusión de sus actos en el seno del pueblo. Me dijeron que había una tal interdependencia entre pueblo y gobierno, establecida a través de recíprocas consultas, realizadas permanentemente, que no existía el peligro de que se perdiera de vista la voluntad de las clases populares que el gobierno expresa desde el poder. No puedo decir si esto ocurre o no así, en verdad; una visita a China no alcanza, y sospecho que tampoco alcanzaría una estadía larga; resulta poco menos que imposible, para un extranjero, determinar el grado de influencia del pueblo sobre el gobierno, en esta etapa de la dictadura del proletariado en China. El cronista sólo puede ofrecer testimonio de la influencia del gobierno sobre el pueblo. No podría afirmar ni negar la identidad entre el poder político y la base popular.</p>
<p>Pero a juzgar por mi experiencia, y la de otros viajeros, en los campos y ciudades de China, la voz de Mao cuenta con una inmensa caja de resonancias de centenares de millones de voces. En el mundo de nuestro tiempo, un trueno poderoso: uno de cada cuatro hombres. Me niego a creer en la trampa o en la casualidad; no puede ser que justo me tocara en suerte hablar con un puñado de adictos al régimen, golondrinas que no hacen verano desperdigadas por los cuatro puntos cardinales. Fui yo quien eligió a mis interlocutores, y no mis acompañantes chinos. Algunas veces, los he obligado a detener el automóvil en la carretera y me he metido en un rancho cualquiera, en los suburbios de una ciudad o en el medio del campo: ahí he formulado insólitas preguntas sobre Jruschov, Stalin, Cuba, las bombas termonucleares, la tercera guerra mundial. Y cada pregunta encontró su respuesta.</p>
<p>¿Respuestas estereotipadas? ¿Una igual a la otra, todas iguales entre sí, como si hubieran sido pronunciadas a mimeógrafo? Ciertamente. Pero, cabe preguntarse: ¿Cómo se podría exigir resplandores de individualidad y brillo intelectual a un pueblo recién arrancado de tan hondísimo pozo de ignorancia y miseria? Esta masa que hoy accede al mundo moderno, estaba, hasta ayer, sumergida en el analfabetismo y la superstición, mordida por las enfermedades, aniquilada periódicamente por las hambrunas; es hazaña suficiente, creo, para catorce años de gobierno comunista haber proporcionado a todos un nivel de vida, aunque bajo, humano. La sociedad industrial que los chinos están construyendo, requiere, por otra parte, una mano de obra calificada y altamente productiva. Sobre todo teniendo en cuenta las condiciones en que China está emergiendo del subdesarrollo: prácticamente sola desde 1960, con una insignificante asistencia del exterior, está obligada a poner al máximo de tensión todas sus fuerzas para conquistar los objetivos que se propone en el orden económico. ¿Cómo lograrlo sin un gigantesco esfuerzo colectivo? ¿Cómo lograrlo sin la subordinación de todo y de todos, a ese esfuerzo? La mística del comunismo, religión de los pobres del siglo veinte, es el combustible apropiado. Y la fe en la infalibilidad del Partido, el dogma de la verdad revelada, ocupa, entonces, todas las mentes, inflama todos los corazones. El mundo se mueve, existen los hombres y las cosas, "gracias a la política correcta del Partido y del Presidente Mao".</p>
<p>Otros factores, además, confluyen para determinar la sorprendente unanimidad ideológica de China Popular. No sólo las estructuras partidarias y sociales, puestas al servicio de la gran necesidad nacional de la hora, hacen posible, y hasta inevitable, la comunidad de opiniones. También el peligro del retorno al pasado, que Chiang Kai-shek se encarga de hacer recordar sin descanso, es un factor de unanimidad ideológica para un pueblo que ha elegido el futuro y ha volado los puentes que conducían al infierno que quedó atrás. Como había ocurrido antes, durante la guerra de Corea, ahora, frente a la continua infiltración de espías y cuerpos de sabotaje enviados desde Formosa, el pueblo chino reacciona mediante expresiones colectivas de solidaridad con su régimen. El peligro exterior, aunque esté limitado a los histéricos pataleos de Chiang, condiciona así, a través de las respuestas de defensa propia que engendra, la seguridad interior. Una seguridad militar, de acero, fundada en la voluntad tanto como en la obediencia.</p>
<p>La unanimidad ideológica también proviene de la propia polémica, que enfrenta, no sólo a los partidos, sino también a las naciones. Aunque los contrincantes, soviéticos y chinos, coinciden, oficialmente, en afirmar que los desacuerdos sólo conciernen a los partidos y que las relaciones entre los estados siguen siendo normales, no resulta difícil advertir, en el propio escenario, que la lucha engloba a los países. La expulsión de los diplomáticos chinos de Moscú, el retiro de los técnicos soviéticos de China, ¿son, acaso, actos partidarios? ¿Conciernen sólo a los partidos las actitudes del gobierno soviético, que los chinos cuestionan? Jruschov retiró los cohetes de Cuba, suministró ayuda militar a Nehru, o al menos la prometió, votó el envío de la misión de las Naciones Unidas al Congo, firmó el pacto de prohibición parcial de pruebas nucleares, como Presidente del Consejo de Ministros de la URSS y no en su carácter de dirigente del Partido Comunista. Por otra parte, mi visita a China, confirmó la impresión que presentía: para el pueblo chino, la polémica es una cuestión nacional. Si la política del gobierno de Moscú es blanco de continuos ataques del lado chino, la política del gobierno de Pekín no lo es menos del lado soviético. Para los chinos, las referencias soviéticas al naufragio del "gran salto hacia adelante" y al fracaso de las comunas populares, y las acusaciones de belicismo y racismo, constituyen ataques públicos a nuestro país, como me dijo, entre muchos otros, Chi Ching-tsen, un empleado administrativo de una comuna, a quien encontré leyendo el diario mientras esperaba su turno en el hospital local.</p>
<p>Hua Tse-long, obrero del taller donde se fabrican las herramientas para la comuna Huang Tú, al oeste de Shanghai, me dijo que Jruschov difunde rumores insultantes contra nosotros, dice mentiras sobre nuestras comunas populares; a él, los hechos no le importan. En el combinado siderometalúrgico de Wuhan, conversé, durante todo un día, con muchos obreros. Teng Wo-wen, aprendiz en los talleres de reparaciones, me dijo que Jruschov sigue el camino de los imperialistas. No sólo no ayuda a los países socialistas, sino que los ofende. Dice que sólo uno de cada cinco chinos tiene pantalones, y que en nuestra ropa no hay nada más que agua. Ignoro si estas declaraciones, atribuidas a Jruschov, son verdaderas. Teng Wo-wen ha estudiado y discutido, como todos, las diferencias entre China y la Unión Soviética. Su grupo de trabajo se reúne varias veces a la semana: los obreros cambian ideas sobre el cumplimiento de las metas de producción y los problemas políticos. En el combinado, como en todas las fábricas y comunas que visité, hay abundantes carteles referidos a la polémica, exaltando la lucha contra el imperialismo y la independencia de China, que se apoya en los propios esfuerzos para construir el socialismo. La inmensa tubería de gas que va desde los hornos de carbón a las fábricas, tiene pintada en el vientre una inscripción en enormes jeroglíficos blancos: Contra el revisionismo contemporáneo, defender la pureza del marxismo-leninismo.</p>
<p>La artillería soviética en la polémica, excita, pues, los reflejos defensivos de los chinos y contribuye a consolidar el frente ideológico interno. También, el hecho de que los documentos chinos sean palabra prohibida para el movimiento comunista internacional, ayuda a disipar las dudas en cuanto a la fuerza de verdad que anima al Partido Comunista de China, en sus posiciones: Cobardes como ratones, están asustados de muerte. No se atreven a permitir que los pueblos de sus propios países lean nuestros artículos en respuesta, y han impuesto un hermético bloqueo a prueba de agua. Han llegado hasta utilizar poderosas estaciones de radio para interferir nuestras trasmisiones, impidiendo a su pueblo sintonizar nuestras emisiones. ¡Queridos amigos y camaradas que presumen de poseedores de toda la verdad! Ya que ustedes han juzgado nuestros artículos y los han declarado erróneos, ¿por qué no publican todos esos artículos erróneos y luego los refutan, punto por punto, para que en los pueblos de sus países se despierte el odio por la "herejía y paganismo" que ustedes denominan "dogmatismo" y "sectarismo" y "antimarxismo-leninismo"? ¿Por qué han impuesto ese bloqueo, ese anillo de hierro cerrado? Ustedes temen a la verdad.¹</p>
<h3 class="section-heading">EL ORO Y EL FUEGO</h3>
<p>Los chinos, en cambio, no ocultan los documentos de sus adversarios. Mientras yo estaba en Pekín, el Renmin Ribao publicó, en dos ediciones sucesivas, extractos de diversos artículos aparecidos en la prensa soviética; en el copete, se advertía a los lectores: Jamás hemos regateado el espacio para reproducir extractos de artículos antichinos de la prensa soviética, ni tampoco hemos cobrado un centavo por hacerlo. Desgraciadamente, estos artículos son tan numerosos y tan horriblemente largos, que van más allá de nuestro limitado espacio para incluirlos a todos. Con objeto de que estos singulares artículos antichinos de la prensa soviética no caigan en el olvido, los agruparemos en compilaciones especiales y los publicaremos en forma de libro. En esa misma nota, los chinos hacían la suma de los estallidos antichinos de la prensa soviética desde el 15 de julio al 27 de octubre de 1963: 716 comentarios, artículos y otros materiales.</p>
<p>Los extractos dados a conocer en aquellas ediciones, atribuían a los chinos propósitos divisionistas, conceptos trotskistas, subjetivismos guerreristas, deseos de hegemonía, y prejuicios raciales. La actitud del Renmin Ribao, que los publicó advirtiendo que están tan mal escritos y las mentiras fabricadas por ellos son tan ridículas que su lectura se hace repulsiva, es, sin duda, discutible. Canaliza de antemano las reacciones de los lectores hacia la burla o la ira; el inventario de los insultos recibidos no parece la mejor manera de difundir los puntos de vista del adversario. Pero hay que tener en cuenta, en primer lugar, que la prensa china había publicado, anteriormente, los textos completos de los principales documentos soviéticos, y en segundo lugar, que esas calumnias que agregaron leña al fuego, no fueron inventadas por la redacción del Renmin Ribao, sino que provienen, efectivamente, de fuentes soviéticas.</p>
<p>¿El gobierno chino publica los materiales soviéticos con el propósito de que su pueblo elija entre una y otra posición? Parece difícil que los dirigentes chinos estén dispuestos a llevar la ecuanimidad hasta sus últimas consecuencias: no bajarán la guardia, cabe suponer, para permitir la difusión de las ideas de los "enemigos del marxismo-leninismo". ¿Cómo podría, el gobierno, promover el desarrollo de una "contradicción antagónica", para usar la célebre fórmula de Mao? Cuando ellos, los dirigentes, dicen que el oro puro no teme al fuego, están confirmando, creo, que la maquinaria ideológica de la sociedad china funciona con seguros aplicados sobre todos sus engranajes; pueden darse el lujo de hacer públicos los puntos de vista del enemigo. Si el gobierno soviético es el socio del imperialismo norteamericano en una nueva "Santa Alianza", según afirman los chinos, contra los intereses de los pueblos y las revoluciones, ¿cómo admitir que crezcan, en territorio chino, las malas hierbas tantas veces malditas? Se las exhibe, simplemente: el veneno es éste. Cuidado.</p>
<p>A principios de 1957, Mao Tse-tung lanzó, en un largo discurso de cuatro horas, las consignas de la hora, célebres fórmulas tradicionales chinas: Dejad que florezcan cien flores y Que se enfrenten cien escuelas de pensamiento. Proponía un régimen de libre discusión como único método posible para alcanzar la verdad dentro de los estrictos límites de la fidelidad al Partido y a la causa del socialismo y se oponía a que se haga uso de medidas administrativas para imponer un estilo artístico en particular, o una escuela de pensamiento, y para excomulgar otras. Poco tiempo después, el Comité Central puso en marcha una "campaña de rectificación de los métodos de trabajo", fundamentalmente orientada contra "el sectarismo, el burocratismo y el subjetivismo". Pero apenas un mes y pico había pasado, cuando el Renmin Ribao descargó un editorial fulminante: Los derechistas, que no sólo charlan sino que actúan, serán castigados si rehusan pedir perdón después de haber sido prevenidos, y si prosiguen sus sabotajes y sus violaciones de la ley.² Los activistas políticos, los intelectuales, los científicos y los artistas que habían expresado en voz alta sus quejas respondiendo a la invitación del Comité Central, fueron obligados a realizar abyectas confesiones públicas, según documenta Mende. Víctimas de la acusación de "derechismo", tuvieron que golpearse el pecho, "analizar por escrito los móviles ignominiosos de su traición" y rendir homenaje a "su guía inspirado, el glorioso Partido Comunista".</p>
<p>Si el gobierno, asustado de las repercusiones de sus propios actos, exhibió una intolerancia tan rígida frente a las "contradicciones en el seno del pueblo", ¿cómo pensar que las "contradicciones entre la revolución y sus enemigos" —el imperialismo y el "revisionismo" cómplice— habrían de gozar de un trato diferente? Si las "cien flores" tuvieron tan efímera vida cuando se pusieron en discusión los métodos de trabajo del Partido, cabe pensar que ahora, cuando se cuestionan todos los problemas de la revolución de nuestro tiempo, el régimen no admitirá que los traidores "apologistas del imperialismo" le contaminen la sangre.</p>
<p>Pero, ¿acaso del lado soviético, donde las condiciones materiales son tanto más favorables para la libertad interna, se admite la discusión de las diferencias? Los documentos chinos, con una sola excepción, no han sido dados a conocer por la prensa soviética. Para Jruschov, los puntos de vista chinos se confunden, peligrosamente, con las presiones de los militares estalinistas, ansiosos de hacer trastabillar su base de seguridad. No puede darse el lujo de azuzar la oposición interna; las posiciones chinas abonarían el terreno de sus enemigos, dentro de fronteras.</p>
<p>En noviembre del 63, una delegación del Partido Socialista francés, encabezada por Guy Mollet y Gaston Defferre, tuvo una larga entrevista de nueve horas con Jruschov, en el Kremlin. Durante las conversaciones, Auguste Laurent, alcalde de Lille, formuló esta pregunta:</p>
<p>—Si, sobre la base de posiciones de clase, camaradas auténticamente marxistas se identificaran con las tesis de los comunistas chinos en el interior del Partido Comunista de la URSS, ¿tendrían ellos el derecho de expresarse?</p>
<p>—Niet —replicó Jruschov, en un tono cortante.³</p>
<p>El ocultamiento de los materiales del adversario, hace posibles toda clase de tergiversaciones. Citaré sólo un ejemplo: N. Smetanin, vocero soviético, acusa impunemente a los dirigentes chinos de haber rodado hacia el pantano del racismo y de haber sacado del archivo, renovado y colocado en el escudo, la vieja consigna del imperialismo nipón: Asia para los asiáticos. Confunde, según se ha hecho costumbre, el desafío chino a la hegemonía soviética, con una operación de sabotaje contra el "internacionalismo proletario". Y en el mismo artículo⁴, dice que la plataforma china tiene el aspecto siguiente: "La guerra mundial es inevitable" (declaración de los representantes del gobierno chino del primero de setiembre de 1963). Sin embargo, esa declaración, que es un comentario sobre la declaración del gobierno soviético del 21 de agosto, dice textualmente: Se puede impedir una guerra mundial.</p>
<p>Tampoco los documentos chinos están exentos de mala fe: suelen atribuir a Jruschov, entre comillas, opiniones insólitas sin citar la fuente. O desprenden frases de su contexto, para que el sentido cambie. Este es el aspecto más lamentable, creo, de la polémica.</p>
<h3 class="section-heading">LA RUTINA DE LAS VOCES OFICIALES</h3>
<p>Y en otros aspectos, ¿es también lamentable la polémica? Muchos honestos militantes de la causa de la revolución mueven la cabeza, consternados; parecen preguntarse, en todo el mundo: ¿Por qué nos exigen, ahora, que dudemos? ¿Acaso no hemos sacrificado todos, nosotros y ellos, el derecho a la duda? El desconcierto cunde en las filas comunistas, vacila la fe; ya nada será seguro de aquí en adelante. Dolorosa victoria de la dialéctica: ¿Era cierto, entonces, que cada cosa puede transformarse en su contrario?</p>
<p>Los chinos, los herejes, están en el Index. Hace dieciséis años, fue el turno de los yugoslavos. Esta vez, los impugnadores de la verdad absoluta, son nada menos que setecientos millones: la tierra tiembla. Inevitablemente, la polémica sacude las estructuras verticales de los partidos comunistas; estallan las tensiones reprimidas, se producen fracturas y expulsiones. Un nuevo viento de borrasca, corre; el explosivo conflicto reivindica, por la fuerza de su propia ebullición, el derecho a la discrepancia, sacude el polvo de la machacona rutina de las opiniones oficiales y despierta una nueva sed de preguntas: ¿Por qué? ¿Por qué no?</p>
<p>Desde el punto de vista de los jruschovistas, el traslado de la polémica al ámbito interno de cada partido, distraería la atención de los objetivos reales y sembraría la división, para regocijo del enemigo. Desde el punto de vista de los pro-chinos, en cambio, se trata, precisamente, de no perder de vista al enemigo; la política de Jruschov, aplicada en escala internacional, conduce, a su juicio, a la capitulación.</p>
<p>Como la polémica tiene raíces muy hondas, y expresa contradicciones que no nacieron ayer ni morirán mañana, y como los problemas que plantea no son de exclusiva competencia de rusos y chinos, sino que tienen importancia universal, nada se ganará con acallar, mediante la aplicación de medidas administrativas, la voz de los rebeldes. Se podrá ocultar los documentos, falsificar y simplificar las posiciones de Mao, dar de baja a los afiliados indisciplinados, advertir que la duda equivale a una respuesta, pero el proceso seguirá, implacablemente, su curso. La estructura misma de los partidos comunistas, cuya unidad está vertebrada en torno a la aceptación ciega de la palabra de los dirigentes por parte de los dirigidos, ha sido puesta en tela de juicio. La palabra que alternativamente santifica o condena, resonancia muchas veces deformada de la voz de Moscú, ya no suena con tanta autoridad como antes. Paradójicamente, los responsables del nacimiento de esta nueva época en el seno de los partidos, son los chinos, que piensan, como nadie, en una sola dirección.</p>
<h3 class="section-heading">EL MUNDO EN BLANCO Y NEGRO</h3>
<p>Al borde del riachuelo, está el primer grupo de casas de la comuna popular Shing Chiao, en la provincia de Kuangtung. Camino, envuelto en una nube de polvo, por una de las estrechas callejuelas. El sol, fulminante, cae a pico. Pienso que en este mismo mediodía, hay nieve al norte de China: todas las estaciones, a la vez, en un solo territorio. Se nos cruza un gato, lento, adormecido de calor. Es el primero que veo en China, y es rabón. Cuando el gato no sirve para cazar ratones, me explican, se le corta la cola. Una vieja costumbre. Otras costumbres, en cambio, han sido abolidas por la revolución. La tradición local obligaba, por ejemplo, a las viudas, a guardar fidelidad de por vida al marido muerto, un muñeco de madera con quien debían acostarse.</p>
<p>Pasamos por una casa-cuna, llena de chicos que cantan y estudian mientras los padres trabajan la tierra. Una extraña melodía china invade el aire desde los altoparlantes; hay muchos altoparlantes diseminados por los barrios de la comuna. Me persigue un enjambre de chicos —trencitas y ojos oscuros, profundos: los ojos del sur. Gritan: Tío, tío, tío; ¿cómo estás? Elijo, al azar, una casita cualquiera; entro. Mis numerosos sobrinos se quedan mirando desde la puerta; algunos se animan a entrar, se me sientan a las rodillas, jugamos. Es la hora de comer. La familia Huang prefiere hacerse la comida; otros, la mayoría, van a los comedores colectivos. El cuartito está lleno de humo que llega de la cocina, y no sólo de humo; es increíble, pero cabemos todos: chanchitos, gallinas, chicos. Tres de ellos son hijos del dueño de casa, que se llama Huang Sung-chi, y trabaja la huerta. Era analfabeto, antes; ahora, lee los diarios en el equipo de producción. Habla en dialecto. Le formulo algunas preguntas políticas. —¡Oh no, primero el té; cómo no va a tomar una taza de té!— Bebo, pues, mi té rojo: el té del sur. Sí, leyó el último documento soviético: La política soviética no es correcta. ¿Por qué? Porque los soviéticos no siguen la línea marxista-leninista y se apartan del socialismo. Stalin: Bueno. Jruschov: Malo. Tito: Malo. Mao: Un gran sabio. Nehru: no sabe quién es. Está contento con la comuna popular, muy contento, es mucho mejor que antes; quiere que sus hijos trabajen la tierra porque eso es lo más importante.</p>
<p>En general, los trabajadores que contestaron mis preguntas, habían sido alfabetizados por la revolución; jóvenes y viejos, hombres y mujeres; ocho de cada diez dijeron haber leído, además de haber escuchado, los principales documentos de la polémica con la Unión Soviética. La simple pronunciación del nombre de Jruschov, que no necesita de intérpretes, generó en casi todos los casos, con precisión mecánica, la palabra pu-hau (malo). A la inversa, me bastaba decir Stalin para escuchar la palabra hau (bueno), que yo anticipaba mentalmente con la seguridad con que se aguarda el trueno después del relámpago.</p>
<p>Hang Ling-er es una jovencita, operaria de la fábrica de bordados de seda de Hangchow. Maneja un telar; está bordando delicados motivos del famoso pintor contemporáneo Chi Pai-si. Se pone toda colorada cuando le digo que quiero hacerle algunas preguntas. Sí, lee diarios. Sí, está enterada de la polémica. Los revisionistas son malos —dice—. Jruschov es malo. ¿Por qué es malo Jruschov? Es un revisionista. Por eso es malo. ¿Stalin? Hizo el bien. ¿Nehru? Largo silencio. Acaricia la punta de una de sus largas trenzas negras, la levanta y la sostiene en el aire (y a mí me viene a la memoria una escena cualquiera de la Opera de Pekín: las actrices hacen lo mismo, el mismo arco, con las plumas de faisán que les adornan la cabeza). Le explico que Nehru es un dirigente hindú. Ya no vacila: Un hombre malo. Pu-hau yen. Jruschov es un contrarrevolucionario y está contra el marxismo-leninismo, me dice Liu Su-ching, un campesino a quien abordo en los límites de una comarca cercana a Cantón, mientras camina despreocupadamente al costado de la carretera.</p>
<p>En la fábrica de maquinaria pesada, de Wuhan, Chou Yang-le detiene el torno de rosca, fabricado en el nordeste chino, y me tiende la mano derecha, negra de grasa. Con la izquierda, me alcanza un trapo para limpiarme. Estoy completamente de acuerdo con la política de mi gobierno, dice. ¿Por qué? Porque Jruschov traicionó las esperanzas de los pueblos, y los principios marxistas-leninistas.</p>
<p>Li Hau tiene menos de cincuenta años, pero representa cien. Encorvada, la cara llena de arrugas, rojas las encías sin dientes, que me reciben riendo. Trabajó para los terratenientes hasta el triunfo de la revolución. Recuerda perfectamente la época de la ocupación japonesa, cuando los campesinos no tenían otra cosa que raíces para comer y las mujeres no podían salir nunca de las casas, porque ellos las seguían a todas partes. Muy malos los japoneses. Martirizaban a las mujeres. También recuerda, sí, la época de la sequía, después de la guerra: Trabajaba toda la familia hasta mucho después de la puesta del sol, pero era inútil. Las plantas se morían igual. De golpe pega un salto y desaparece; se va a correr las gallinas, que se escaparon de la casa. Al rato vuelve y cierra la puerta de atrás. Se escucha un cloqueo del demonio, un batir de alas. Li era analfabeta, como todos, acá. Ahora lee, un poco. Sobre la polémica, algo sé, algo sé. Stalin: Sólo sé que era bueno. Jruschov: Sólo sé que no es bueno.</p>
<p>En una comuna popular de Kiangsú, Tsu Tse-ming está escuchando una clase de química. Lo interrogo desde la ventana de la escuela secundaria. Se sorprende, está muy nervioso, mi acompañante me acusa de crueldad. Tsu apenas si tiene 16 años. Largos silencios antes de cada respuesta. Mi máximo respeto al líder, dice de Mao. Y sobre Jruschov: Sí, sé quién es. Es el dirigente de la Unión Soviética. Malo.</p>
<p>En una comuna al sudeste de Wuhan, Li Wang-chien recoge la última cosecha de arroz; lo llamo desde el camino y le pido su opinión. Dice que Jruschov se ha divorciado del pueblo. Sigue el camino de Yugoslavia. Visitó Yugoslavia y dijo que la tierra, el clima y el sol eran mejores que los de Moscú. Jruschov no nos gusta.</p>
<p>A dos horas de automóvil de Shanghai, Ting Ching-kan está inclinado sobre el surco, trabajando; pasamos y me detengo, conversamos. Me dice: Los revisionistas soviéticos están equivocados. ¿Por qué? No se portan como un país socialista; sus acciones van contra los intereses del pueblo. Le pregunto: ¿En qué casos? Se acaricia la barbilla, dice: Oí que en la URSS el trabajo colectivo de la tierra ya no es como antes; la producción está peor; cada vez son menos colectivistas y más individualistas. Evidencia contraataque a Jruschov por sus referencias al naufragio de las comunas populares. También Tong Yao-wei, de la comuna Hua Sang, al norte de Cantón, está irritado. En respuesta a mis sucesivos por qué dice que bueno, yo sólo he leído los documentos una o dos veces; ellos dicen que en las comunas populares se trabaja por la fuerza, y eso no es cierto.</p>
<p>Cuando mi interlocutor, obrero o campesino, usaba más de una palabra, más de un adjetivo, para expresar la ira nacional contra los dirigentes soviéticos y el revisionismo contemporáneo, yo intentaba seguir la conversación, obligarlo a llevar cada razonamiento hacia su desembocadura. En muchos casos, me encontré con circuitos cerrados; personas que me decían: Los dirigentes soviéticos traicionaron al marxismo-leninismo. ¿Por qué? Porque son revisionistas. ¿Por qué? Porque traicionaron al marxismo-leninismo. Y de allí no había quien los sacara.</p>
