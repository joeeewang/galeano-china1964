<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journey against the Sun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#1e1a12; }

#bg {
  position: fixed; inset: 0; z-index: 1;
  background: url("map.jpg") center center / cover no-repeat;
  transform: scale(1.12);
  filter: sepia(12%) contrast(0.90) brightness(0.95);
}
#vignette {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(
    ellipse 52% 50% at 50% 50%,
    rgba(10,7,3,0.00)  0%,
    rgba(10,7,3,0.00) 32%,
    rgba(10,7,3,0.28) 55%,
    rgba(10,7,3,0.70) 78%,
    rgba(10,7,3,0.92) 100%
  );
}
#edge {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  box-shadow: inset 0 0 80px 40px rgba(10,7,3,0.62);
}
#map-svg {
  position: fixed; inset: 0; z-index: 4;
  width: 100%; height: 100%; pointer-events: none;
}
#overlay {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  padding: 2.8rem 4rem 2.2rem;
  min-width: min(380px, 84vw);
  background: rgba(6,4,1,0.32);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  box-shadow:
    0 0 0 1px rgba(195,158,90,0.20),
    0 0 0 3px rgba(195,158,90,0.06),
    0 12px 60px rgba(0,0,0,0.60),
    0 2px 16px rgba(0,0,0,0.40);
  border-radius: 4px;
  animation: float 6s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translate(-50%, calc(-50% + 0px)); }
  50%      { transform: translate(-50%, calc(-50% - 6px)); }
}
#overlay::before, #overlay::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: rgba(195,158,90,0.28);
  border-style: solid;
}
#overlay::before { top:9px; left:9px; border-width:1px 0 0 1px; border-radius:2px 0 0 0; }
#overlay::after  { bottom:9px; right:9px; border-width:0 1px 1px 0; border-radius:0 0 2px 0; }

.main-title {
  font-family: "IM Fell English", Georgia, serif;
  font-style: italic;
  font-size: clamp(1.9rem, 4.2vw, 3.4rem);
  color: #f4ede0;
  text-shadow: 0 2px 28px rgba(0,0,0,0.95), 0 0 60px rgba(0,0,0,0.5);
  line-height: 1.1;
  letter-spacing: 0.01em;
  margin-bottom: 0.5rem;
}
.sub-title {
  font-family: "Jost", sans-serif;
  font-weight: 300;
  font-size: clamp(0.58rem, 1vw, 0.70rem);
  letter-spacing: 0.30em;
  text-transform: uppercase;
  color: rgba(225,205,170,0.48);
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  margin-bottom: 1.9rem;
}
.divider {
  display: flex; align-items: center; justify-content: center;
  gap: 0.8rem; margin-bottom: 1.7rem;
}
.divider::before, .divider::after {
  content: ""; flex: 1; max-width: 50px; height: 1px;
}
.divider::before { background: linear-gradient(to right, transparent, rgba(190,148,80,0.38)); }
.divider::after  { background: linear-gradient(to left,  transparent, rgba(190,148,80,0.38)); }
.divider span { color: rgba(190,148,80,0.40); font-size: 0.52rem; }

nav { display: flex; flex-direction: column; align-items: stretch; }
nav a {
  font-family: "Jost", sans-serif;
  font-weight: 400;
  font-size: clamp(0.80rem, 1.4vw, 0.97rem);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(228,212,186,0.75);
  text-decoration: none;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid rgba(180,140,70,0.13);
  transition: color 0.2s, background 0.2s, padding-left 0.2s;
  text-shadow: 0 1px 10px rgba(0,0,0,0.8);
  position: relative;
}
nav a:first-child { border-top: 1px solid rgba(180,140,70,0.13); }
nav a.primary {
  color: rgba(240,210,198,0.90);
  font-weight: 500;
  letter-spacing: 0.17em;
}
nav a.primary:hover {
  color: #fff5f0;
  background: rgba(139,26,26,0.18);
  padding-left: 1.6rem;
}
nav a.primary::before {
  content: "";
  position: absolute; left:0; top:0; bottom:0;
  width: 0; background: rgba(139,26,26,0.60);
  transition: width 0.2s; border-radius: 2px 0 0 2px;
}
nav a.primary:hover::before { width: 2px; }
nav a.soon {
  opacity: 0.25;
  cursor: default;
  pointer-events: none;
  font-size: clamp(0.72rem, 1.2vw, 0.87rem);
}
.soon-note {
  margin-top: 1rem;
  font-family: "Jost", sans-serif;
  font-weight: 300;
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(220,200,165,0.18);
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="vignette"></div>
<div id="edge"></div>
<svg id="map-svg"></svg>

<div id="overlay">
  <div class="main-title">Journey against the Sun</div>
  <div class="sub-title">China &thinsp;&middot;&thinsp; Latin America &thinsp;&middot;&thinsp; 1963</div>
  <div class="divider"><span>&#10022;</span></div>
  <nav>
    <a href="china1964.html" class="primary">China 1964</a>
    <a href="#" class="soon">Cronicas Chinas</a>
    <a href="#" class="soon">Other Sources</a>
  </nav>
  <div class="soon-note">* in preparation</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const CHINA = new Set([156]);
const LATAM = new Set([
  484,320,84,340,222,558,188,591,192,332,214,388,780,
  170,862,328,740,218,604,68,76,152,32,858,600,
  659,662,670,28,52,212,308,44,796
]);

const svg = d3.select("#map-svg");
let world;

function addPencilFilter(svgEl) {
  const defs = svgEl.append("defs");
  const f = defs.append("filter")
    .attr("id","pencil")
    .attr("x","-4%").attr("y","-4%")
    .attr("width","108%").attr("height","108%");
  f.append("feTurbulence")
    .attr("type","fractalNoise")
    .attr("baseFrequency","0.60")
    .attr("numOctaves","3")
    .attr("seed","5")
    .attr("result","noise");
  f.append("feDisplacementMap")
    .attr("in","SourceGraphic").attr("in2","noise")
    .attr("scale","1.6")
    .attr("xChannelSelector","R")
    .attr("yChannelSelector","G");
}

function draw() {
  if (!world) return;
  const W = window.innerWidth, H = window.innerHeight;
  svg.attr("width", W).attr("height", H);
  svg.selectAll("*").remove();
  addPencilFilter(svg);

  const proj = d3.geoNaturalEarth1()
    .scale(Math.min(W / 5.5, H / 3.0))
    .translate([W * 0.5, H * 0.5]);
  const path = d3.geoPath().projection(proj);
  const countries = topojson.feature(world, world.objects.countries).features;
  const hi = countries.filter(d => CHINA.has(+d.id) || LATAM.has(+d.id));

  svg.selectAll("path.fill")
    .data(hi).enter().append("path").attr("class","fill")
    .attr("d", path)
    .attr("fill", "rgba(155,38,38,0.055)")
    .attr("stroke", "none");

  hi.forEach(d => {
    svg.append("path").datum(d)
      .attr("d", path).attr("fill","none")
      .attr("stroke","rgba(165,48,38,0.16)")
      .attr("stroke-width", 4)
      .attr("stroke-linejoin","round")
      .attr("filter","url(#pencil)");
    svg.append("path").datum(d)
      .attr("d", path).attr("fill","none")
      .attr("stroke","rgba(175,58,48,0.50)")
      .attr("stroke-width", 1.4)
      .attr("stroke-linejoin","round")
      .attr("filter","url(#pencil)");
  });
}

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(data => { world = data; draw(); })
  .catch(err => console.error(err));

window.addEventListener("resize", draw);
</script>
</body>
</html>
