  { num: "II", title: "Todas las voluntades en una", html: `<h2 class="chapter-heading"><span class="cap-label">Capítulo II</span><span class="cap-title">Todas las voluntades en una</span></h2>
<p>¿Qué destino desea para sus hijos?, pregunté. "Que sean como Lei Feng"; "que aprendan de Lei Feng"; "todos los jóvenes deben aprender de Lei Feng": esas fueron las respuestas habituales. Dotado de la abnegación y la capacidad de sacrificio de los cristianos de las catacumbas, Lei Feng, soldadito huérfano de existencia dudosa, había aprendido a no querer nada para sí. La fiebre de la devoción elevada al paroxismo; el pueblo chino parece reconocer a su modelo, símbolo de la hora del sacrificio, hoguera donde arden los intereses individuales en los altares de la colectividad.</p>
<p>Cuando Lei Feng murió, a los veintidós años, dejó tras de sí abundantes testimonios de su apostolado. Las fotografías, impecable obra de profesionales, lo muestran remendando un colchón para un amigo, ayudando a cruzar la calle a una viejita, enseñando a otros camaradas a economizar combustible en el manejo de un camión, leyendo y releyendo las obras de Mao, discutiéndolas en grupo, dando consejos a los jóvenes y consuelo a los ancianos. Se rescató también su Diario y algunos ejemplares de las Obras escogidas de Mao Tse-tung, cuidadosamente subrayados y comentados. ¿Existió, en realidad, Lei Feng, o es un invento del régimen? No interesa, creo, saberlo. Existe, sí, el mito, eso es seguro: la encarnación de cuanto China necesita, y quiere, ser. Pude apreciar personalmente los efectos de la "campaña de masas para emular a Lei Feng, como un excelente comunista y buen luchador del presidente Mao".</p>
<p>Se le atribuye una biografía tormentosa. Su padre, un campesino, fue asesinado por los invasores japoneses y las tropas de Chiang; su hermanito mayor, un niño obrero, sufría tanto en una fábrica capitalista, que murió. El hermanito menor, también murió, víctima del hambre y las enfermedades, y la madre se suicidó. Así, pues, Lei Feng quedó desamparado en el mundo a los seis años. Ignoro qué cuota de imaginación puede haber en la historia, pero, en todo caso, se parece a la de muchos chinos que conocí.</p>
<p>Lei Feng, en su Diario, habla de Mao como hablaría de Dios un místico ingenuo: ...la noche anterior soñé que me encontraba yo con el presidente Mao. Me palmeaba con afecto la cabeza como un padre bondadoso. Con amable sonrisa me decía que debía estudiar mucho y dedicar mi vida enteramente al Partido y al pueblo. Estaba yo tan feliz que me quedé sin habla. Me sentía conmovido hasta las lágrimas. Cuando desperté por la mañana, me parecía que realmente había visto al presidente Mao. Me sentí tan lleno de energía que parecía que nunca podría yo acabar de descargarla... El jovencito resolvió obedecer al Partido y al presidente Mao, a quienes dedicaría su vida: Para la causa del Partido y del pueblo, estoy dispuesto a lanzarme al mar de fuego y escalar la montaña de cuchillos. En noviembre de 1960, ingresó, según se dice, al Partido Comunista: ...Querido Partido, mi querida madre, quiero ser para siempre tu buen hijo... Quiero consagrar mi energía y mi vida a la construcción del socialismo y a la realización del comunismo. Miembro del Partido Comunista de China: sacerdote de una nueva religión, vicario de la voluntad del presidente Mao.</p>
<p>Una mañana, iba Lei Feng camino de la estación ferroviaria de Fushun, cuando se encontró con una mujer que cargaba un niño a la espalda y arrastraba una niña de la mano; la niña caminaba llorando, sucia de barro, bajo la lluvia. No tenían paraguas ni impermeable. De pronto, recordé lo que nos dice el presidente Mao: demostrar nuestra preocupación por el pueblo y ayudarle en sus dificultades... Las dí alcance, me quité el impermeable y abrigué al niño. Entonces, tomé a la niña en brazos. Llegamos así a la estación. Después de subir al tren, la niña siguió tiritando de frío... Como Lei Feng tenía el uniforme mojado, la abrigó con su camiseta; cuando descubrió que carecían de desayuno, les dio sus tres pancitos, y, finalmente, al llegar el tren a destino, cargó la niña a sus espaldas y la llevó a casa. La madre tomó su mano y dijo, emocionada: ¡Camarada, le doy un millón de gracias! Las lágrimas rodaron por sus mejillas. Y cuenta Lei Feng: La respuesta emanó del fondo de mi corazón: ¡No, no es a mí a quien debe estar agradecida, sino al presidente Mao!</p>
<p>Lei Feng no se concedía a sí mismo ni un minuto libre: nada había en su vida que no fuera obligación, deber o responsabilidad: cavaba la tierra con sus propias manos cuando la pala se le rompía, ayudaba a sus compañeros cansados, zurcía las medias de todos, compartía la comida. Extraía energías del infinito caudal de la fe. El 1º de julio de 1961, se levanta de muy buen humor: era el 40º aniversario de la fundación del Partido y, oh dichosa coincidencia, Lei Feng había visto al presidente Mao en sus sueños. ¡Oh, el Partido, qué grande es! ¡Oh, el presidente Mao, qué sabio es! ¡Fue usted quien me dio la nueva vida! Usted me libró del abismo de la miseria y me abrió un luminoso horizonte. Usted me dio de comer, me vistió y me envió a la escuela, donde ingresé en los Jóvenes Pioneros y en la Liga de la Juventud... Bajo su cuidado, me he convertido, de un huérfano, en un comunista. Quien devotamente reza esta acción de gracias, ¿es un héroe o un tonto? Héroe o tonto, no está solo. Si un fuego parecido no ardiera en muchos otros pechos, China no habría sido el escenario de una tan prodigiosa transformación social, económica y política. El fervor ciego e incondicional de su pueblo, es el único capital a que puede echar mano un país que está peleando, sin ayuda de nadie, contra la pobreza; la fe mueve montañas, dicen, y debe moverlas, sobre todo, en China, donde se carece de otros medios, todavía, para realizar la faena. Lei Feng asumía su condición de hormiguita ejemplar: Si se considera que esto es ser tonto, quiero serlo muy a gusto, porque la Revolución, así como la construcción de nuestra patria, necesitan semejantes tontos. Me debo totalmente al Partido, al socialismo y al comunismo.</p>
<p>El presidente Mao aconseja leer a Lei Feng, tan sinceramente como Lei Feng aconseja leer al presidente Mao. Donde quiera que uno vaya, en China, se encontrará con carteles o inscripciones recomendando aprender de Lei Feng e imitar su ejemplo; y la pronunciación de su nombre surtirá un efecto mágico en cualquier diálogo que uno sostenga. Una catapulta de euforia lanzada sobre setecientas millones de conciencias.</p>
<h3 class="section-heading">EL SANTUARIO DE MAO</h3>
<p>Primero de octubre en Pekín: asisto a las celebraciones del aniversario de la toma del poder. ¡China por fin se ha levantado!, gritó Mao, hace catorce años, en su discurso; hoy, el pueblo rinde homenaje a su líder, en interminable procesión. Obreros, estudiantes, artistas, monjes, soldados, atletas, delegaciones de todas las nacionalidades que comparten el país de los han, un océano de flores y cabezas clamando: ¡Mao Tse-tung!, ¡Mao Tse-tung! Desde la terraza de la Puerta de la Paz Celestial, el guerrillero poeta saluda el paso de sus propias estatuas de yeso, grandes efigies blancas que le representan en actitud paternal. El cielo, muy azul esta mañana, se cubre de palomas y globos de colores. Desde algún rincón de la plaza gigantesca, la orquesta hace estallar jubilosos acordes, un trueno de címbalos; sin perder en ningún momento la disciplina, la muchedumbre vuelca su alegría en el centro de Pekín. Largas horas han transcurrido y Mao se retira: una ovación saluda sus pasos. Se ve cansado, quizás enfermo; un hombre joven, a su lado, le ayuda a caminar, sosteniéndolo por el brazo. Cinco años atrás, este hombre que sonríe a sus estatuas y recibe el clamoroso tributo de adoración de la cuarta parte de la humanidad, tuvo todavía fuerzas para trabajar diez horas por día, a pico y pala, en la construcción del embalse de las Trece Tumbas, que los visitantes contemplan en camino al Palacio subterráneo de los Ming. Aún hoy, dedica ocho meses del año a viajar por el país y a hablar con el pueblo, para informarse personalmente de los problemas.</p>
<p>Por todas partes se encuentra su nombre o su retrato; obreros, campesinos, estudiantes, tararean la canción preferida: "Los inmortales", con letra de Mao; los niños de las casas-cuna de las fábricas y las comunas populares, me dicen que, de grandes, quieren ser, como Lei Feng, buenos luchadores del presidente Mao; ingenieros y pintores, hombres de ciencia, políticos y soldados, citan frases suyas a propósito de los temas más diversos, con la unción con que repiten los creyentes la palabra revelada.</p>
<p>En un país que desde hace 2.400 años está unificado en torno a la figura central de un Emperador, ¿cumple Mao la función de Hijo del Cielo, elegido de los dioses, en la nueva era de la China comunista? De algo no cabe duda: se le rinde culto. Pero, según la autorizada opinión de Edgar Snow, el occidental que conoce mejor a los chinos, Mao no es de ninguna manera un dictador absoluto: aunque su autoridad se reconoce en todas partes, existe en China una dirección colegiada, y a menudo él está en minoría. Por lo demás, si aparece en el vértice de la pirámide, ello no ocurre así por derecho divino; no es, tampoco, el caso de un jefe administrativo que ha alcanzado el poder pisoteando a otros burócratas competidores. Mao es, sí, el caudillo de la revolución china, como Lenin lo fue de la rusa y Fidel Castro lo es de la cubana; cabeza visible del movimiento de liberación desde aquellos días en que tuvo el coraje de romper con la dirección del Partido para imponer la estrategia que conduciría finalmente a la victoria. Es, sí, un intérprete lúcido del marxismo, que supo asimilar ese sistema de ideas a las condiciones peculiares de su país, y un jefe guerrillero que conquistó, armas en mano, la autoridad que hoy nadie sería capaz de negar. En las fábricas y en las comunas, en los gabinetes de trabajo de los científicos y en los estudios de los artistas, no hay éxito que no se logre gracias a la correcta conducción del presidente Mao.</p>
<p>Su prestigio no nace, ciertamente, del ejercicio del poder con mano de hierro: la obediencia puede ser el fruto de la fuerza; la devoción, no. El expresa, desde el punto de vista del pueblo, la revolución: las raíces, el desarrollo y el triunfo de la revolución. Visité, en Shanghai, la casa donde el Partido fue fundado. Está ubicada en un lugar aislado, en una calle que allá por 1921 se llamaba Wan Tsu, y estaba rodeada de huertas. Doce delegados, representantes de un total de 57 comunistas en toda China, celebraron allí las sesiones iniciales de su primer Congreso, clandestinamente; para eludir a la policía extranjera, los delegados se trasladaron luego a una barcaza del Lago del Sur. De ellos, sólo dos quedan vivos: Tong Pi-wu, actual vicepresidente de la república, y el entonces delegado de la provincia de Hunan, Mao Tse-tung. Diez años después, la cabeza de Mao era puesta a precio por 250.000 dólares de plata. Treinta años después, ocupaba el sitio número uno en la primera potencia del Asia.</p>
<p>Pienso en los carteles que uno encuentra por toda China, con aquella profecía: Una pequeña chispa puede incendiar la pradera. Y pienso que la pradera fue incendiada.</p>
<h3 class="section-heading">EL PODER DEL "APARATO"</h3>
<p>En una casa de té de Pekín, tuve la oportunidad de conversar con Wang Ching-nu, un joven soldado del Ejército Popular de Liberación. Me habló, por supuesto, de Lei Feng; sonrió, contento, cuando le dije que sabía de quién se trataba. Le pregunté qué se proponía ser: ¿Seguiría en el ejército? Me dijo: Mi deseo es el mismo que el deseo de la organización. También mis esperanzas son las mismas. Lo que la organización decida, eso seré.</p>
<p>Liu Su-ling, una joven obrera de los talleres de la comuna popular Huang Tu-gang, al sudoeste de Pekín, me dijo que Lei Feng es un ejemplo para todos los chinos y para toda la humanidad. Hacía dos años que estaba trabajando en la comuna; antes, había estudiado el manejo de las máquinas fresadoras en una escuela de Pekín. Le pregunté por qué había elegido la comuna, si la había elegido; me contestó: Me necesitaban. Sabía la importancia del trabajo en las maquinarias, aquí en el campo. El Partido me indicó que me necesitaban. Por eso vine. Le pregunté qué querría ser: Una obrera calificada para construir bien nuestro país. Una buena luchadora del presidente Mao.</p>
<p>En una comuna al sudeste de Wuhan, Li Tung-ching, un campesino de veinticinco años, me dijo: Todos, en todos los lugares, en todos los tiempos, deben aprender de Lei Feng. Cuando le pregunté qué sería de su vida, respondió: Haré lo que el Partido decida. Me quedaré aquí o me iré, según lo que el Partido quiera. En la misma comuna, Chang-Ta-jo trabaja como tornero; gana menos de lo que ganaría en una fábrica de la ciudad. Está en estos talleres desde hace tres años. Antes, trabajaba en la fábrica de maquinaria pesada de Wuhan: su mujer y su hijo quedaron en la ciudad. Le pregunto por qué vino al campo. Para ayudar a la agricultura, dice. ¿El Partido se lo ordenó? Sí. ¿Es miembro del Partido? No. Acerca de Lei Feng, dice: Debo aprender de Lei Feng, ideológica y prácticamente. Y sobre su propio destino: Trabajaré donde el Partido diga.</p>
<p>Ninguno de estos trabajadores, dispuestos a sacrificar su voluntad o su vocación en función de las necesidades de la organización, era miembro del Partido. La influencia del Partido sobre la sociedad china, rebasa largamente los límites del Partido mismo: a través del "aparato", gigantesca maquinaria humana montada en todo el territorio, de este a oeste, de sur a norte, el Partido ejerce su autoridad no discutida sobre las masas. El dominio total de las fuentes de información y opinión y el control rígido del andamiaje económico en cada una de sus piezas, facilitan la tarea política: las campañas de propaganda destinadas a crear una atmósfera de fervor en torno a las consignas que el Partido lanza en escala nacional, encuentran, a poco andar, el eco deseado. De la conversión de quienes vacilan o discrepan, se encargan los "cuadros" o los miembros del Partido, que cuentan con una rica experiencia adquirida, en muchos de los casos, durante la guerra de liberación. No olvidemos que los ejércitos de Chiang Kai-shek cayeron tan derrotados como conquistados: el prisionero escuchaba conferencias políticas y descubría, a través de su propia experiencia, que no eran unos bandidos, aventureros ni vagabundos, aquellos soldados de la revolución que compartían con él el arroz, la cama de madera y la vida cotidiana, dura pero dura para todos.</p>
<p>Predicando con el ejemplo tanto como con la palabra, las piezas del "aparato" han inculcado, en las regimentadas conciencias del pueblo chino, una doctrina del sacrificio: el propio interés se sacrifica en función del interés de la comunidad, y la vida de hoy es inmolada en aras de la vida de mañana. Las masas actúan dinamizadas por el orgullo nacional: después de tantos años de humillación y sometimiento ante las potencias occidentales, el país es por fin dueño de su destino. Dinamizadas también, porque la situación material ha mejorado sensiblemente. Los campesinos chinos son, todavía, muy pobres; y en ciudades como Pekín hay muchas viviendas que parecen tugurios, y familias numerosas suelen habitar piezas estrechas. Es cierto que la miseria subsiste. Pero no es menos cierto que el país ya no conoce las hambrunas ni las pestes que se llevaban millones de vidas humanas; ya no se ven mendigos ni desocupados, y son escasos los hombres vestidos con harapos, aunque aún los hay. La austeridad, maldición o fortuna, es compartida por todos: la sociedad, ya no fracturada entre pobres y ricos, tiene un objetivo común a todos sus miembros, y se ha lanzado a cumplirlo con dolor y alegría, con entusiasmo y desesperación. La pelea se libra, cuerpo a cuerpo, contra el hambre y la muerte. Todos la libran. Durante el reinado de los grandes principios, todo lo existente bajo el cielo era de todos, había dicho Confucio, y sus palabras se podrían aplicar tanto a los beneficios que la revolución trae como a los sacrificios que exige. Y aunque el trabajo, sobre todo en el campo, es duro y agotador, y aunque el Estado o el Partido disponen de las personas, de su tiempo y de su destino, ¿qué nostalgia de la libertad pueden sentir quienes nunca la conocieron?</p>
<h3 class="section-heading">TODO TIEMPO PASADO FUE PEOR</h3>
<p>Desde Formosa, Chiang Kai-shek suele formular declaraciones como ésta: Habrá un levantamiento en China antes de fin de año. Ya lo he anunciado. Nada ha cambiado para alterar mis puntos de vista: debemos aprovechar esta oportunidad —la oportunidad que llega una vez en la vida—. Pero, pasa el tiempo y el levantamiento no se produce. ¿Ansían los chinos, realmente, retornar a la vida que dejaron atrás? ¿Vuelven la cara hacia Formosa, desde donde el viejo Generalísimo derrotado irradia la luz de la esperanza? De fuente norteamericana¹, recojo un dato que me parece elocuente: De los 122.000 chinos que dramáticamente huyeron del comunismo a Hong Kong, en mayo de 1962, poco más de 700 eligieron emigrar a Formosa. Ignoro si las cifras son exactas: de todos modos, parece posible que se haya producido una emigración numerosa desde el territorio chino, al término de los tres años de terribles calamidades naturales. Pero esa emigración se volcó hacia los países que cuentan con altos niveles de vida: no eligió el regreso al pasado, a pesar de que, notoriamente, las inyecciones de dólares provenientes de Washington, han convertido a Formosa en algo bien distinto de lo que era China hasta 1949.</p>
<p>¿Qué es el pasado, para los chinos? Una memoria de platos vacíos y parques clausurados para chinos y perros, un sabor a barro y pasto seco, la marca en el hombro del bambú que todo lo lleva y en la piel, la marca de las pestes; el tiempo del caos y la violencia. El tiempo de la humillación. Las niñas de doce años que eran carne de prostitución en los burdeles o mano de obra barata en las fábricas de tejidos; aquella organización municipal de Shanghai, dedicada a recoger los cadáveres en las calles, la gente que caía muerta de hambre o de frío; todo eso, y la guerra, es el pasado.</p>
<p>Eugenio Orrego Vicuña, un diplomático chileno, lo ha narrado así: Pekín está en venta. Las almas y las cosas están en venta. Podríais comprar un esclavo de doce años por un puñado de monedas y las bendiciones del padre atormentarían vuestro oído largo rato. Un ciudadano me siguió alguna vez tirándome del abrigo y suplicándome, a gritos, que me llevase a su hija... Los mendigos pululan alrededor de los puestos de alimentación. Dos o tres monedas colmarían la felicidad de cada uno, pero son tantos que la satisfacción de pocos será un remordimiento... Nunca los hombres, en sus noches de pesadilla, pudieron soñar miseria tan espantosa... Los mendigos de China no existen en otra parte del planeta². Describe minuciosamente las pompas de la muerte, los entierros bulliciosos; los atribuye a la miseria extrema que reina en la vida y presiente que en la China socialista de mañana no se verán, por las calles, estos cortejos ruidosos... Treinta y dos años después, en la China socialista, yo no los vi.</p>
<p>Una de las primeras tardes que pasé en Pekín, fui a visitar el deslumbrante Palacio Imperial. Como la Ciudad Prohibida es interminable, y parece que siempre estuviera uno en los umbrales, la jornada resultó, a la vez, cautivante y agotadora. Nos sentamos en uno de los pabellones, a la sombra, y me ofrecieron refrescos. Pero yo quería tomar agua. El calor seco de Pekín me quemaba la garganta. Mi acompañante, Liu Ching-ming, infinitamente amable, trajo, entonces, una jarra de agua. Intenté beberla, porque la cortesía china exige reciprocidad, pero no pude: era agua caliente. Liu se rió, y después me explicó que hoy día, en China, todos toman el agua caliente, y que esa costumbre tenía un origen determinado. Era el té de los pobres. Cuando la miseria apretaba más, el té se hacía escaso y caro como el oro. Pero un chino no puede dejar de ofrecer algo a sus huéspedes; la hospitalidad es una obligación tradicional. Se servía, entonces, té sin té.</p>
<p>Otra tarde, una de las últimas tardes, Liu habló, por primera vez, de sí mismo. De su mujer y de sus hijos, de su trabajo. Y de su historia. Me habló del regreso a su pueblo natal, Chu Kang, en la provincia de Honan, durante la guerra. Cuando se había ido a la ciudad a estudiar, vivían, en el pueblo, setecientos habitantes. Cuando volvió, la sequía del año 42 coincidía con una invasión de langostas, y sólo cuatrocientos habitantes quedaban vivos, comiendo barro y raíces. Los demás, habían muerto de hambre. Situaciones similares, se repetían en toda China.</p>
<p>¿Y ahora? El caos ha dejado lugar al orden y a la paz interna. Y el hambre desapareció. Lo reconoce, incluso, el enemigo. Albert Belhomme, un belga que había desertado cuando la guerra de Corea y se había ido a vivir a China, abandonó el país, con permiso de las autoridades, después de diez años. Hizo declaraciones fundamentando su desilusión; habló de las malas condiciones de vida de los chinos y de la opresión política, pero reconoció que la gente no sufre hambre hoy día, aunque, ciertamente, no está llena³.</p>
<p>Los mendigos, con sus pestes, sus úlceras, sus llagas purulentas, sus alaridos, desaparecieron: cultivan hoy la tierra o desempeñan un oficio o se han recluido en los asilos y los hospitales. Los trabajadores viejos ya no son arrojados a la calle como carne inservible: los ampara el derecho al retiro. Las mujeres, otrora condenadas al papel de sirvientas de los maridos, o convertidas a la prostitución para distracción del extranjero rico, han conocido, por fin, la dignidad. Gozan hoy de iguales derechos que los hombres, y los matrimonios feudales, concertados por dinero, son un recuerdo del pasado sombrío. Claro que han desaparecido, también, otras cosas. Ya en diciembre del 49, poco después de la toma del poder, se quejaba el "Times" de Londres: Las distracciones de la colonia extranjera están muy restringidas. El Club de Pekín, antes centro de la vida elegante, no es ni la sombra de lo que fue. Las carreras, los paseos a caballos, los cross-country, los point-to-point, el polo, no son más que recuerdos del alegre pasado. En nuestros días se ve apenas un caballo —debería decirse más bien un pony chino— en Pekín. Los animados pícnics en las colinas de los contornos, que eran tan característicos de los week-ends de Pekín, son ahora raras y difíciles empresas; y los templos que los extranjeros solían alquilar como residencias de verano están vacíos y desiertos. El hipódromo de Shanghai fue transformado en parque popular, y donde antes estaba el Jockey Club, funciona hoy una gran biblioteca pública. El estadio de carreras para perros es ahora un teatro, y los templos ya no se alquilan: son tesoros nacionales, abiertos a todos, que el gobierno cuida y restaura celosamente.</p>
<p>Pero sería un error medir la transformación operada en China, teniendo solamente en cuenta las respuestas que el régimen ha sido capaz de dar a las necesidades directas de la población. Aunque el nivel de vida es hoy más alto que antes, no hay que perder de vista que el prodigioso ritmo de desarrollo de la economía china, fundamentalmente responde a las inversiones realizadas en la industria, sobre la base de una política de severa austeridad y de presión sobre el consumo. No son las generaciones presentes las que disfrutan de los beneficios del socialismo en todo su esplendor: sólo les está reservado presentirlo, como un futuro sacrificadamente construido para otros.</p>
<h3 class="section-heading">LAS TRES BANDERAS ROJAS</h3>
<p>Embriagados de fe, dueños de un poder religioso que ha encontrado sus dioses en la tierra, los chinos perforan montañas y desvían ríos, levantan fábricas sobre los desiertos eriales, apresar la lluvia cuando se descarga con excesiva furia y la sustituyen cuando no llega. ¿En qué otras condiciones hubiera podido China resistir a las feroces sequías e inundaciones que la azotaron a lo largo de tres años, sin tregua, desde el 59 al 61?</p>
<p>La Resolución de Peitaijo, a fines de agosto del 58, había dado origen a las comunas populares, que nacieron como federaciones de altas cooperativas, con una dirección centralizada. Las altas cooperativas habían representado, a su vez, tres años antes, una etapa superior en relación a las cooperativas medias: habían abolido los ingresos que no resultaran del trabajo realizado, y la propiedad de la tierra y los medios de producción se había hecho colectiva. Las comunas populares —que, según los chinos, se generaron en un movimiento espontáneo de la masa, tiempo antes de que el gobierno tomara cartas en el asunto— fueron organizadas a un ritmo fulminante: entre agosto y noviembre de 1958, la cantidad de comunas pasó de 30 a 26.500. Aparecieron como unidades múltiples para la administración general de la agricultura, la industria, el comercio, la cultura y la fuerza militar. Fundamentalmente, su creación, espontánea o no, obedeció a la necesidad de coordinar fuerzas para la construcción de embalses y represas; la concentración de mano de obra que resultó de la fusión de las altas cooperativas, favoreció, además, la realización de otros trabajos: las obras de canalización permitieron ganar tierras fértiles al desierto y a las montañas. En la región del Yulin, para citar sólo un ejemplo entre muchos, en la provincia de Shensi, se rehabilitaron 34.700 hectáreas de tierra sepultada bajo la arena y se convirtieron 6.700 hectáreas de tierra arenosa, en campo fértil.</p>
<p>El terrible período de pruebas que se extendió a lo largo de los años 59, 60 y 61, ha sido superado con grandes dificultades. ¿Es posible imaginar qué hubiera sucedido si la creación de las comunas populares no hubiera hecho posible la construcción de tantas obras capitales para la pelea contra la naturaleza?</p>
<p>El 80 % de los embalses, fue construido después de 1958. Tomemos, por ejemplo, la región que rodea a Pekín. Antes del 58, había allí sólo un embalse; después, ocho grandes y varios chicos. Visité el embalse de las Densas Nubes, al norte de las represas del río Amarillo: la obra fue terminada antes del plazo y a la mitad del costo previsto, mediante el trabajo de doscientos mil hombres, campesinos de las comunas, la mayor parte de los cuales regresaba a sus aldeas en el otoño, para recoger las cosechas. Las aguas de los ríos turbulentos, que antes se salían de sus cauces arruinando las plantaciones y llevándose por delante hombres y viviendas, hoy son conducidas a través de los canales para irrigar la tierra seca, o quedan presas de los embalses para proporcionar energía eléctrica a regiones que nunca la habían conocido. Como dice una canción que nació con las comunas:</p>
<p>"Yo soy el Rey Dragón.
 Ordeno a las tres montañas y a las cinco cumbres:
 ¡Abridme paso! Aquí vengo."</p>
<p>Y montañas y cumbres han abierto paso a los canales y se cultivan las laderas y se plantan árboles donde antes había sólo piedra y arena.</p>
<p>En cada una de las comunas populares que visité, y visité muchas, escuché historias parecidas: los terribles números; tantos miles de cadáveres en esta zona cuando la sequía de tal año, la inundación de tal otro; tantos miles huyeron, se perdieron de vista. En la comuna Hua Sang, al norte de Cantón, me informaron que, durante la sequía del año 46, siete mil campesinos murieron de hambre allí, once mil se trasladaron a otras partes del país y cerca de veinte mil se las arreglaron para escapar al extranjero. Casi la mitad de las familias que hoy trabajan en la comuna, tiene parientes en el extranjero. Pero ahora, la canción dice que:</p>
<p>Cuando llega el diablo de la sequía
 los campesinos alzan sus herramientas
 y lo obligan a rendirse.</p>
<p>En esa comuna, se han cavado desde el 58, once embalses artificiales; sirven, a la vez, de depósitos de agua y de fuentes de energía. Pudieron, así, los campesinos, hacer frente a las calamidades recientes, aunque fueron más intensas que todos los desastres que la comarca recuerda.</p>
<p>En otra comuna, al sudeste de Wuhan, me contaron que, durante la sequía del año 25, no llovió durante 43 días. La mitad de las aldeas quedó sin un solo grano y sin una sola gota de agua. Y otra vez las cifras: los miles de muertos, los emigrados. Ahora bien; del 59 al 61, la sequía fue mucho peor: en el 59, 84 días sin llover; en el 60, dos meses; en el 61, 50 días. Pero la producción creció. Porque en el 58 se habían construido grandes obras hidráulicas y treinta kilómetros de canales de irrigación viborean, hoy, entre las montañas.</p>
<p>Al medirse con los gigantescos obstáculos que la naturaleza lanzó contra su paso, los chinos fortalecieron los ya sólidos vínculos comunitarios, y alimentaron la mística del esfuerzo colectivo; simultáneamente, se recogieron lecciones de la dura experiencia y los errores cometidos saltaron a la vista. La estructura de las comunas populares cambió, y el estrepitoso programa del gran salto hacia adelante fue asimilado a las posibilidades de la realidad. Después de la descentralización de 1960-61, sólo quedaron bajo el control de las comunas, los talleres, las explotaciones ganaderas y los servicios públicos de educación, asistencia y defensa. A fines de 1960, la remuneración era la misma en las distintas brigadas de una comuna; ahora, depende del trabajo realizado. Se evita, así, que las brigadas eficientes mantengan a las ineficientes. Los equipos de producción —que están unidos en brigadas— integran ahora unidades independientes de producción y distribución, contabilizan sus propias pérdidas y ganancias y fijan sus próximas metas. Antes no se permitía a los campesinos cultivar pequeñas parcelas en explotación individual; ahora, cada miembro de las comunas puede explotar un pequeño terreno de (0,2 hás.) de propiedad privada, fuera de las horas de trabajo, para satisfacer parte de sus necesidades de consumo. Los cambios operados han significado, aparentemente, un retorno a la prudencia perdida de vista: el ritmo vertiginoso de "colectivización" del campo había querido saltear etapas imprescindibles en el proceso de adaptación del campesino a la nueva vida. La descentralización delata el propósito de evitar, a los miembros de las comunas, la triste sensación de ser no más que un engranaje de la vasta e impersonal maquinaria económica, lo que da idea de que existió, al menos, el riesgo de que ello ocurriera. Los dirigentes tienen conciencia de que es preciso prevenir, a cualquier precio, la menor fisura en el sólido bloque del entusiasmo creador del pueblo. Sin el empuje febril del trabajo humano, ¿cómo sustituir los capitales y los medios de producción que faltan? En la capacidad de poner hombro con hombro, setecientos millones, ante cualquier inmensa tarea, reside la carta de triunfo de la revolución.</p>
<p>Cuando se trata de hacer frente a las críticas del extranjero, los campesinos chinos se muestran especialmente orgullosos de sus comunas populares. En el curso de la polémica pública, los soviéticos no han vacilado en hablar de los fracasos de la economía china, y se han atribuido el papel de profetas: Nikita Jruschov habría advertido personalmente a Mao Tse-tung, en el verano de 1958, que China estaba siguiendo un derrotero de experimentos peligrosos, de menosprecio de las leyes económicas y de indiferencia ante la experiencia de los demás países socialistas. El jefe del gobierno soviético, habría hecho notar a Mao que mucho de lo que los camaradas chinos consideraban la última palabra del marxismo, el método para acelerar la edificación del comunismo, había sido ya probado, en la práctica, por el pueblo de la URSS en los primeros años de su revolución. Los chinos de ninguna manera parecen arrepentidos de su experiencia, y atribuyen la dramática situación que vivieron en los últimos años, más a las calamidades naturales y al retiro de la ayuda soviética, que a sus propios errores. Y no ocultan su irritación ante las críticas de Jruschov, que a su juicio resultan, fundamentalmente, de la independencia de la política económica del gobierno de Pekín, que ha seguido su propio camino a espaldas de los consejos de Moscú. Llama la atención que los soviéticos se muestren tan poco dispuestos a considerar el papel de las inundaciones, los tifones y las sequías, sobre los bajos niveles de la agricultura china en estos últimos años: al fin y al cabo, Jruschov ha hablado del clima para explicar por qué la producción cerealera por cabeza en su propio país, ha sido inferior en 1963 que en 1913. Y sus planes de colonización de las tierras vírgenes del Asia Central, que no desembocaron precisamente en el éxito, no han sido menos audaces que algunos proyectos de los dirigentes chinos.</p>
<p>En China, los planes supersónicos han dejado lugar a los planteos realistas, y el equilibrio económico tiende a restablecerse. Los índices favorables que se dan actualmente, aunque parciales, no han sido deformados por la propaganda, ni provienen de catastróficos errores de cálculo. Ello había ocurrido, sí, en 1958, cuando las cifras que se proporcionaron hubieron de ser rectificadas a la cruda luz de los hechos: los cereales bajaron de 375 millones de toneladas a 250 millones, la producción de algodón resultó de dos millones cien mil toneladas, en vez de tres millones 350 mil; el acero, que se había estimado en once millones de toneladas, quedó reducido a ocho millones, una vez descontada la producción inservible para el uso industrial. La rectificación de las cifras, provocó una rectificación de las metas, y ya no se oyó decir que la producción británica en la industria siderúrgica, sería alcanzada o excedida antes de quince años. La organización misma de la producción de acero, ha sido sustancialmente modificada: las pequeñas plantas siderúrgicas diseminadas por toda China (600 mil hornos pequeños de fundición en octubre de 1958), habían demostrado sus limitaciones e inconvenientes, y el gobierno no vaciló en anunciar y cumplir su propósito de concentrar la producción local de hierro y acero en no más de seiscientos a mil centros siderúrgicos.</p>
<p>La experiencia del año 58 ha determinado una extrema cautela en materia de estadísticas, en los años siguientes. El riesgo de que los deseos de los funcionarios puedan ser confundidos con los resultados y las posibilidades reales de la producción, ha movido al gobierno a manejarse con tanto cuidado que desde el año 60, no se cuenta con cifras globales capaces de brindar un cuadro completo de la evolución económica. A tanto llegan las prevenciones en este sentido, que incluso el volumen de la población permanece estancado en 650 millones de habitantes desde 1958: en los discursos más recientes de los dirigentes, reaparece la misma cifra que se proporcionaba cinco o seis años atrás. Y con su característica disciplina, todos los chinos que conocí, repitieron que su país cuenta con 650 millones de habitantes, ni más ni menos. Como el crecimiento demográfico es también vertiginoso en China, es dable estimar que la población actual, teniendo en cuenta los censos anteriores, no puede estar por debajo de los setecientos millones, pero como la cifra no ha sido confirmada por los organismos técnicos, los chinos no la usan ni ven de buena gana que otros la usen⁴.</p>
<p>Ignoro si los resultados magros de la producción agrícola en los años de las calamidades, habrán incidido también en el silencio oficial en relación con los índices de crecimiento en los años 61, 62 y 63. Hasta donde se conocen las cifras, China aparecía creciendo, a pesar de los errores cometidos, a un ritmo más rápido que el que jamás alcanzaron la Unión Soviética o los Estados Unidos, y mucho más aceleradamente que cualquiera de los países subdesarrollados. Los datos parciales que han sido dados a publicidad, no contradicen esa tendencia vertiginosa. Las declaraciones grandilocuentes han dejado paso a la realidad, y la realidad, por lo que de ella se conoce, sigue asombrando.</p>
<h3 class="section-heading">LA RELIGIÓN DEL TRABAJO</h3>
<p>El gobierno comunista ha puesto en marcha un dinámico movimiento de masas, que actúa a impulsos de mesianismo, y que a través de una mística simplista, rígida e impersonal, hace esfuerzos sobrehumanos por convertir a China en una potencia de alto nivel de desarrollo. El pueblo, otrora inerte y contemplativo, ha sido sacudido por las descargas eléctricas provenientes del choque con todo cuanto se ha opuesto al paso avasallante de la revolución. Una sociedad alerta y disciplinada, cuya infinita capacidad de sacrificio queda demostrada a través de sus actos, en la cristalización de sus realizaciones. Los chinos ya no se sacrifican por el bienestar de los difuntos en el otro mundo, sino por la construcción vertiginosa del socialismo en este mundo.</p>
<p>La fortaleza de los sentimientos comunitarios, y la elevación del valor trabajo a la categoría de fin de la existencia, se expresan a través de las bocas, en las fulminantes respuestas que uno recibe, y a través de los brazos, en la obra que los hombres, creyendo ciegamente en la fuerza de los hombres, realizan. Células de un mismo organismo en desaforado crecimiento, interdependientes y solidarias: nadie escapa, en China, a las tensiones del esfuerzo colectivo. El sistema obliga a cada cual a reconocerse en la imagen que la sociedad requiere de él: la otra chance es el aislamiento, el exilio en la propia tierra, la aventura individualista sin destino en esta China 1964. Conversando en los campos y en los caminos y en las fábricas, he preguntado a los hombres acerca de su futuro, y no he recibido una sola respuesta que contemplara el interés privado: Quiero continuar la construcción del socialismo, elevar los niveles de producción, servir al Partido y al Presidente Mao, mejorar mi trabajo. He preguntado, también, sobre los sueños, cerrando los ojos, la cara en la palma de la mano, para que no hubiera lugar a dudas a causa de la traducción. Wang Sho-ming, de la comuna popular Pei Shi-cha, en Hopei, me dijo que sueña a menudo, en colores. ¿Con qué sueña? A veces, con el Presidente Mao. Otras veces, sueño con mejorar la producción para construir cuanto antes la sociedad socialista. Chang Chao-ping, de la misma comuna, también me dijo que sueña con mejorar la producción y la vida. Pero hubo un equívoco; no sueña con eso mientras duerme: No, antes; pienso en eso con la cabeza en la almohada. En la comuna popular Huang Tu-gang, un aldeano de 45 años, Ka Lieng-lu, sueña con su trabajo: Veo cómo las esteras protegen los vidrios de los invernaderos contra los embates del viento, que sopla y sopla, pero no puede contra las esteras. Siempre me veo trabajando aquí. Y me convidó con uno de los tomates de su invernadero, rojo, hinchado de jugo. La euforia no conoce límites: con la misma convicción con que estos trabajadores hablaban de la socialización del inconsciente, los obreros de la fábrica de maquinarias eléctricas de Cantón me mostraron una máquina británica que dejaron aquí los capitalistas, y me dijeron: Las que hacemos nosotros, son cinco veces mejores. Y como yo puse cara de duda, repitieron: Cinco veces mejores. No se puede comparar con las nuestras.</p>
<p>La comunión entre dirigentes y dirigidos en torno a los grandes objetivos de la recuperación nacional, es la que ha hecho posible que China esté surgiendo, por sus propios medios, del subdesarrollo a la industrialización. En esa fábrica de Cantón, por ejemplo, los obreros y los técnicos, trabajando en común, se las han ingeniado para diseñar y construir, usando materiales en desuso, toda clase de maquinarias y repuestos, artefactos toscos en su mayoría, pero útiles. En la fábrica de camiones de Shanghai, me contaron que en el año 59, habían hecho gestiones para comprar al Japón una máquina que costaba unos 170.000 yuanes. Los norteamericanos presionaron, y la operación no se pudo realizar. Entonces los obreros, sincronizando ideas con los técnicos, fabricaron una por su cuenta, que les costó treinta veces menos y que aunque es bastante fea, sirve. La mitad de los medios de producción de esta fábrica, proviene del ingenio y la paciencia de sus propios trabajadores; se pueden contar con los dedos de una mano las máquinas heredadas de la "época anterior", cuando la fábrica no era más que un taller de reparaciones. Y uno descubre manillares, palancas de cambios, chapas de camiones inútiles, aplicadas a otros usos en las máquinas que producen, ahora, camiones nuevos. Todo, me dijeron, gracias a la inteligencia colectiva.</p>
<p>El intercambio de experiencias entre los obreros de una misma fábrica, y los obreros y los técnicos entre sí, en cada centro de trabajo y en escala nacional, produjo también excelentes resultado en la fábrica textil nº 2, de Pekín. Entre otras cosas, se inventó allí un extractor y un colocador automático para los husos de algodón en las máquinas continuas de hilar, y todo un sistema para asegurar el contacto automático del hilado cuando se corta. Hoy, esos adelantos se usan en toda China.</p>
<p>En cada una de las fábricas que se visita, los frutos de la concentración de esfuerzos son exhibidos con orgullo, como testimonios de que la revolución es capaz de generar sus propios medios de subsistencia y desarrollo.</p>
<p>Para este laborioso, disciplinado pueblo, el mundo empezó a girar el día de la revolución. Todo queda dividido por el meridiano del 49; todo antes y después: no sólo las técnicas de producción y los sistemas de trabajo, sino también las matemáticas, la pintura, el teatro, la investigación de la historia y de la naturaleza, la religión, han comenzado una vida nueva el día que Mao asumió la Presidencia de China Popular. Y la vida de cada uno de los chinos está señalada, también, por ese segundo nacimiento del día en que "el mundo despertó". Yo tenía intereses egoístas. Pero el Partido me enseñó a servir al pueblo, me dijeron, en extraño coro, el último Emperador y un mecánico tornero de una fábrica de tractores.</p>
<h3 class="section-heading">TRADICIÓN Y REVOLUCIÓN</h3>
<p>La creación de una mística de la comunidad ha implicado, en más de un sentido, una ofensiva contra ciertos elementos contemplativos, individualistas y humanistas de la civilización china tradicional. Sin embargo, Mao no cesa de recordar que la revolución comunista se ha lanzado al rescate de la herencia traicionada de Sun Yat-sen, y la palabra de algunos filósofos tradicionales, como Confucio, Mencio y Lao Tsé, a menudo se invoca al costado de las frases de Marx. Este pueblo milenario, que inventó la pólvora y el papel, la brújula y el sismógrafo y la tipografía móvil, sigue apegado a muchas costumbres que nacen del pasado. El quinto día de la quinta luna, se celebra en Nankin la fiesta del Dragón, se come el tradicional pastel de arroz envuelto en hojas de bambú, y se arrojan alimentos al agua de los lagos, para que los peces dejen en paz el cadáver de Chu Yuan, el poeta que se suicidó, ahogándose, trescientos años antes de Cristo. Como éste, otros ritos se conservan, también, vivos.</p>
<p>Simultáneamente, la inercia de la tradición crea serios problemas a la revolución, que si bien se apoya en la historia que la precedió, es, al mismo tiempo, un movimiento que se vuelve contra ella. Por ejemplo, en el campo, el régimen patriarcal fue destruido con el nacimiento de las comunas populares. Hasta 1958, los salarios no se pagaban al trabajador o a la trabajadora, sino al jefe de familia: el viejo cobraba la parte de sus hijos y sus nueras. Desde entonces, cada cual cobra de acuerdo con su trabajo, y la medida, como es lógico, no ha caído nada bien a muchos ancianos. También las suegras fruncen el ceño frente a los cambios: ya no tienen sobre quién desahogar los sufrimientos padecidos en la juventud, porque las nueras de ahora se han "liberado" y exigen consideración a la par de los hombres; no son, ya, las bestias de carga a su servicio para todo quehacer; las casas-cuna y la amplia red de comedores colectivos, les permiten un margen hasta hoy desconocido de independencia.</p>
<p>La apertura de nuevos canales y la construcción de embalses y represas, suele chocar también con los tabúes heredados: se considera profanación la remoción de las tumbas dispersas en los campos. Una tumba cambiada de lugar, trae desgracia a las nuevas generaciones, pero el gobierno no tiene más remedio que proceder a la mudanza, cuando la tumba obstruye, pongamos por caso, el pasaje de un canal que llevará agua a las tierras resecas.</p>
<p>Distinta, naturalmente, es la actitud de los jóvenes, ya educados por el régimen a la hechura de Lei Feng, y sobre todo los jóvenes de las ciudades: cada vez se les hace más liviano el peso de las tradiciones "negativas"; el budismo, por ejemplo, religión de la introspección, la contemplación y el aislamiento, no los seduce tanto como el comunismo, que les brinda la redención a través de la acción, que los disuelve en la colectividad y que los absuelve de la duda. Todos los dispositivos han sido montados, para que el trabajo y la voluntad de sacrificio estén en el centro de las nuevas vidas que nacen. No me parece increíble, después de haber visto China con mis propios ojos, y habida cuenta del esquematismo de toda "escena, modelo", el ejemplo que cita Anna Louise Strong en uno de sus libros: Los novios son pudorosos, pero como el Dr. Ma Hai Teh vive junto a un lago por donde transitan con frecuencia las parejas de enamorados, puede escuchar a menudo sus conversaciones. Pasean sosegados, tomados de la mano y conversan sobre el modo de pensar de cada uno y acerca de los hornos de acero de ambos...</p>
<p>Claro que a veces aparecen ovejas descarriadas. El Teatro Popular de Arte de Pekín, estaba representando, en los días de mi visita, una obra que exponía un caso de joven sin ideales, para quien escuchar música, leer una novela o platicar con los amigos sobre los viejos tiempos —¡Ah, eso es vivir!—. El personaje prefiere las comodidades a la vida dura, a diferencia de un colega suyo, quien cree que el trabajo en aras del pueblo y del socialismo aporta a la vida un romance y una miríada de nuevos colores. Finalmente, el joven, leyendo una carta escrita con sangre por su madre fusilada, toma conciencia de su decadencia espiritual y se regenera.</p>
<p>El hecho mismo de que el tema haya sido tocado, parece indicar que Lei Feng no es todos los jóvenes chinos, pero parece indicar también que la sociedad está alerta ante la aparición del desinterés o la duda, dos formas de la herejía.</p>
<p>En el Instituto Sidero-Metalúrgico de Pekín, sostuve un diálogo con un estudiante de mi edad, que me parece una contundente profesión de fe de la religión del trabajo, que no deja sitio para otras religiones ni admite ninguna clase de distracción. Esta disciplina en el modo de pensar y de vivir, este fervor de la obediencia, expresan algo más que una voluntad personal. Chung Yao-fu, el estudiante en cuestión, cursa el quinto año. Estudia técnica de fundición del acero; en pocos meses más, se recibirá. Quiere ir a trabajar a una fábrica, me dice. ¿Qué fábrica? Todavía no sé. ¿Depende de usted? Depende de las necesidades del país. ¿Iría a trabajar a una comuna popular? Piensa unos instantes, y dice: Si me necesitan, no me importaría ir. Por supuesto, me habla de Lei Feng: me dice que era un ejemplo de la juventud y que debo aprender de él, para ser mejor de lo que soy. Le pregunto si tiene novia, mujer, si se piensa casar. Me responde: Concentro toda mi atención en los estudios. No he tenido tiempo en pensar en este problema. Y sobre religión: Eso tampoco me preocupa. ¿Sus padres, creen? Mi madre es budista, pero no va al templo.</p>
<p>Entre los personajes ideales y los hombres de carne y hueso, hay siempre una distancia que nace de la naturaleza misma de la condición humana, afortunadamente imperfecta. Pero, ¿se podría negar, conociendo China, que Lei Feng encarna un conjunto de aspiraciones que son la fuerza motriz, en los hechos tanto como en las palabras, de la sociedad que engendró su mito? No por casualidad la palabra tong-yé, "camarada" en chino, significa literalmente todas las voluntades en una.</p>
<p>La realidad de la que fui ocasional testigo, compleja y desconcertante, sufrirá, sospecho, profundas transformaciones a medida que vaya pasando el tiempo. Quienes hoy viven para trabajar, en la sociedad de la escasez, mañana trabajarán para vivir, en la sociedad de la abundancia. Pero no serán los mismos. El sentido de su tragedia es ése; también la clave de su destino. Nos espera un largo camino de diez mil li, había anunciado Mao, lúcido profeta de su propia aventura.</p>
