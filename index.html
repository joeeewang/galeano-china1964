<blockquote class="epigraph">China da miedo. Escuchamos y leemos: el peligro amarillo, los chinos quieren la guerra. Los chinos, es decir: setecientos millones de hombres; un gigante loco que echa espuma por la boca y clama por la destrucción de la humanidad. Antiguos resentimientos, incubados a lo largo de miles y miles de años, roen las entrañas de la gran potencia asiática. Tradicionalmente sola, marginada del mundo, preocupa hoy, en igual medida, a sus aliados de la víspera y a sus enemigos. ¿Con qué fuerza responderá a la fuerza del desprecio? ¿Será la revancha termonuclear de los humillados?</blockquote>
<p>Puesto que la revolución rusa estalló al influjo de la primera guerra mundial, y la segunda desembocó en el nacimiento de las "democracias populares" y el triunfo de la revolución china, el resultado de la tercera será el mundo entero comunista. Desencadenemos, pues, la tercera guerra mundial. ¿Razonan así los chinos? ¿Aspiran a imponer la revolución por la fuerza y desde afuera, en escala mundial? Cuando Mao expresó que el viento del Este es más fuerte que el del Oeste, ¿quiso decir que Occidente sería devorado por Oriente?</p>
<p>En esto, al menos, es seguro que coinciden Johnson y Jruschov: no opinan lo mismo sobre Fidel Castro, pero, para ambos, Mao es un Emperador peligroso que sueña con edificar una maravillosa civilización sobre los cadáveres de los hombres blancos y las cenizas de la sociedad industrial. China constituye, pues, una amenaza a la subsistencia de la humanidad.</p>
<p>Los soviéticos aseguran que Tao Chzu, miembro del Comité Central del Partido Comunista Chino, dijo a un periodista checo que en caso de guerra de exterminio, los pequeños países del campo socialista tendrán que subordinar sus intereses a los intereses comunes de todo el campo en su conjunto. La declaración habría sido una respuesta a la inquietud del periodista, quien habría expresado su temor de que una guerra nuclear pudiera aniquilar a los 13 millones de habitantes de Checoslovaquia. También citan a "otro alto funcionario", quien hablando con los representantes soviéticos a propósito de la alarma de Togliatti por la posible destrucción de Italia en caso de guerra, habría dicho: Pues quedarán otros pueblos. Y el imperialismo será aplastado...</p>
<p>Con citas semejantes, tan en el aire, se demuestra que China quiere la guerra. Del mismo modo, los soviéticos reproducen extractos de folletos chinos, desprendidos de su contexto —método que también practican los propios chinos, a la inversa, con resultados no menos deshonestos y eficaces. Fundamentalmente, los soviéticos hacen hincapié en un párrafo del largo artículo de la revista Hongqi, "Viva el leninismo". Y, sobre todo, en unas palabras pronunciadas por Mao en 1957.</p>
<h3 class="section-heading">UNA POSIBILIDAD QUE NO ES UN DESEO</h3>
<p>En su declaración del 21 de setiembre, los soviéticos aseguran que el artículo "Viva el leninismo" se refiere a las maravillosas perspectivas que, al parecer, se abrirán ante el género humano después de una guerra termonuclear.</p>
<p>Y en la carta abierta del 14 de julio, dicen, respecto al mismo artículo: Cabe preguntar a los camaradas chinos si se percatan de qué "ruinas" acarrearía tras sí una guerra mundial átomo-coheteril. El CC del PCUS, y en esto estamos convencidos de contar con el apoyo unánime de todo nuestro partido, de todo nuestro pueblo, no puede compartir las opiniones de la dirección china sobre la creación de "una civilización mil veces superior" sobre los cadáveres de cientos de millones de personas.</p>
<p>La discusión en torno a la interpretación de los textos podría prolongarse, como se comprenderá, hasta el infinito: los chinos hacen notar que los soviéticos han sustituido, maliciosamente, la expresión ruinas del imperialismo derrocado, por los cadáveres de cientos de millones de personas. He revisado escrupulosamente "Viva el leninismo", el explosivo primer documento chino de la polémica con los soviéticos. Y efectivamente, los cadáveres han brotado de la imaginación de sus contrincantes. Pero es, de todos modos, una conclusión posible: sólo que los cadáveres de cientos de millones de personas resultarían del desencadenamiento de una guerra nuclear por parte del imperialismo, posibilidad tan cierta como condenable desde el punto de vista chino. Si se dan vuelta las cosas hasta el extremo de afirmar que los chinos proponen levantar un bello futuro sobre las ruinas del viejo mundo desaparecido en una guerra termonuclear, ¿no se podría, acaso, llegar a la conclusión de que los chinos desean la guerra? Y no creo que de los textos se desprendan propósitos tan monstruosos. Los chinos, simplemente, prevén la posibilidad de que la guerra estalle, no por iniciativa de los países socialistas, sino por iniciativa del imperialismo. ¿Qué se subestima el poder de destrucción de las armas termonucleares? Efectivamente. Pero no dicen los chinos, en ningún documento, la frase que le atribuyen los soviéticos: La bomba nuclear es un tigre de papel. dicen, sí, que el imperialismo es un tigre de papel, temible a corto plazo, tácticamente, y despreciable a largo plazo, estratégicamente. Dicen, sí, que el poder de destrucción del imperialismo, esos famosos, amenazantes "dientes termonucleares", no alteran su naturaleza. Temen que la paz del miedo imponga la paz de la indignidad. El "chantaje nuclear" no debe maniatar, de ninguna manera, a las fuerzas revolucionarias del mundo. ¿Cómo olvidar la naturaleza agresiva del imperialismo, aunque levante una ramita de olivo con la mano izquierda? Si el imperialismo está condenado a muerte por las contradicciones que le muerden las entrañas, ¿por qué asustarse cuando levanta, con la mano derecha, un cartucho de dinamita? Esta manera de razonar, fruto del temor de que los principios puedan ser perdidos de vista, conduce a los chinos a menospreciar las consecuencias de una guerra mundial posible pero no deseable. Dice "Viva el leninismo": Nosotros estamos siempre contra la guerra criminal desencadenada por los imperialistas, por cuanto la guerra imperialista impone a los pueblos (incluido el pueblo de los EE. UU. y los de otros países imperialistas) inmensos sacrificios; pero si los imperialistas obligan a estos sacrificios a los pueblos del mundo, estamos seguros de que esos sacrificios serán recompensados, como lo demuestra la experiencia de la revolución en Rusia y en China. Los pueblos victoriosos crearán con la mayor velocidad, sobre las ruinas del imperialismo derrocado, una civilización mil veces superior que la existente bajo el capitalismo y construirán un futuro verdaderamente maravilloso. Abundan los testimonios científicos capaces de corregir este optimismo, en lo que tiene que ver con las consecuencias de una guerra mundial, que sería ya, sin duda, una guerra termonuclear. Se podría, entonces, reprochar a los chinos su excesiva capacidad de esperanza, pero sin perder de vista, de ninguna manera, que ellos se refieren a la guerra desencadenada por el enemigo, y no a la guerra provocada, por inexplicables conveniencias, desde Pekín.</p>
<p>Lo mismo ocurre con las declaraciones de Mao, que los soviéticos consideran la profesión de fe de un jefe guerrero sediento de sangre. Sobre las palabras de Mao, hay dos versiones. ¿Qué dijo, realmente, en 1957, durante la Conferencia de Moscú? Los soviéticos aseguran que los chinos han dado a conocer una versión corregida. Según ellos, Mao, tras sumas y restas, habría llegado a la conclusión de que posiblemente, en una futura guerra, morirían únicamente 900 millones de personas. Y habría hablado de la posibilidad de que los chinos probaran las fuerzas en una guerra mundial para volver luego a la construcción del socialismo. Los chinos niegan la veracidad de ambas afirmaciones; Mao habría dicho: ¿Cuántas personas morirán si estalla una guerra? De los 2.700 millones de habitantes del mundo entero, una tercera parte, o, si se calcula más, la mitad. Y luego: Nosotros, los chinos, aún no hemos terminado nuestra construcción y deseamos la paz. Sin embargo, si el imperialismo se empeña en librar una guerra, no tendremos otra alternativa que echar el pecho al agua y combatir hasta el final para volver a dedicarnos después a nuestra construcción. Sea cual fuere la verdad, estas estimaciones a propósito del porcentaje de humanidad que quedaría en pie sobre un mundo arrasado, son, sin duda, desagradables, y proporcionan, de un modo u otro, municiones a los enemigos de China, que aseguran que a sus dirigentes nada les importa de la vida humana —el traído y llevado— "desprecio chino" por la vida.</p>
<p>Pero las dos versiones de las palabras de Mao, la rusa y la china, coinciden en algo fundamental: Mao dijo, según los rusos, que no somos nosotros los que queremos eso, sino ellos, ellos son los que nos imponen la guerra. Y según los chinos, no sólo habría aclarado que tal era el punto de partida de su razonamiento, sino que además, en el planteo general, habría considerado ampliamente la posibilidad de que la guerra fuera evitada: Primero he dicho que el viento del Este prevalece sobre el viento del Oeste, y que no estallará la guerra, y luego he hablado de la situación que se creará en caso de que estalle una guerra, y he hecho una explicación complementaria. De este modo, ambas posibilidades han sido tomadas en cuenta.</p>
<p>¿Autorizan estas declaraciones a afirmar que los chinos predican la guerra entre las grandes potencias, la guerra mundial termonuclear? Al fin y al cabo, no es tan larga la distancia que separa las declaraciones chinas hoy impugnadas, de las opiniones del propio Jruschov, quien dijo en el XXII Congreso del Partido Comunista de la URSS: Si los imperialistas nos lanzan el reto de la guerra, no sólo lo aceptaremos sin la menor vacilación, sino que, con el abnegado valor y arrojo que distingue a los comunistas, descargaremos sobre el enemigo un golpe de fuerza aniquiladora, y agregó que, en las actuales condiciones, la guerra marcaría el fin del antipopular sistema imperialista. Cuatro años y medio antes, en marzo de 1957, la revista Komunist escribía: Quienes piensan que una guerra atómica significaría el fin de la civilización, quiéranlo o no, están sirviendo a la causa del imperialismo americano.</p>
<h3 class="section-heading">EL TESTIMONIO POPULAR</h3>
<p>¿Los dirigentes de la revolución china predican la guerra en el seno del pueblo, como quien ejercita un toro para la embestida? ¿El pueblo, en consecuencia, quiere la guerra? Test significativo, creo: si los dirigentes chinos quisieran la guerra, ¿cómo su pueblo, eco multitudinario, podría rechazarla de plano? Adiestrados para la homogeneidad, disciplinados como nadie para pensar y vivir, los chinos ofrecen, cualquiera sea el nivel cultural de quien se trate, un reflejo fiel de las ideas del gobierno, al menos en este problema de la polémica. A veces, claro, los slogans son mal asimilados y se convierten en caricaturas de las consignas originales, pero ello siempre sucede en el mismo sentido; se exagera, hasta el grotesco, el sentido de un planteo o de una crítica. En el primer capítulo, he reproducido casos elocuentes: aquel trabajador que decía que Jruschov iba por el camino del catolicismo, o aquel otro que estaba furioso porque el dirigente soviético había dicho que el sol de Belgrado era mejor que el de Moscú. O, en general, todos los que negaron que la Unión Soviética prestara ayuda alguna a Cuba, Ghana, Argelia y otros países que han conquistado la libertad y luchan por emerger del atraso. Se trata, pues, de una radicalización de las posiciones del gobierno hasta extremos que van más allá de la frontera de la sensatez, pero en ningún caso es una radicalización operada en sentido inverso al de la idea recibida.</p>
<p>Y bien: tengo para mí la convicción, que doy a conocer como impresión, de que el pueblo chino no quiere la guerra. Todas las mis consultas, coinciden. Sobre las intenciones ocultas de los dirigentes, si es que tales intenciones existen, no puedo, naturalmente, opinar. Por otra parte, no falta quien lo haga.</p>
<p>Eludí, demás está decirlo, la fórmula simplista: ¿Usted quiere la guerra? No hubiera servido para nada. Pregunté, en cambio, a obreros y campesinos, hombres y mujeres, jóvenes y viejos, soldados y estudiantes: ¿No cree usted que el socialismo podría triunfar en el mundo a través de una tercera guerra?, o bien: ¿No sería beneficiosa y deseable una tercera guerra mundial, si el imperialismo fuera destruido y todos los países pudieran conquistar el socialismo? En todos los casos, sin ninguna excepción, recibí respuestas negativas. En general, se me contestó: No necesariamente.</p>
<p>Wu Chang, obrero metalúrgico, se enojó: ¡No, no, no! —dijo—. Ustedes no nos entienden. Nosotros queremos la paz. La revolución y la paz. Ustedes significaba, sin sombra de duda, Occidente, el mundo de los blancos, mi mundo. Y Wu Chang repitió, para que yo entendiera de una buena vez: No queremos la guerra. No la queremos. Pero estamos seguros de que la revolución del proletariado triunfará en todo el mundo.</p>
<p>En los límites de una comuna popular del sur, nuestro automóvil se cruzó con un soldado de uniforme caqui, que caminaba, solo, apretando el paso entre nubes de polvo. Nos detuvimos, lo llamé, nos pusimos a conversar al sol, largamente. Fue una tortura para mi intérprete, que apenas si entendía el dialecto que el soldado hablaba, y para mí, que no encontraba ni un centímetro de sombra alrededor. Resultó llamarse Chang Ching-yuen, tenía granos en la cara y diecinueve años de edad. No era un soldado profesional; estaba haciendo el servicio militar obligatorio, aunque, dijo, me gustaría seguir en las fuerzas armadas para defender a mi patria. El imperialismo está siempre tratando de atacarnos. Y los revisionistas también están contra nosotros. De la polémica, dijo que los chinos siempre estamos defendiendo los principios marxistas-leninistas, mientras que la Unión Soviética se aleja de los principios. Y cuando le pregunté sobre la tercera guerra, tampoco vaciló: Para que el socialismo triunfe, no creo que sea necesaria. Pero eso no depende de nosotros, sino de la naturaleza agresiva del imperialismo. No podemos afirmar que no habrá guerra. No la deseamos, pero, tampoco la tememos. Si hay guerra, pelearé. No seremos nosotros quienes la provocaremos. No queremos la guerra. Le pregunté cómo haría para pelear en una guerra termonuclear, que se libraría entre laboratorios y no de trinchera a trinchera. Me miró, muy abiertos los ojos, y en seguida sonrió, sacudió la cabeza: No, no —dijo—. Las fuerzas de la paz pueden evitar la guerra. Evitarán la guerra.</p>
<p>Del mismo modo que fueron unánimes las respuestas contra una tercera guerra mundial, fueron unánimes también las respuestas en favor de un armamento nuclear propio para China. Hu Sao-hua, un estudiante muy jovencito que estaba realizando su primer período de trabajo manual obligatorio en una comuna al sudeste de Wuhan, me dijo: Necesitamos armas nucleares. Para defendernos. Sólo para defendernos. En la misma comuna, campo afuera, los equipos de producción estaban terminando de recoger el arroz; lo apilaban en las parvas, donde quedaría, secándose al sol, tres días. En uno de los equipos, conversé con U Tung-chai, uno de los tantos campesinos alfabetizado por la revolución. Me dijo que Jruschov se ha transformado. Yo no es un buen hombre. No quiere andar por el camino comunista. Respondió, tajante, a mi pregunta sobre la tercera guerra: Nuestro país aplica una política de paz, y sobre las armas nucleares me dijo: La base de nuestra política es defender la paz, pero si ellos nos atacan con las armas nucleares, debemos contestarles también con armas nucleares.</p>
<p>Wang Chu-kwei iba en bicicleta hacia su distrito, al norte de la comuna popular Pei Shi-cha, cuando lo abordé. Sabía leer y escribir, un poco. Sabía que los puntos de vista soviéticos no son acertados, sabía que los soviéticos están contra el marxismo-leninismo. Negó, él también, que la URSS proporcionara ninguna clase de ayuda a Cuba o Argelia, y me dijo no a la tercera guerra mundial. Sobre las armas nucleares: Ellos nos pueden atacar, debemos estar alertas. ¿Ellos, quiénes? Los reaccionarios y los revisionistas.</p>
<p>En la comuna popular Huang Tu-gang, al sudoeste de Pekín, conversé, entre otros, con Ma Su-ying, una campesina de rostro sufrido, gastado por las tristezas y los años. Me dijo que sus hijos eran también trabajadores del campo, como debe ser. Hace por lo menos cinco generaciones que es así; y así debe ser. Me dijo no, no, cuando le hablé de la guerra, y de las armas termonucleares: Eso no nos preocupa. Pero deberíamos tener eso, por si nos atacan. Yo le había explicado, con gestos, que se trataba de cohetes muy, muy explosivos.</p>
<p>A Chou Ching-le, otro campesino, le señalo el cielo para explicarle de qué se trata. Golpea la palma de la mano con el puño y dice: Sí, claro que deberíamos tener esas armas. Porque los demás las tienen. Para defendernos. Sobre el socialismo como un resultado de la guerra mundial, dijo, con las mismas palabras que la mayoría: No necesariamente.</p>
<p>Con Chieng Wei-iu, madre de cuatro hijos para quienes desea un destino de militancia y trabajo, conversé en su propia casa, en la comuna Huang-Tu. La encontré haciendo la comida; se puso nerviosa, se limpiaba las manos, continuamente, en un delantal descolorido. Un retrato de Mao colgaba, recuerdo, de una de las paredes de barro. Me dijo que la revolución le había enseñado a leer y que ahora la vida valía la pena de ser vivida. ¿Antes? No, no trabajábamos para el terrateniente. Éramos pequeños propietarios. Cinco mu; producíamos una tonelada de arroz al año. Stalin y Fidel son buenos, dijo; Tito es todavía más malo que Jruschov. Le hablé de las armas nucleares. Dijo: No sé, no me gustan esas cosas. Pero deberíamos tenerlas, porque el imperialismo todavía existe.</p>
<p>Pang Hung-guen dejaba pasar largos silencios antes de cada respuesta. Entonces, las palabras brotaban como torrentes, fluían atropelladamente, hasta que quedaba otra vez vacío y venía una pausa. Lo conocí en una fábrica textil de Hangchow; tenía treinta años pero representaba la mitad, minúsculo, de lentes, muy tímido. Estaba trabajando en la sala de revisación de telas, última etapa del proceso industrial, donde se inspecciona la producción pedacito por pedacito. Dijo: Los revisionistas no distinguen bien entre amigos y enemigos. Aún hay muchos trabajadores bajo la opresión de los imperialistas. Los revisionistas no luchan contra los imperialistas. Están junto a los imperialistas. Le pregunté: ¿Cómo explica usted, entonces, el apoyo soviético a la revolución cubana? Se puso a jugar con una tijerita, la pasaba de un dedo al otro, de una a otra mano: Las acciones de los revisionistas de la URSS expresan nada más que aventurerismo y capitulacionismo, dijo, y por espacio de diez minutos formuló, con lujo de detalles, la tesis china sobre la crisis de octubre del 62. Conversamos, es decir, conversó, sobre otros temas, y finalmente le pregunté si consideraba necesario que China fabricara armas nucleares por su cuenta. Siguió jugando un rato, entretenido esta vez con una pequeña pinza, de esas que se usan para atrapar los hilitos rebeldes que se han salido de la trama. Y dijo: El acuerdo tripartito sobre armas nucleares, no es más que un engaño. Los tres países firmantes quieren amenazarnos con las armas nucleares. Para defender la paz, debemos fortalecer las defensas de nuestro país. Deberíamos fabricar, en consecuencia, armas nucleares, pero sólo para la defensa de la paz mundial. No queremos la guerra. China practica una política de paz.</p>
<h3 class="section-heading">UN PAÍS QUE SE SIENTE ACORRALADO</h3>
<p>Para comprender que las respuestas sobre una tercera guerra mundial y sobre el problema de las armas nucleares, no se contradicen, es preciso no perder de vista la situación que ha vivido China desde el triunfo de la revolución del 49, y, sobre todo, la situación que vive en la actualidad. Numerosos factores confluyen para provocar, en los chinos, una especie de complejo de persecución.</p>
<p>Empecemos por mirar el mapa: al sur, la India, gobernada por una burguesía que va perdiendo, a un ritmo alarmante, su sentido nacional anti-imperialista y que en cambio exacerba su sensibilidad patriótica cuando está en juego una franja de territorio, de propiedad dudosa, en el Himalaya. Al suroeste, el Pakistán, país clave de la CENTO. Puntas de lanza norteamericanas al este y al sureste: Corea del sur, Japón, Vietnam del sur, Thailandia. Al norte y al oeste, una Unión Soviética cada vez más hostil.</p>
<p>Las fronteras chinas asoman erizadas de púas enemigas, aunque en algunos casos, por habilidad política o interés comercial, la tensión de la enemistad se afloje. Los crecientes intercambios con el Japón, por ejemplo, han contribuido a aliviar la presión, pero no por ello el Japón ha dejado de ser una segura base norteamericana en el Pacífico; es decir, un agresor potencial, desde el punto de vista chino.</p>
<p>El presidente de Pakistán no oculta cierta simpatía por la posición china en el conflicto con la India, porque su propio país está envuelto en dificultades con los hindúes a raíz de las reclamaciones territoriales de Cachemira. Pero no por ello el Pakistán deja de ser miembro de las alianzas militares fabricadas por las potencias occidentales.</p>
<p>Permanentemente, la infiltración de espías desde Formosa, y los actos de sabotaje, recuerdan a China "la naturaleza agresiva del imperialismo". En los días en que yo estaba en Pekín, el gobierno anunció la captura de dos grupos de "invasores" y el abatimiento de un U-2 en la zona del este, derribado por la fuerza aérea del Ejército Popular de Liberación. Era el segundo U-2 que la artillería china había liquidado en poco más de un año, y el séptimo avión de "reconocimiento" que caía, si se tiene en cuenta los aparatos norteamericanos de otro tipo. En consecuencia, el gobierno formuló su advertencia número 268 contra "las provocaciones militares del imperialismo".</p>
<p>De acuerdo con el tratado de 1954, los EE. UU. están obligados a defender Formosa y las islas vecinas, y Chiang Kai-shek no puede realizar ninguna acción ofensiva sin el consentimiento de Washington. ¿Miente o exagera China, cuando atribuye a los EE. UU. la responsabilidad de las acciones ofensivas que, desde Formosa, se llevan a cabo contra su soberanía?</p>
<p>Chiang, hipnotizado por la tierra perdida que aguarda más allá del horizonte, confía en una guerra santa de recuperación nacional que lo devuelva al trono. Cuenta con un ejército profesional de 400.000 hombres, maquinaria militar montada, aceitada y puesta en funcionamiento por los EE. UU., en cuyo presupuesto pesa considerablemente: cien millones de dólares anuales. El ejército de Chiang, tiene 400 generales y 700 coroneles más que el ejército norteamericano, que es el doble de grande. Rodeado de tantos venerables mandarines, escuchando sin pausa el mágico tintineo de las medallas sobre los pechos de los uniformes, el viejo delira: cree que es el hombre más poderoso del Asia. Sus "fuerzas especiales", comandadas por el hijo mayor y preferido, constituyen el Ejército Anticomunista de Salvación Nacional. Constantemente, informan de la realización de sabotajes en territorio chino: dicen que destruyen plantas generadoras y vuelan puentes y descarrilan trenes. Pero, constantemente también, el gobierno de China Popular informa sobre la captura de grupos de espionaje y sabotaje, y da cuenta del abatimiento de los aviones que violan su espacio.</p>
<p>Como los propios norteamericanos —excepto los senadores del lobby correspondiente— lo reconocen, el retorno de Chiang Kai-shek al poder por la vía de una invasión, es impensable. Bien advertía el mariscal Montgomery que la primera regla de la estrategia de la segunda mitad del siglo XX, consiste en no intentar jamás invadir el continente chino. La existencia de un poder interno consolidado, permite el aprovechamiento, a los fines de la defensa nacional, de las condiciones naturales que hacen a China, hoy día, inexpugnable. Además, el nacimiento de las comunas populares ha contribuido en gran medida a fortalecer el país. Con ellas, nacieron también centenares de miles de pequeños embalses locales, complementarios de las inmensas centrales eléctricas de irrigación; rudimentarias plantas de industria liviana brotaron por todas partes, a lo largo y a lo ancho del país, al punto que uno encuentra talleres instalados en lugares inverosímiles; y los ciudadanos fueron organizados, hasta en los más remotos confines, en unidades móviles, ágiles y pequeñas, listas para el combate. China cuenta, a esta altura, con inmejorables condiciones de seguridad y elasticidad, naturales o adquiridas, para hacer frente a una invasión convencional. Súmese, por otra parte, la rica experiencia militar adquirida en los largos años de la guerra civil y de la guerra de resistencia nacional contra el Japón. Y, además, en la base de todas las razones mencionadas, hay que tener en cuenta la tensa disciplina del pueblo, adiestrado para estar siempre en guardia.</p>
<p>Presa codiciada y desangrada por varios imperialismos, en negras páginas de historia reciente o lejana, China vive en estado de alerta, esperando el golpe, el zarpazo. Y la presencia cercana del enemigo, su continuo hostigamiento, le hace sentir sin tregua el peligro del regreso a los viejos tiempos de la humillación y el caos, la tiranía y el hambre. Desde las costas chinas, se puede ver, como una advertencia, las siluetas de los acorazados norteamericanos de la Séptima Flota.</p>
<p>Entonces, cabría preguntarse, si su país es invulnerable, ¿qué pueden temer los chinos? ¿Por qué reaccionan a veces, pueblo y gobierno, como si estuvieran a punto de ser aniquilados? ¿Por qué China, si no tiene propósitos agresivos, se propone contar con un armamento nuclear propio? Es un país que está muy lejos, todavía, de la abundancia: ¿qué necesidad tiene de desviar sus recursos, aún escasos, hacia las construcciones militares más onerosas? ¿Por qué esa sistemática desconfianza, frente a todo y a todos?</p>
<p>A las preguntas, se puede contestar con preguntas. ¿Se podría exigir a China, despojada de sus tribunas en los organismos internacionales, hostigada y despreciada, una actitud distinta? ¿Cómo se podría negar que las diferencias de situación condicionan diferencias de criterio? ¿Acaso no cuentan el bloqueo político y el bloqueo económico? Aislada del mundo, con sus setecientos millones de habitantes todavía luchando a brazo partido contra la miseria, la coexistencia pacífica es, para China, hoy por hoy, algo que sólo sucede a los demás. El enemigo está ahí, muestra los dientes y hace uso de ellos: ¿Cuánta sangre está costando la ruptura del "cordón sanitario" en Vietnam del sur, por ejemplo? Cada vietnamita que cae, es una nueva víctima de la lucha por la liberación de su patria de la opresión extranjera, pero es, además, desde el punto de vista chino, un héroe que está contribuyendo a alejar al imperialismo, ansioso de revancha, de los alrededores. Hasta ahora los chinos sólo han conocido, de Occidente, la hostilidad.</p>
<p>Teniendo en cuenta todo este complejo de factores, y otros muchos que podrían ser agregados, entre los cuales estaría la propia polémica con la Unión Soviética, no pueden asombrar algunos hechos insólitos. Abundan los testimonios de la intransigencia y el encierro. Citaré dos: encontré, en Shanghai, un cura chino, de la Iglesia Católica, que me aseguró que el Concilio Ecuménico convocado por Juan XXIII, había sido organizado contra China, por el imperialismo norteamericano. Cuando lo comenté, asombrado, con mis acompañantes, el intérprete y el guía, ellos me dijeron que efectivamente, así era: el Concilio era una acción agresiva del imperialismo contra China. Y el segundo ejemplo: a mi compañero de viaje le fue prohibido tomar fotografías a orillas del río Huangpú, en Shanghai. Preguntó, extrañado, por qué, y los chinos le señalaron un minúsculo vaporcito militar anclado en los muelles.</p>
<p>Claro que son gratuitas tantas prevenciones; claro que carece de sentido esa negación a priori de todo cuanto provenga del lado occidental, así se trate de una reunión religiosa o de un film, de una novela o de una declaración política. Pero, ¿de quién es la culpa sino de Occidente? La situación que hoy vive China no nació por generación espontánea. Aún hoy, Mao sigue siendo el Emperador de los parias, hampa de la historia, para los mismos círculos de poder occidentales que celebran conversaciones y acuerdos, de igual a igual, con la Unión Soviética, y para los cuales Jruschov es el socio obligado en las negociaciones de la paz.</p>
<p>La reciente actitud de De Gaulle, quien desafió la indignación de las voces obsecuentes de la OTAN y reconoció al gobierno de China Popular, quizás contribuya a alterar el panorama actual.</p>
<h3 class="section-heading">LA GIGANTESCA TAREA</h3>
<p>Una política agresiva en el plano internacional, implicaría la inflación de los gastos militares y una distracción del esfuerzo nacional hacia los planes bélicos de expansión exterior. China afronta otro desafío, que le exige poner en tensión todas sus fuerzas en una misma dirección: la abrumadora tarea de la construcción del socialismo dando el gran salto desde el atraso y el sometimiento, hacia el desarrollo y la independencia. No puede darse el lujo de promover una guerra: la dispersión de fuerzas y el derroche de recursos tendría consecuencias catastróficas para un país que está proporcionando a sus habitantes, pan, techo, cultura y fuentes de trabajo, sin apoyo exterior. Desde el verano de 1960, la asistencia soviética no se brinda en un volumen digno de consideración, y, por supuesto, China tampoco cuenta con la asistencia occidental. Otros países subdesarrollados, en cambio, como la India o la República Árabe Unida, cuentan con la ayuda de los dos bloques.</p>
<p>El aislamiento de China tiene consecuencias internas que parecen contradecirse entre sí: por un lado, la soledad, sumada al peligro de la revancha imperialista, desarrollan complejos de persecución que mueven a los chinos a movilizarse por un armamento termonuclear propio; por otro lado, la necesaria concentración de energías para la construcción del socialismo apoyándose nada más que en los propios esfuerzos, hace que la paz sea, para los chinos, una necesidad.</p>
<p>Visitantes tan imparciales como Edgar Faure, ex presidente del Consejo de Ministros de Francia, coinciden en sus impresiones: los dirigentes chinos son plenamente conscientes de la abrumadora tarea que tienen por delante, y rechazan los procedimientos "aventureros" —para usar, precisamente, la expresión china— en la solución de sus problemas de política interior y exterior.</p>
<p>Faure ha expuesto un punto de vista interesante, a raíz de su reciente viaje a China, en los umbrales del reconocimiento diplomático francés. Según él, es una ley de observación constante en los países socialistas, que la regla aplicada a los problemas exteriores, es idéntica a aquella que se aplica a los problemas internos. Y como la dirección china adopta, actualmente, una óptica realista y razonable dentro de fronteras, y no difunde ya estadísticas bambolleras ni planea perspectivas magníficas, ¿cómo se podría conciliar esa actitud de prudencia, perseverancia y modestia, con una política agresiva en el plano internacional?</p>
<h3 class="section-heading">LA OPINIÓN DE LOS HECHOS</h3>
<p>Los países, como las personas, se definen por sus actos más que por sus palabras. En este sentido, resulta especialmente reveladora la conducta china ante el problema de la recuperación de Formosa, Macao y Hongkong, pedazos del territorio nacional que permanecen en manos ajenas. ¿Acaso los chinos han precipitado el desarrollo de los acontecimientos? Por el contrario, durante los catorce años transcurridos desde que el Partido Comunista tomó el poder, han dado al mundo una lección de paciencia. La fruta caerá, parecen decir, pero sólo cuando esté madura. China será dueña de todo su territorio, sin necesidad de cometer errores de "aventurerismo".</p>
<p>Sin ánimo de emitir juicios sobre el delicado problema fronterizo con la India, quiero limitarme a recordar al lector algunos hechos que parecen demostrar que tampoco en este caso China ha hecho gala de una política guerrera expansionista. Los chinos habían propuesto nueve veces negociaciones sin preliminares, al gobierno de Nehru, antes de que las ráfagas de ametralladora atravesaran el Himalaya. Las tropas hindúes abrieron fuego seis días después de que el gobierno chino cursara su novena nota a Nueva Delhi: la nota fue contestada en términos ambiguos, y una columna del ejército hindú avanzó sobre Che Dong, por orden de Krishna Menon. Después de haber ridiculizado al ejército hindú, que se retiró en desorden del campo de batalla, los chinos abandonaron el territorio conquistado y se replegaron a sus posiciones originales, al norte de la línea Mac Mahon. Devolvieron las armas capturadas y los prisioneros, y reanudaron las tentativas de negociación, frenadas en la actualidad por algunas discrepancias en la interpretación de las recomendaciones de la conferencia de Colombo.</p>
<p>Una opinión simplista, ampliamente difundida, atribuye a los chinos una política sistemáticamente opuesta a las negociaciones. Ellos dicen, sin embargo: Siempre hemos sostenido que los que rehusan negociar en todas las circunstancias no son en absoluto marxistas-leninistas. Los chinos estuvieron dispuestos, desde octubre del 51, a negociar el armisticio en Corea, con los EE. UU.; participaron activamente en la Conferencia de Ginebra de 1954, hicieron su contribución al restablecimiento de la paz en Indochina y algunos años después, colaboraron en el acuerdo de respeto a la independencia y a la neutralidad de Laos; también negociaron a propósito de Formosa: desde hace ocho años, se realizan conversaciones entre China y EE. UU., a nivel de embajadores, en Varsovia.</p>
<p>Incluso durante la larga guerra civil revolucionaria, el Partido Comunista realizó, en varias oportunidades, negociaciones con el Kuomingtang; las últimas, en las vísperas mismas de la toma del poder. Y aún después, Mao llegó al extremo de ofrecer a Chiang Kai-shek un puesto en el engranaje del gobierno comunista. Cuando los chinos acusaron a los soviéticos de participar en "el complot de las dos Chinas" en complicidad con los EE. UU., los soviéticos sacaron a relucir esa información. En Pekín, me confirmaron que, en efecto, no habría ningún inconveniente en recibir y "reeducar" a Chiang. Hicieron lo mismo, al fin y al cabo, con el último Emperador de la dinastía Ching (capítulo 6).</p>
<h3 class="section-heading">COEXISTENCIA Y REVOLUCIÓN</h3>
<p>De modo que China no desencadena una guerra, porque todavía no está en condiciones de llevar adelante tan costosa aventura, pero, en cambio, azuza a su poderoso aliado, la Unión Soviética, para que arroje de una buena vez esas bombas sobre la Casa Blanca. De no ser así, ¿por qué niega la tesis de la coexistencia pacífica?</p>
<p>Respondemos: no, amigos. Que abandonen esa treta sensacionalista de falsificación y denigración. El Partido Comunista de China no sólo ha manifestado de palabra su oposición decidida a que la URSS y los EE. UU. "choquen de cabeza", sino que también ha procurado, en la práctica, evitar choques armados directos entre estas dos potencias¹. Y dicen también los chinos: Los países socialistas deben aplicar la política leninista de coexistencia pacífica entre países de sistemas sociales diferentes². Sostienen que Lenin nunca se opuso indiscriminadamente a todas las guerras, y citan sus palabras: Reconocemos plenamente que las guerras civiles, es decir, las guerras llevadas a cabo por la clase oprimida contra la clase opresora —la guerra de los esclavos contra sus amos, de los campesinos siervos contra los señores feudales, de los asalariados contra la burguesía— son legítimas, necesarias y progresistas. Y concluyen: La posibilidad de evitar una nueva guerra mundial es una cosa, y la de evitar todas las guerras, incluidas las revolucionarias, es otra. Es completamente erróneo confundir la una con la otra³. Incluso la Enciclopedia Soviética lo reconoce así: La guerra justa —dice, definiéndola— no anexionista, emancipadora, que tiene por objetivo sea defender al pueblo contra una agresión del exterior y contra las tentativas para someterlo, sea liberar al pueblo de la esclavitud capitalista, sea en fin, liberar a las colonias y a los países independientes del yugo de los imperialistas. Pero, ¿acaso Jruschov lo niega? En la declaración soviética del 21 de setiembre del 63, se lee: Los pueblos que con las armas en la mano luchan por su libertad e independencia, por el socialismo, sostienen una guerra justa y siempre los hemos apoyado y apoyamos. Entonces, ¿de qué se trata? ¿Un gran equívoco? ¿Un diálogo entre sordos, en el que ambas partes dicen lo mismo sin darse cuenta?</p>
<p>¿Han demostrado los rusos, a través de sus actos, que temen a las guerras de liberación? Los chinos juzgan tanto por los fines ocultos como por los hechos; por las intenciones tanto como por los actos. El agrio debate delata la desconfianza: La rectoría del mundo, compartida por las dos grandes potencias, ¿no se traducirá en un reparto de zonas de influencias, con recíprocos compromisos de no intervención?</p>
<p>En los documentos soviéticos, hay dos concepciones que no aparecen del todo claras, y que los chinos interpretan a su modo, para concluir que la URSS se ha puesto de acuerdo con las potencias imperialistas en una nueva "Santa Alianza" contra los pueblos del mundo. La primera de esas concepciones, se refiere a la peligrosa repercusión de las guerras locales; la segunda, tiene que ver con el resurgimiento nacional de los países liberados. Los chinos dicen que Jruschov tiembla de miedo ante las guerras revolucionarias de los pueblos oprimidos, porque teme que se desemboquen en una catástrofe termonuclear universal. ¿Qué han dicho, en verdad, los soviéticos? Recurro nuevamente a la declaración del 21 de setiembre: ...las guerras locales pueden ser la chispa que prenda la llama de la guerra mundial. Los dirigentes chinos cometen un grave error al afirmar que los conflictos locales en ninguna circunstancia pueden desembocar en una guerra termonuclear general. La lógica de sus reflexiones es tal, que lleva a reconocer las guerras locales como método de política aceptable y conveniente también para los países socialistas, en particular para la "exportación" de la revolución. Pero toda la experiencia de los años de postguerra, la experiencia de crisis como, por ejemplo, la de Suez, debida a la agresión anglo-franco-israelí contra Egipto, prueba cuán grande es en nuestro tiempo el peligro de transformación de las guerras locales en una guerra general. En el párrafo siguiente, se reitera el apoyo a las sagradas guerras de liberación nacional. Ahora bien, ¿en qué se distingue una "guerra local" de una "guerra de liberación"? ¿Cómo se definiría, por ejemplo, la guerra en Vietnam del sur? O, para recurrir al caso citado en el propio documento, la crisis de Suez, provocada por la nacionalización del Canal, ¿acaso no fue un episodio de "guerra de liberación" protagonizado por el pueblo egipcio contra el imperialismo? ¿Debe entenderse el apoyo a este tipo de "guerras locales" como una forma de exportación de la revolución, según parece desprenderse del párrafo citado? Pero, entonces, la confusión crece. La ayuda militar soviética proporcionada a los argelinos durante su proceso revolucionario, que para Jruschov constituye un testimonio de solidaridad con las "guerras sagradas", ¿no fue, acaso, desde este punto de vista, una forma de "intervención"?</p>
<p>La segunda concepción que resulta dudosa, se refiere a los países liberados. En el informe de Nikita Jruschov al XXII Congreso, se publica un cuadro que relaciona el mundo de 1961, con el de 1919; un mapa político según el cual la población de todas las colonias, semicolonias y dominios, era, a 1961, de tan sólo 83,4 millones de habitantes, último residuo de una época superada. No se puede tratar de un error de imprenta, porque el propio Jruschov, en su discurso, tiene en cuenta la cifra al hablar de la desintegración del sistema colonial. Y bien: desde el año 61 hasta ahora, algunos nuevos estados independientes han surgido en África, de donde cabe deducir que la cifra ha disminuido todavía más. Cabe preguntarse, entonces, cuál ha sido el sistema empleado para la clasificación de la población del mundo de nuestro tiempo: los doscientos millones de habitantes de América latina, ¿pertenecen a países independientes? ¿Qué se entiende por "independencia"?</p>
<p>Los hechos son bien claros, dicen los chinos. Desde la segunda guerra mundial, los imperialistas no han renunciado de modo alguno al colonialismo, sino que han adoptado una nueva forma, la del neocolonialismo. Una de las importantes características de este neocolonialismo radica en que el imperialismo se ha visto obligado a cambiar su vieja forma de dominación colonial directa, y a adoptar una nueva forma, la de dominación y explotación coloniales a través de los agentes seleccionados y preparados por él⁴. Y, haciendo hincapié en las declaraciones más que en los hechos, llegan a la conclusión de que para Jruschov la lucha contra el imperialismo no sólo no es el centro de las contradicciones de nuestro tiempo, sino que es una faena prácticamente terminada, que la liquidación del poder colonialista ha entrado en su fase de coronamiento; y que, en consecuencia, los soviéticos creen que ya se puede tratar al enemigo como si fuera un amigo con un trascendente interés común: impedir la guerra.</p>
<p>Nadie creerá que la solución de los problemas del resurgimiento nacional de los países liberados se puede alcanzar hoy en el campo de batalla, dijo Jruschov a un grupo de periodistas africanos, recientemente. ¿Podrían haberlo dicho los chinos? La diferencia, digna de consideración, reside en que los chinos y los soviéticos no entienden lo mismo por "países liberados". ¿Basta la independencia política formal, el montaje de un aparato institucional propio, para hacer un país libre?</p>
<p>De allí proviene el debate en torno a los caminos que conducen a la paz. Si a pesar de la nueva relación de fuerzas en el mundo, las contradicciones entre los países oprimidos y opresores por una parte, y por la otra, entre los países opresores entre sí, permanecen vigentes y candentes, el imperialismo sigue conteniendo, en sus entrañas, la guerra. Sigue siendo la causa de la guerra. Desde el punto de vista chino, pues, la lucha contra el imperialismo implica la lucha por la paz; porque habrá terreno para las guerras mientras subsistan el imperialismo y el sistema de explotación del hombre por el hombre. La aparición del arma nuclear no modifica, según los chinos, este esquema: Hemos sostenido consistentemente que los países socialistas no deben ni necesitan utilizar el arma nuclear para apoyar las guerras nacional-liberadoras y las guerras civiles revolucionarias de los pueblos⁵. En cambio, desde el punto de vista soviético, el imperialismo sí ha cambiado, y con él sus contradicciones. No se puede discutir en el cementerio, parecen decir sus documentos: la alternativa es aniquilación o supervivencia y en la lucha por la paz, objetivo universal, todos, tirios y troyanos, están interesados.</p>
<p>En el centro mismo de la polémica late, como un corazón furioso, la desconfianza china: el temor de que la coexistencia pacífica, tal como la entienden los soviéticos, ablande, ciegue o adormezca a los pueblos oprimidos que aguardan, todavía, su turno, y que no son tan pocos como Jruschov supone.</p>
<h3 class="section-heading">EL ESPÍRITU DE CAMP DAVID</h3>
<p>Una línea telefónica directa comunica a Moscú con Washington; los Estados Unidos y la Unión Soviética realizan experimentos conjuntos en comunicaciones desde el espacio: mientras escribo, el Echo II, primera etapa del plan, ha sido disparado al cielo. Hace pocos meses, el mundo saludó, en su abrumadora mayoría, la firma del tratado que prohibía las explosiones nucleares en la atmósfera. Jruschov, que había abominado del tratado hasta poco tiempo antes de firmarlo, proclamó que había sido una gran conquista arrancada a las fuerzas de la agresión y la guerra, por las fuerzas del socialismo y la paz. Los EE. UU. prosiguieron realizando explosiones subterráneas —once, hasta la fecha— y los chinos pusieron el grito en el cielo. El tratado —dijeron, dicen— constituye una enorme conspiración contra las fuerzas de la paz de todo el mundo: un fraude sucio.</p>
<p>A excepción de los chinos, pocos han evitado un suspiro de alivio. Hasta Fidel Castro, que no firmó el tratado, lo elogió como un paso adelante en el camino de la paz. Todo lo que contribuya a evitar el tránsito de la guerra fría a la guerra caliente entre las grandes potencias, aleja el peligro del salto ciego hacia el abismo y contempla, en consecuencia, los intereses de la humanidad. En la tercera guerra, ya se ha dicho, no habrá vencedores. Los chinos no pueden ignorar que las condiciones objetivas obligan a Jruschov a una política de paz, y la paz, tratada de potencia a potencia sobre las mesas de negociaciones, no puede ser imaginada sin concesiones recíprocas. La Unión Soviética está desgarrada entre su responsabilidad de gran potencia y su condición de eje del movimiento comunista internacional. No puede arriesgar una catástrofe internacional, pero tampoco puede arriesgar la pérdida del prestigio como cabeza visible de la revolución de nuestro tiempo: otros hay, aguardando la oportunidad de ocupar su sitio.</p>
<p>Cuando la crisis del Caribe, en octubre del 62, la Unión Soviética estuvo al borde de una quiebra en ese sentido. El destino de un pequeño país había sido jugado entre las dos potencias sobre un tablero de ajedrez, y el retiro de los cohetes fue denunciado como una capitulación por los chinos, que también denunciaron su instalación como un acto de aventurerismo. Más de un año transcurrió, aunque no han cesado las hostilidades y el bloqueo norteamericano continúa y Cuba no ha sido invadida, lo cual fortaleció el prestigio decaído de Jruschov: los EE.UU. respetaron, en esencia, el compromiso contraído, y el compromiso, de esa manera, demostró que existía. Los cohetes no habían sido retirados a cambio de nada. Pero los chinos no han dejado de agitar otro argumento: ¿Con qué derecho Jruschov autorizó, en aquellos días, la inspección del territorio cubano por parte de las Naciones Unidas? En su mensaje a Kennedy, del 27 de octubre, Jruschov dijo: Estamos conformes en ponernos de acuerdo con usted para que los representantes de la ONU puedan certificar el desmantelamiento de estos medios⁶. Si Fidel Castro no se les hubiera plantado delante con sus cinco condiciones, ¿no se hubiera repetido, en Cuba, la experiencia del Congo?</p>
<p>Los chinos se niegan a ver, en la crisis de sus relaciones con Moscú, nada que no sea efecto de la degeneración ideológica de Jruschov y los suyos: La prudencia, nacida de la situación de la Unión Soviética como potencia capaz de fulminar al mundo apretando botones, es llamada cobardía, y la custodia de los propios intereses nacionales, es calificada de egoísmo.</p>
<p>No parece, sin embargo, que la política soviética de coexistencia, la consolidación del así llamado "espíritu de Camp David", obedezca, en esencia, a las "desviaciones" de un puñado de traidores empeñados en escupir la memoria de Stalin. Es un resultado, por un lado, de la situación interna de la URSS: el fardo armamentista resulta demasiado pesado para la economía de un país que se propone construir el comunismo en veinte años. Por otro lado, la distensión obedece, objetivamente, a la aparición de la bomba termonuclear como convidado de piedra en el escenario internacional: la paz del miedo entre las grandes potencias, una política, pues, necesaria y quizás inevitable desde el punto de vista de los intereses en juego.</p>
<p>Los soviéticos han dejado atrás la hora de las barricadas; la paz favorece la realización, sin sobresaltos, de su construcción interna. Al mismo tiempo, no se puede negar, creo, aunque los chinos lo ignoren, que la Unión Soviética está desempeñando un papel muy importante en el fortalecimiento y desarrollo de algunos países recién asomados a la independencia. Cabría preguntarse qué habría sido de Cuba sin su respaldo. Pero, la política de coexistencia pacífica entraña sus contradicciones, y no puede ser practicada impunemente. La campana de alarma de los chinos no ha sonado por casualidad: ellos sienten, evidentemente, el peligro de que los crecientes acuerdos entre las grandes potencias puedan imponer un freno a los movimientos de liberación, que la sublevación de las orillas sometidas sea sacrificada en los altares de la coexistencia. No se puede jugar con fósforos sobre los barriles de pólvora, y me parece innegable que la violencia revolucionaria en la retaguardia del imperialismo, desafía el status de convivencia y emulación pacífica con el campo socialista, en razón de los compromisos asumidos por la URSS como país guía del movimiento obrero en el mundo. De ahí la insistencia de Jruschov en la posibilidad del tránsito pacífico hacia el socialismo —una vieja idea de los socialdemócratas, tradicionalmente fulminados por los bolcheviques con los epítetos más agraviantes. De ahí, también, que la URSS se vea obligada a ajustar su política a los flujos y reflujos de la tensión, apartándose, en ocasiones, de los principios. ¿En qué medida son responsables los soviéticos de las oscilaciones de los demás, los fieles camaradas de otros países del mundo?</p>
<p>Eisenhower fue recibido con los brazos abiertos por algunos partidos comunistas latinoamericanos, súbitamente olvidados de que había sido el agresor de Guatemala: ocurría que poco tiempo atrás, en setiembre de 1959, la Unión Soviética y los Estados Unidos habían celebrado las conversaciones de Camp David. Maurice Thorez dio la espalda, más de una vez, a la revolución argelina, porque creyó que los circunstanciales acercamientos entre Jruschov y los dirigentes franceses imponían una política de buena conducta. Abundan los ejemplos de claudicaciones como éstas. ¿Culpa de la URSS, o de la estructura misma del movimiento comunista internacional que gira en torno de una autoridad central como una rueda alrededor de su eje?</p>
<p>El peligro de capitulación que inquieta a los chinos, concierne, fundamentalmente, a los partidos comunistas, presos de un engranaje cuyos vicios genéricos han sido puestos en evidencia a raíz de la polémica actual. En esta nueva vuelta de la historia, el destino ha depositado en manos de los chinos, paradójicamente, el estandarte de Stalin, viejo experto en sacrificar revoluciones ajenas para salvaguardar la propia.</p>
<h3 class="section-heading">La resurrección de Stalin</h3>
<blockquote class="epigraph">Georgi, un amigo ruso, me dijo una noche, mientras cenábamos, en Moscú: Creo que estoy de acuerdo con aquella frase famosa: la historia siempre ocurre dos veces; sucedió primero como tragedia, con Stalin, y se repite ahora, como farsa, con Mao. De donde deducía que muerto Mao, se acabaría la rabia, del mismo modo que la muerte de Stalin había implicado la desaparición del stalinismo en la URSS. Alguno de sus lugartenientes ocuparía, entonces, su sitio, y no demoraría en denunciar el culto de la personalidad y los abusos de poder. ¿Es Mao, realmente, un segundo Stalin? ¿Son stalinistas los chinos?</blockquote>
<p>Sólo vi una imagen de Stalin durante toda mi jira por la Unión Soviética. Fue en Tbilisi, capital de Georgia; reconocí, al pasar, su rostro en un bajorrelieve del frontispicio del Instituto de Marxismo-Leninismo. No pude contener una exclamación; pregunté, entonces, a mis acompañantes, quién era aquel señor a quien no había visto antes. Rieron y me explicaron: Comprenda. Esta era su patria.</p>
<p>En cambio, en China, uno se encuentra con Stalin por todas partes. Durante las celebraciones del 1º de octubre, su retrato inmenso aparecía en la plaza de Tien An Men, junto a los de Marx, Engels, Lenin y Mao; en los edificios públicos y en las universidades, en las fábricas y en las comunas: se lo puede ver aquí y allá, colgando de las paredes con su nariz aguileña y su mirada paternal y sus espesos bigotes grises; también en las vidrieras de las librerías, resaltan los textos con su cara en la tapa —el mismo perfil altivo que, hasta pocos años antes, se encontraba en las ediciones de Moscú. Los dirigentes chinos citan, en discursos y documentos, su palabra, invocándola como una fuente de sabiduría marxista, un</p>
