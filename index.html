<p>Ahora Tang Yeng tiene ropa y zapatos por primera vez; aprendió a leer y a escribir; trabaja ocho horas. Aspira a ingresar al Partido Comunista, con tanto fervor como el Emperador Fu Yi; como el Emperador Fu Yi, y como todos los chinos que conocí, opina que el gobierno soviético es revisionista, que no quiere la revolución ni deja que otros la hagan. Ellos están siempre en contra de los movimientos de liberación nacional; temen que una pequeña chispa encienda la guerra mundial. Ellos no apoyan las tempestades revolucionarias que soplan en el mundo desde la última guerra; no quieren que los demás se liberen. De Statin, opina que es un maestro del proletariado. Toda su vida se dedicó a la causa de la revolución del proletariado. Y ya que hernos entrado en este terreno, continúa, sin esperar las preguntas. Tang Yeng, el muchachito tímido que se resistía a hablar, bombardea al cronista con slogans contra el revisionismo contemporáneo, la camarilla titoísta y los reaccionarios hindúes,</p>
<p>Al día siguiente, fui a ver al Emperador. Él también se mostró muy interesado por exponer sus ideas acerca de la polémica ideológica entre Pekín y Moscú.</p>
<p>Me dijo lo mismo que el esclavo; hasta usó las mismas palabras. Las mismas palabras que yo babía escuchado, ya, en boca de los campesinos de las provincias de Hopci, Kiangsú, Hupen y Kuangtung; las mismas que me habían dicho los obreros de las fábri. cas y los estudiantes de las universidades, los intelectuales y los artesanos, los soldados,</p>
<h3 class="section-heading">Las Memorias Del Ex Dragón</h3>
<p>Fu Yi me cuenta, con entusiasmo, su historia; de cómo el hombre más poderoso de un poderoso país, se convirtió en un humilde trabajador al servicio del pueblo, De las fulgurantes túnicas de seda y oro, al sencillo uniforme de dril azul abotonado hasta el cuello; de los sutras a “El Capital”: largo camino.</p>
<p>Hagamos memoria, le digo. Antes de la caída, y antes aún: los primeros recuerdos, la vida en el Pa= lacio. Pero él también quicre saber, de modo que pago mi impuesto hablando primero, ¿Montevideo? Si, la ciudad inclinada sobre el rio; mi gente. Le gustaría conocer América latina, dice; lo esperamos, digo. Enciende un cigarrillo, me ofrece otro: “No, no gra= cias. Yo fumo Tian Shan, sabe, el equivalente chino de los republicana”. Por debajo del uniforme, asoma el puño raído de la camisa. Fu Yi nada tiene que ver con la imagen que me había formado de él. Construí mi personaje con el humo de la imaginación, y no niego que me defrauda un poco, ahora que lo conozco de carne y hueso. Creí que descubriría una cierta sensación de pérdida en el brillo de la mirada, una resignada tristeza en la cabeza que se inclina, manos de largos dedos huesudos: restos de la dignidad imperial. Pero no; este emperador parece un funcionario, un burócrata satisfecho de su destino. Sonríe durante los ciento veinte minutos, y habla torrencialmente. Mientras le escucho, último Emperador de China, último</p>
<p>de la dinastía Ching, me viene a la cabeza un recuerdo de pocos días atrás: las ramas atormentadas del árbol de sofora donde se ahorcó el último Emperador de la dinastía Ming, al pie de la Colina de Carbón,</p>
<p>Pregunto a Fu Yi si conoció a su tía, la emperatriz Tzu Hsi. No se me irán de la memoria los lujosos salones del Palacio de Verano, que ella amplió con un crédito de millones de dólares que los mandarines ministros le proporcionaron para crear una escuadra, China no tuvo la flota de guerra que necesitaba, pero, en cambio, al pie de las Colinas Sagradas del Oeste, surgió un lago, y del lago brotó una isla, y en las orlllas se alzaron pagodas y residencias de un lujo increíble, Un gran barco de mármol, custodiado por dragones, alzó su blanca quilla: “¿Mi escuadra? Hela ahí”, dicen que dijo la emperatriz. No quisiera olvidar nunca aquel trono rodeado de leones tallados en raíces de abedul; la Sala de la Bondad y la Longevidad, donde la vieja arpía recibía a sus mandarines, oculta tras las cortinas de gasa; las vasijas de bronce y. oro para quemar el incienso y la madera de sándalo;. las maravillosas mesas labradas donde comía un bocado de cada uno de los 270 platos que se hacía servir cada mediodía. Allí, los mandarines más privilegiados aguardaban, temblorosos, que Tzu Hsi les arrojara algún resto de comida: era la gloria mayor.</p>
<p>Pero la historia me interesa, sobre todo, porque me parece estarla viendo pelear contra la muerte, Por todas partes, en el Palacio, las tortugas y grullas de metal expresaban la edad eterna de la Emperatriz; en el altar de un pequeño santuario, está todavía el cuadro al óleo que una artista norteamericana de nombre olvidado, pintó, sin talento, para ella. Un retrato: Tzu Hsi tenía setenta años, pero ahí, en la tela, representa veinte; la última señora del Celeste Imperio peleando contra los años. .</p>
<p>Sí, Fu Yi la conoció. La conoció como yo hubiera</p>
<p>asustado que me quedó una impresión profunda, para toda la vida. El primer recuerdo, un recuerdo de lá-</p>
<p>grimas; lloró, lloró. Cuando la Emperatriz decidió que yo fuera el Emperador, me advirtieron que nunca</p>
<p>más vería a mi madre, ni a mi abuela; que no podría 1 salir nunca más del Palacio. Cuando entré al Palacio, vi muchos hombres, nunca habia visto tantos hombres juntos, antes. Eso recuerdo. No es difícil imaginarlo; mandarines y cortesanos abriendo paso al diminuto enviado de los dioses, que arrastraba su capa resplandeciente y apenas si podía sostener en la cabeza la abrumadora coróna de perlas bordada con hilos de oro, mientras se acercaba al trono reservado a los Hijos del Cielo. Y después de la ceremonia, entró en el dormitorio y la vio, alzando la mirada la vio: Todo entre sombras —dice—. La cara demacrada, como de muerta. Me asusté y me eché a llorar. La Emperatriz ordenó que me dieran un caramelo y yo lo tiré al suelo. Si, es raro que recuerde todo eso. Yo era tán chico. Pero lo recuerdo. ¿Ella se parecía al retrato? No sé. Estaba muy flaca.</p>
<p>Fu Yi extrae sus propias conclusiones. El pequeño</p>
<p>Dragón que vio cómo el Ave Fénix se moría, es hoy</p>
<p>un hombre verdadero, porque el Partido Comunista me salvó. De modo que explica al cronista: Ya ve que en el sistema feudal no contaban los sentimientos humanos: me arrancaron de los brazos de mi madre. Pero después, aquello me empezó a gustar. Era un niño, y me sabía más poderoso que todos los grandes; estaban todos a mis pies; dignísimo, más alto que nadie. El poder real lo ejercía mi padre, aunque otra tía, la Emperatriz de honor, tomaba las decisiones graves. Le pregunto por su padre, Shai Fung: Murió, en 1950. Pero desbués de la revolución del 11, él ya</p>
<p>querido conocerla: mientras agonizaba. Dice: Ella me llamó para que ocupara el trono, cuando yo era un niño de tres años. La vi una sola vez. Estaba tan</p>
<p>no se ocupaba de política. Se pasaba todo el día en</p>
<p>casa,</p>
<h3 class="section-heading">Rasgándose Las Vestiduras</h3>
<p>Fu Yi, en cambio, no se pasaba todo el día en casa, No quería resignarse: ¿Sólo doscientos sesenta y siete años de dinastía Ching? ¿Acaso no merecían unos siglos más?</p>
<p>Quiso restaurar el Imperio. Los japoneses encontraron, pues, a su hombre. Él lo cuenta así: Fui un traidor. Los japoneses aplicaban una política de agresión contra China, y querían usar a los chinos para dominar a los chinos. Yo vivía en la ciudad de Tientsin, cuando empecé las relaciones con ellos: estaban interesados en dividir a China para facilitar la invasión. Coincidiamos, porque yo quería seguir dominando al pueblo del nordeste y de todo el país. En=- tonces me convirtieron en Emperador de Manchuria; ocupé el trono en Changchun, desde el año 32. Figuré como Emperador durante catorce años. Por lo menos, tenía el título, ya que no el poder. Servía de pretexto internacional, comprende, la restauración del Imperia era una cortina de humo, el instrumento de la dominación japonesa. ¿Puppet?, le pregunto, saltando una vez, al menos, por encima del intérprete, Fu Yi, siempre sonriendo, asiente con la cabeza: no ha olvidado del todo las lecciones de inglés que recibió de los japoneses, treinta años atrás,</p>
<p>Las palabras le golpean el pecho: Si todos se hubieran portado como yo, hoy no habría socialismo en China. Nuestro país seguiría ocupado por los im-</p>
<p>perialistas. ALELUYA, ALELUYA</p>
<p>En los alrededores de Pekín, se alza un gran edificio blanco. El visitante no puede dejar de sorprenderse,</p>
<p>cuando se le informa que se trata del Instituto para á Reeducación de Burgueses. Allí, los miembros de las viejas clases dominantes que han decidido guedarse en China, se asimilan a la doctrina de la nueva</p>
<p>sociedad. También se practican experiencias de reeducación, con los intelectuales que incurren en desviaciones: el individualismo, el idealismo burgués, no se pagan con la vida, al menos en un sentido literal; la solución es otra: el intelectual que ha errado la ruta, desaparece de circulación por un tiempo, es enviado a las comunas populares para limpiarse la cabeza de málas ideas, por medio del rudo trabajo de la tierra, la vida sana y largas sesiones de crítica y auto-crítica. El caso más resonante de los últimos tiempos, ha sido el de Tieng Ling, la mejor novelista china, premio Lenin y ex presidente de la Unión de Escritores. Se conocen diversas versiones acerca de su destino. El poeta Ai Chin, por otra parte, ya reeducado, ha sido readmitido en las filas comunistas.</p>
<p>Sobre su propia experiencia de reeducación, Fu Yi habla torrencialmente; parece arder de entusiasmo. Alegremente, entona su mea culpa. Lavado de cerebro, dirán en Occidente; miedo a las amenazas, quizás, De todos modos, el cronista no tiene la impresión de que el Emperador esté pagando tributo a la vida que le perdonaron: es un convertido, y habla de su nueva fe con la fuerza y la ingenuidad de los hombres que creen y quieren que todos crean; contagiar la luz, Ni siquiera en sueños hubiera podido imaginarlo, dice. Antes, yo estaba del lado de los imperialistas, había perdido el espíritu patriótico, estaba contra el pueblo. En otros países, y en mi propio país, en otro tiempo, los traidores eran condenados a muerte. Pero el Par: tido Comunista es tan grandioso que no aniquila al hombre fisicamente, en su carne y hueso, sino que aniquila las ideas equivocadas. El Partido Comunista me hizo distinguir la verdad de la mentira. Fui reedu-</p>
<p>cado; me trataron muy bien. ¿Preso? En la Unión Soviética, cinco años, hasta el 50; después, volví a mi patria, al nordeste, a la ciudad de Fushung, Al estuve, en el centro de reeducación, junto con muchos otros criminales de guerra. Habia imperialistas japo. neses, dirigentes del falso país de Manchuria, y los reaccionarios del Kuomingtang. enemigos del pueblo chino. Entre todos, ni un solo condenado a muerte. Se acaricia el cuello cuando dice que, antes, a los emperadores derrotados, les cortaban la cabeza, Sólo el partido del proletariado aplica esta política de reeducación, sin precedentes. Descubrí poco a poco la verdad; reconocí mis crimenes. Visité todo el país, varias veces, para comparar la vieja China con la nueva China. Aprendí que es preciso apoyarse en el pueblo, r Salió en libertad condicional. ¿Y ahora? Le digo que recuerdo haber leído un artículo del mariscal Montgomery, hace un par de años, donde se hacía, al pasar, una referencia a Fu Yi, convertido en jardinero. No —dice—,. Trabajo en investigaciones históricas. ¿Investigaciones acerca de su propia historia? También. Escribí un libro autobiográfico. Es una lástima que usted no lea chino; cuando se traduzca, se lo enviaré. El Emperador insiste en que, ahora, la vida es mucho mejor; al mejorar el espíritu, también mejoró la salud. Obra de la sociedad nueva. Para demostrarlo, informa: Me casé, el año pasado. El primero de mayo, día de los trabajadores. ¿Con quién, sino es indiscreción? Con una enfermera del hospital. No por primera vez, claro, Por cuarta vez. Cuente, cuente,</p>
<h3 class="section-heading">Cherchez La Femme</h3>
<p>El primer r.atrimonio de Fu Yi no le es imputable. Sus padres le comprorseticron, de niño, con una damita de familia noble. No quiere ni acordarse: Al</p>
<p>principio, decidian mis padres; después, decidian los Japoneses. Pero dice que estaba enamorado de su se-</p>
<p>gunda mujer, una estudiante de Pekín. Cuando los Japoneses supieron que se pensaba casar, enviaron un general a Changchun, con la misión de advertir al , Emperador que no se podría casar sin que ellos reali zaran, antes, las correspondientes investigaciones. In= Ml vestigaron, pues, en Pekín; finalmente, el General en *</p>
<p>Jefe del Ejército japonés, recomendó el matrimonio.</p>
<p>Pero la china, según recuerda Fu Yi, odiaba al impe-</p>
<p>ríalismo; Me hablaba de la opresión que sufría nues” tro país. Se enfermó, la trataron médicos japoneses, murió. Al Emperador lo roían sospechas y descon= fianzas: Ellos no la atendieron bien. Ya en esa épo- &lt;a, el General en Jefe del Ejército japonés, se había instalado por su cuenta en mi Palacio. Vino a expre sarme su dolor; en una mano traía flores y en la otra, decenas de fotos de jovencitas japonesas, para que yo eligiera, Pero yo no me quería casar con una japonesa, Ellos se metían en todas las cosas; querían manejar mi vida, controlar cada uno de mis actos. Yo los obés decía, aunque no siempre, Les dije que me casaría con la mujer que yo quisiera, y entonces me ofrecieron muchas fotos más, fotos de jovencitas chinas. Volví rechazarlas. Elegí, por mi cuenta, a una estudiante de quince años, Estaba satisfecho con ella, porque me obedecía en todo. Pero después me divorcié.</p>
<p>Los chispazos de rebeldía de Fu Yi nunca demora: ban en apagarse; temía que los Japoneses lo sustituyeran por su hermano o su sobrino: Tenía miedo de perder el poder, quería conservar mis intereses. Y co. mo no podía ser de otro modo, extrae su moraleja: Eso es característico de mi clase, la clase explotadora.</p>
<p>Le1 Feno, SraLiw, Jruscroy</p>
<p>La conversación salta hacia otros ternas. Sobre Lej Feng, el soldadito chino recientemente descubierto e</p>
<p>idolatrado como apóstol de Mao, dice Fu Yi: Un hombre puro, magnífica soldado, Hizo todo para el pueblo; olvidaba los propios intereses, sólo. para servir de todo corazón al pueblo, Por eso es un ejemplo para todos, En comparación con él, yo estaba en el otro extremo: sólo pensaba en la utilidad propia, El fomentaba el estilo comunista: uno para todas, todos para uno. La clase explotadora cree que si uno no piensa en sí mismo, entonces le aplastarán el cielo y la tierra. Lei Feng, en el espíritu tradicional del proletariado, sólo pensaba en la felicidad del pueblo, Hablamos de Stalin, y el Emperador me repite, textualmente, algunas de las frases que he leído, antes, en el folleto “Sobre la experiencia histórica de la dictadura del proletariado”. De Jruschov opina, como todos los chinos que conocí, que es malo y revisionista: Fu Yi considera que las divergencias entre los partidos de la Unión Soviética y China Popular no son superficiales, sino de principios. Hace una exposición detallada de los puntos de vista del Partido Comunista chino y concluye que, de acuerdo con la doctrina marxista, los problemas pueden ser resueltos con la derrota del revisionismo: El revisionismo no puede ponerse muy firme. No siempre las nubes pueden cubrir el sol,</p>

<p>Vivo por mi patria, por mi pueblo, por mis hijos, por mis nietos, dice, mientras obliga al cronista a beber la cuarta taza de té de jazmín.</p>

<p>disputan entre sí por el dominio de estas zonas. Por otro lado, las amplias masas obreras y campesinas, la pequeña burguesía, la burguesía nacional patriótica y revolucionaria, y los intelectuales patrióticos y revolucionarios, es decir, la aplastante mayoría de la población, se oponen al imperialismo, al nuevo y viejo colonialismo, a su opresión y control, y a las disputas de los países imperialistas por el dominio de esas z0nas. Hay un auge de los amplios movimientos de liberación nacional. El filo principal de las luchas de los movimientos de liberación nacional, se dirige contra el imperialismo norteamericano, porque éste intenta controlar esas zonas sustituyendo a los viejos colonialismos. Por eso, tienen lugar luchas antagómicas entre el imperialismo yanqui y sus lacayos por una parte y las amplias masas populares de estas zonas, por la otra. También existen luchas entre el imperialismo norteamericano, los demás colonialistas y los seguidores de estos últimos. Incluso entre el imperialismo norteamericano y sus propios lacayos se libran luchas, cuando el imperialismo descubre que un lacayo ya no le sirve y entonces elige otro, El golpe de estado militar en Saigón, es un excelente ejemplo. Tanto Syngman Rhee, de Corea del Sur, como Ngo Dihn Diem, de Vietnam del Sur, son los mejores ejemplos. Por todo esto, a nuestro juicio, los días del imperialismo se van haciendo cada vez más difíciles. El imperialismo está cada vez más aislado en Asia, África y América Latina; llegará el día de su derrota completa.</p>
<h3 class="section-heading">Los Movimientos De Liberación Ante Los Pactos De Coexistencia</h3>
<p>—Ustedes han denunciado, violentamente, el peligro de que la coexistencia pacífica entre la Unión Soviética y los Estados Unidos, implique un reparto</p>
<p>cio, la Unión Soviética y los Estados Unidos se pon»</p>
<p>drían de acuerdo a través de una nueva “Santa</p>
<p>Alianza”. ¿Consideran ustedes que un compromiso de esta indole podría desviar, frustrar o paralizar la acción revolucionaria de los movimientos de liberación en las colonias y semi-colonias?</p>
<p>—Trataré de contestarle de una manera simple. Hablando concretamente, cuando la URSS, los EE. UU. e Inglaterra concluyeron en Moscú un tra. tado tripartito de prohibición parcial de las explosiones nucleares, estaban abrigando el propósito de resolver los problemas del mundo entre unas pocas potencias, especialmente entre los Estados Unidos y la Unión Soviética, Se trata de un intento irrealízable, ante todo porque entre los Estados Unidos capitalistas y la Unión Soviética socialista, existen contradicciones fundamentales que no pueden ser resueltas, Echemos un vistazo al hecho de que, después de la firma del Tratado, los Estados Unidos han continuado realizando pruebas nucleares subterráneas, y en la conferencia de desarme no se ha conseguido nuevos resultados, El Ministro de Relaciones Exterió. res de la Unión Soviética entabló negociaciones en New York y Washington, procurando acuerdos para nuevas medidas. No obtuvo resultados, Estos hechos demuestran que los Estados Unidos no quieren de ninguna manera aliviar la tensión internacional. Si guen engañando a los pueblos del mundo, siguen preparando la guerra, continúan su carrera armamen= tista, realizan amenazas nucleares y provocaciones armadas en todo el mundo. Tomemos en cuenta el ejemplo de Cuba: ¿acaso la intervención armada de los Estados Unidos ha cesado? Y la situación actual se vuelve aún más clara en Vietnam del Sur; Ngo Dihn Diem, era el más obediente a las órdenes de los Estados Unidos; cuando dejó de desempeñar</p>
<p>del mundo entre las dos grandes potencias. A su Jui-</p>
<p>su papel correctamente, los Estados Unidos llevaron a cabo un golpe militar y mataron a au viejo Si la tensión en las zonas que ellos mismos con</p>
<p>no se ha aliviado, ¿qué decir de las zonas donde exis ten contradicciones fundamentales? Por eso, esta ma: nera de pensar es irreal.</p>
<p>—Temo que mi pregunta no haya sido bien imter pretada. Quise decir esto: ¿Qué influencia podrian tener sobre los movimientos de liberación en los palses oprimidos del mundo, los compromisos asumidos por la Unión Soviética, de potencia a potencia, con los Estados Unidos?</p>
<p>—Sí, le entiendo. Creo que pueden ejercer un papel adormecedor durante cierto tiempo, Pero las contrá= dicciones fundamentales existentes no van a ser fesueltas, porque los pueblos de Asia, África y América Latina, es decir, de los países oprimidos de esas zon, quieren independizarse, zafarse del control del imperialismo norteamericano. En esas zonas, el imperialismo quiere continuar su expansión y su política agresiva, Por eso, las contradicciones fundamentales no \$e van a resolver. ¿Cómo se puede hablar, entonces, de coexistencia pacífica? Mientras las clases oprimidas del mundo, quieren la libertad, la liberación y el mejoramiento de la vida, las clases opresoras quieren seguir explotándolas. Entre unas y otras, la coexis tencia pacífica no es posible. Los pueblos de los países del campo socialista están decididos a defender el sistema socialista: quieren fortalecer sus países y apoyar los movimientos revolucionarios en todo el mundo, Sin embargo, el imperialismo los sigue hostigando, ejerce amenazas militares, envía espías y los infiltra con el propósito de impulsar una llamada “evolución pacifica”, y con el propósito de realizar la “libera. lización” de estos países. ¿Cómo se puede resolver estas contradicciones? Los pueblos y países amantes de la paz se oponen a la agresión, mientras el impe-</p>
<p>rialismo norteamericano quiere expandir sus armamentos, preparar la guerra y dominar despóticamente al mundo. ¿Cómo se puede resolver esta contradicción fundamental? Consideramos que si las diférentes clases de luchas se sincronizaran de una manera verdadera, se crearía una fuerza imbatible: Si se une la lucha por la liberación nacional de los países oprimidos de Asia, África y América Latina, con las luchas de los pueblos oprimidos y explotados que quieren la libertad, la democracia y el socialismo, y las luchas de los pueblos del campo socialista contra la intervención agresiva del imperialismo, así como las luchas de los pueblos amantes de la paz, se podrá poner coto a las provocaciones del imperialismo, que quiere desatar una guerra nuclear. Procediendo de esta manera, la paz del mundo será mantenida. Esto es todo lo contrario de mendigar la paz al imperialismo norteamericano.</p>
<p>NADIE MONOPOLIZA EL MARXISMO-LENINISMO</p>

<p>—En algunos lugares no hay Partidos Comunistas; se puede lograr, sin embargo, la victoria en las luchas por la independencia nacional. Eso ocurre, por ejemplo, en algunos países de África central, África del este y del oeste. En cuanto a Argelia, se trata de otra situación. Quien dirigió la lucha armada durante siete años y medio y logró el triunfo, fue el Frente de Liberación Nacional. El Partido Comunista Argelino, al principio, no estaba de acuerdo, no apoyaba la lucha armada por la independencia nacional.. Por eso, la dirección de la revolución la tomó el Frente de Liberación Nacional. Si usted no dirige, otro vendrá. Hemos explicado muy claramente este problema</p>
<p>en la carta de nuestro Comité Central, 11 Comité</p>
<p>Central del Partido Comunista de la URSS, el 14 de junio de este año. Ustedes publicaron ese documento; puede leerlo en su propio periódico”.</p>

<p>—Si un país quiere hacer la revolución socialista, debe aceptar los principios revolucionarios del marxismo-leninismo, Y el marxismo-leninismo no puede ser monopolizado por el Partido Comunista, Cualquier revolucionario puede disponer de esta arma. Cuando Fidel Castro conquistó la victoria por medio de la lucha armada, no era miembro del Partido Gomunista.</p>

  btn.appendChild(numEl);
  btn.appendChild(titleEl);
  btn.addEventListener('click', () => item.type === 'timeline' ? showTimeline(i) : showSection(item.index, i));
  li.appendChild(btn);
  navList.appendChild(li);
});

function setActive(idx) {
  document.querySelectorAll('#nav-list button').forEach((b, i) => b.classList.toggle('active', i === idx));
}
function hideAll() { cover.style.display='none'; reader.style.display='none'; tlView.style.display='none'; }

function showSection(sIdx, navIdx) {
  setActive(navIdx); hideAll();
  reader.innerHTML = SECTIONS[sIdx].html;
  reader.style.display = 'block';
  window.scrollTo({ top:0, behavior:'instant' });
  currentIndex = navIdx;
}

function fmtDate(e) {
  const M = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let s = String(e.year);
  if (e.month) s = M[e.month] + ' ' + s;
  if (e.day)   s = e.day + ' ' + s;
  return s;
}

function showTimeline(navIdx) {
  setActive(navIdx); hideAll();
  const allGroups = [...new Set(TIMELINE.map(e => e.group))];
  let activeFilters = new Set(['all']);

  function groupTag(g) {
    const c = GROUP_COLORS[g] || '#888';
    return '<span class="tl-group-tag" style="background:' + c + '">' + g + '</span>';
  }

  function render() {
    const filterAll = activeFilters.has('all');
    let h = '<div class="tl-header"><span class="cap-label">Contexto hist\u00f3rico</span><h2>Cronolog\u00eda 1949\u20131972</h2><p>China y Am\u00e9rica Latina durante la Guerra Fr\u00eda: de la diplomacia popular a la realpolitik.</p></div>';
    h += '<div class="tl-filters"><span>Filtrar:</span>';
    h += '<button class="filter-btn' + (filterAll ? ' active' : '') + '" data-filter="all">Todos</button>';
    allGroups.forEach(g => {
      const c = GROUP_COLORS[g] || '#888';
      const on = !filterAll && activeFilters.has(g);
      h += '<button class="filter-btn' + (on ? ' active' : '') + '" data-filter="' + g + '"' + (on ? ' style="background:' + c + ';border-color:' + c + ';color:#fff"' : '') + '>' + g + '</button>';
    });
    h += '</div><div class="tl-spine">';

    TIMELINE.forEach(e => {
      const vis = filterAll || activeFilters.has(e.group);
      const dc  = GROUP_COLORS[e.group] || '#888';
      if (e.type === 'era') {
        h += '<div class="tl-era' + (vis ? '' : ' hidden') + '"><div class="tl-era-dot" style="background:' + dc + '"></div><div class="tl-era-label">' + e.year + '</div><div class="tl-era-title">' + e.headline + '</div></div>';
      } else {
        const img = e.img ? '<img class="tl-event-img" src="' + e.img + '" alt="" loading="lazy" onerror="this.classList.add(\'hidden-img\')">' : '';
        h += '<div class="tl-event' + (vis ? '' : ' hidden') + '"><div class="tl-dot" style="background:' + dc + '"></div><div class="tl-event-body"><div class="tl-date">' + fmtDate(e) + ' ' + groupTag(e.group) + '</div><h3>' + e.headline + '</h3><p>' + e.text + '</p></div>' + img + '</div>';
      }
    });
    h += '</div>';
    tlView.innerHTML = h;

    tlView.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = btn.dataset.filter;
        if (f === 'all') { activeFilters = new Set(['all']); }
        else {
          activeFilters.delete('all');
          if (activeFilters.has(f)) activeFilters.delete(f); else activeFilters.add(f);
          if (activeFilters.size === 0) activeFilters = new Set(['all']);
        }
        render();
      });
    });
  }

  render();
  tlView.style.display = 'block';
  window.scrollTo({ top:0, behavior:'instant' });
  currentIndex = navIdx;
}

window.addEventListener('scroll', () => backTop.classList.toggle('visible', window.scrollY > 600));
backTop.addEventListener('click', () => window.scrollTo({ top:0, behavior:'smooth' }));

document.addEventListener('keydown', e => {
  const total = NAV_ITEMS.length;
  if (e.key === 'ArrowRight' && currentIndex !== null && currentIndex < total - 1) {
    const n = NAV_ITEMS[currentIndex + 1];
    n.type === 'timeline' ? showTimeline(currentIndex + 1) : showSection(n.index, currentIndex + 1);
  }
  if (e.key === 'ArrowLeft' && currentIndex !== null && currentIndex > 0) {
    const p = NAV_ITEMS[currentIndex - 1];
    p.type === 'timeline' ? showTimeline(currentIndex - 1) : showSection(p.index, currentIndex - 1);
  }
});

</script>
</body>
</html>
