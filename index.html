    transform: scale(1.13);
    filter: sepia(18%) contrast(0.92) brightness(0.96);
  }}

  /* ── Edge blur / vignette: four blurred panels around center ── */
  #vignette {{
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(
      ellipse 55% 52% at 50% 50%,
      transparent 0%,
      transparent 38%,
      rgba(14, 10, 4, 0.22) 58%,
      rgba(14, 10, 4, 0.62) 78%,
      rgba(14, 10, 4, 0.88) 100%
    );
  }}
  /* Second pass: stronger blur simulation via a blurred pseudo-overlay */
  #blur-ring {{
    position: fixed; inset: -20px; pointer-events: none; z-index: 3;
    border: 30px solid transparent;
    box-shadow: inset 0 0 60px 30px rgba(14, 10, 4, 0.55);
    border-radius: 0;
  }}

  /* ── SVG overlay for pencil lines ── */
  #map-svg {{
    position: fixed; inset: 0; z-index: 4;
    width: 100%; height: 100%;
    pointer-events: none;
  }}

  /* ── Floating menu container ── */
  #overlay {{
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    padding: 2.8rem 4rem 2.4rem;
    min-width: min(400px, 86vw);
    /* Soft floating frame instead of sharp border */
    background: rgba(8, 5, 2, 0.30);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    box-shadow:
      0 0 0 1px rgba(190, 155, 90, 0.18),
      0 0 0 2px rgba(190, 155, 90, 0.07),
      0 8px 60px rgba(0,0,0,0.55),
      0 2px 16px rgba(0,0,0,0.4);
    border-radius: 3px;
    animation: float 5s ease-in-out infinite;
  }}
  @keyframes float {{
    0%   {{ transform: translate(-50%, calc(-50% + 0px)); }}
    50%  {{ transform: translate(-50%, calc(-50% - 5px)); }}
    100% {{ transform: translate(-50%, calc(-50% + 0px)); }}
  }}

  /* Subtle corner ornaments */
  #overlay::before, #overlay::after {{
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(190, 155, 90, 0.30);
    border-style: solid;
  }}
  #overlay::before {{
    top: 8px; left: 8px;
    border-width: 1px 0 0 1px;
    border-radius: 2px 0 0 0;
  }}
  #overlay::after {{
    bottom: 8px; right: 8px;
    border-width: 0 1px 1px 0;
    border-radius: 0 0 2px 0;
  }}

  /* ── Title ── */
  .main-title {{
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: clamp(1.8rem, 4.5vw, 3.6rem);
    color: #f4ede0;
    text-shadow: 0 2px 28px rgba(0,0,0,0.9), 0 0 50px rgba(0,0,0,0.4);
    line-height: 1.1;
    letter-spacing: 0.01em;
    margin-bottom: 0.45rem;
  }}

  /* ── Subtitle ── */
  .sub-title {{
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: clamp(0.6rem, 1.1vw, 0.72rem);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(225, 205, 170, 0.5);
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    margin-bottom: 2rem;
  }}

  /* ── Divider ── */
  .divider {{
    display: flex; align-items: center; justify-content: center;
    gap: 0.8rem; margin-bottom: 1.8rem;
  }}
  .divider::before, .divider::after {{
    content: ''; flex: 1; max-width: 55px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(190,148,80,0.38));
  }}
  .divider::after {{ background: linear-gradient(to left, transparent, rgba(190,148,80,0.38)); }}
  .divider span {{
    color: rgba(190, 148, 80, 0.45); font-size: 0.55rem; letter-spacing: 0.05em;
  }}

  /* ── Nav ── */
  nav {{ display: flex; flex-direction: column; gap: 0; align-items: stretch; }}

  nav a {{
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: clamp(0.85rem, 1.5vw, 1.02rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(230, 215, 190, 0.78);
    text-decoration: none;
    padding: 0.72rem 1rem;
    border-bottom: 1px solid rgba(180, 140, 70, 0.14);
    transition: all 0.22s;
    text-shadow: 0 1px 10px rgba(0,0,0,0.8);
    position: relative;
  }}
  nav a:first-child {{ border-top: 1px solid rgba(180,140,70,0.14); }}

  nav a.primary {{
    color: rgba(240, 210, 200, 0.90);
    letter-spacing: 0.14em;
    font-weight: 500;
  }}
  nav a.primary:hover {{
    color: #fff5f0;
    background: rgba(139, 26, 26, 0.18);
    padding-left: 1.5rem;
  }}
  nav a.primary::before {{
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0; background: rgba(139,26,26,0.55);
    transition: width 0.22s;
    border-radius: 1px 0 0 1px;
  }}
  nav a.primary:hover::before {{ width: 2px; }}

  nav a.soon {{
    opacity: 0.28; cursor: default; pointer-events: none;
    font-size: clamp(0.75rem, 1.3vw, 0.9rem);
  }}

  .soon-note {{
    margin-top: 1.1rem;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(225, 205, 170, 0.2);
  }}
</style>
</head>

<div id="bg"></div>
<div id="vignette"></div>
<div id="blur-ring"></div>
<svg id="map-svg"></svg>

<div id="overlay">
  <div class="main-title">Journey against the Sun</div>
  <div class="sub-title">China &thinsp;&middot;&thinsp; Latin America &thinsp;&middot;&thinsp; 1963</div>
  <div class="divider"><span>&#10022;</span></div>
  <nav>
    <a href="china1964.html" class="primary">China 1964</a>
    <a href="#" class="soon">Crónicas Chinas</a>
    <a href="#" class="soon">Other Sources</a>
  </nav>
  <div class="soon-note">* in preparation</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
// Countries to highlight (ISO 3166-1 numeric)
const CHINA = new Set([156]);
const LATAM = new Set([
  484,320,84,340,222,558,188,591,192,332,214,388,780,
  170,862,328,740,218,604,68,76,152,32,858,600,
  659,662,670,28,52,212,308,44,796
]);

const svg = d3.select('#map-svg');
let world;

// SVG pencil filter
function addFilter(svgEl) {
  const defs = svgEl.append('defs');
  const f = defs.append('filter').attr('id','pencil').attr('x','-5%').attr('y','-5%').attr('width','110%').attr('height','110%');
  f.append('feTurbulence')
    .attr('type','fractalNoise')
    .attr('baseFrequency','0.65')
    .attr('numOctaves','3')
    .attr('stitchTiles','stitch')
    .attr('result','noise');
  f.append('feDisplacementMap')
    .attr('in','SourceGraphic')
    .attr('in2','noise')
    .attr('scale','1.4')
    .attr('xChannelSelector','R')
    .attr('yChannelSelector','G');
}

function draw() {
  if (!world) return;
  const W = window.innerWidth, H = window.innerHeight;
  svg.attr('width', W).attr('height', H);
  svg.selectAll('*').remove();
  addFilter(svg);

  // Natural Earth projection — visually close to the Denoyer semi-elliptical
  const proj = d3.geoNaturalEarth1()
    .scale(Math.min(W / 5.5, H / 3.0))
    .translate([W * 0.5, H * 0.5]);
  const path = d3.geoPath().projection(proj);

  const countries = topojson.feature(world, world.objects.countries).features;

  // Draw only China + LatAm with pencil-red strokes
  const highlights = countries.filter(d => CHINA.has(+d.id) || LATAM.has(+d.id));

  // Faint fill so the boundary is clearer
  svg.selectAll('path.hi')
    .data(highlights).enter()
    .append('path').attr('class','hi')
    .attr('d', path)
    .attr('fill', 'rgba(160, 40, 40, 0.06)')
    .attr('stroke', 'none');

  // Pencil outline — two passes for a hand-drawn feel
  highlights.forEach(d => {
    // Outer, softer stroke
    svg.append('path').datum(d)
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(170, 50, 40, 0.18)')
      .attr('stroke-width', 3.5)
      .attr('stroke-linejoin', 'round')
      .attr('filter', 'url(#pencil)');
    // Inner, crisper stroke
    svg.append('path').datum(d)
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(180, 60, 50, 0.52)')
      .attr('stroke-width', 1.3)
      .attr('stroke-linejoin', 'round')
      .attr('stroke-dasharray', '0')
      .attr('filter', 'url(#pencil)');
  });
}

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(data => { world = data; draw(); })
  .catch(err => console.error(err));

window.addEventListener('resize', draw);
</script>
</body>
</html>
